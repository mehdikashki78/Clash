window.withdrawFromBase=async function(){
    if(!player.base || player.base.storage < 50){toast('موجودی پایگاه کافی نیست',true);return}
    const withdraw = Math.min(500, player.base.storage);
    player.base.storage -= withdraw;
    player.gold=(player.gold||0)+withdraw;
    await saveCurrent();updateUI();toast(`📤 ${withdraw} طلا از پایگاه برداشت شد`);
};

window.buildConsulate=async function(){
    const targetId = document.getElementById('consulateTarget')?.value;
    if(!targetId){toast('کشور مقصد را انتخاب کنید',true);return}
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if((player.gold||0) < 2000){toast('💰 ۲۰۰۰ طلا لازم است',true);return}
    if((player.consulates || []).some(c => c.countryId === targetId)){toast('✅ قبلاً کنسولگری دارید',true);return}
    player.gold=(player.gold||0)-2000;
    if(!player.consulates) player.consulates = [];
    player.consulates.push({countryId:targetId, countryName:target.name, builtAt:ts(), level:1, fighters:[], defenses:[]});
    await saveCurrent();updateUI();toast(`🏛️ کنسولگری در ${target.name} ساخته شد`);
};

window.upgradeConsulate=async function(index){
    const con = player.consulates?.[index];
    if(!con){toast('کنسولگری یافت نشد',true);return}
    const cost = con.level * 800;
    if((player.gold||0) < cost){toast('💰 طلا کافی نیست',true);return}
    player.gold=(player.gold||0)-cost;
    con.level++;
    await saveCurrent();updateUI();toast(`⬆️ کنسولگری ${con.countryName} به سطح ${con.level} ارتقا یافت`);
};

window.removeConsulate=async function(index){
    const con = player.consulates?.[index];
    if(!con){toast('کنسولگری یافت نشد',true);return}
    if(con.fighters){
        con.fighters.forEach(f => {
            if(player.fighters && f.name){
                if(player.fighters[f.name]) player.fighters[f.name].count--;
                if(player.fighters[f.name]?.count <= 0) delete player.fighters[f.name];
            }
        });
    }
    player.consulates.splice(index, 1);
    await saveCurrent();updateUI();toast(`🗑️ کنسولگری ${con.countryName} حذف شد`);
};

window.viewConsulateInfo=function(countryId){
    const target = allPlayers.find(p => p.id === countryId);

// ==================== اکشن‌های پدافند ====================
window.buildDefense=async function(baseType, defenseName, consulateIndex){
    const d = DEFENSES_DB[defenseName];
    if(!d){toast('پدافند نامعتبر',true);return}
    
    if((player.gold||0) < d.cost.gold || (player.oil||0) < d.cost.oil || (player.metal||0) < d.cost.metal || (player.qualityMetal||0) < d.cost.qualityMetal){
        toast('💰 منابع کافی نیست', true);
        return;
    }
    
    let targetList = [];
    if(baseType === 'main'){
        if(!player.base.defenses) player.base.defenses = [];
        if(player.base.defenses.filter(dd => dd.name === defenseName).length >= d.maxPerBase){
            toast(`❌ سقف ${d.maxPerBase} عدد برای این پدافند در پایگاه اصلی`, true);
            return;
        }
        targetList = player.base.defenses;
    } else if(baseType === 'consulate' && consulateIndex !== undefined){
        const con = player.consulates[consulateIndex];
        if(!con){toast('کنسولگری یافت نشد',true);return}
        if(!con.defenses) con.defenses = [];
        if(con.defenses.filter(dd => dd.name === defenseName).length >= d.maxPerBase){
            toast(`❌ سقف ${d.maxPerBase} عدد برای این پدافند در کنسولگری`, true);
            return;
        }
        targetList = con.defenses;
    } else {
        toast('مقصد نامعتبر', true);
        return;
    }
    
    player.gold -= d.cost.gold;
    player.oil -= d.cost.oil;
    player.metal -= d.cost.metal;
    player.qualityMetal -= d.cost.qualityMetal;
    
    targetList.push({
        name: defenseName,
        defense: d.defense,
        hp: d.hp,
        maxHp: d.hp,
        missileDefense: d.missileDefense || 0
    });
    
    await saveCurrent();updateUI();
    toast(`🛡️ ${defenseName} نصب شد!`);
};

window.repairDefense=async function(baseType, ...args){
    let defenseList, index;
    if(baseType === 'main'){
        if(!player.base?.defenses) {toast('پدافندی وجود ندارد',true);return}
        defenseList = player.base.defenses;
        index = args[0];
    } else if(baseType === 'consulate'){
        const conIdx = args[0];
        const defIdx = args[1];
        const con = player.consulates?.[conIdx];
        if(!con || !con.defenses){toast('پدافند یافت نشد',true);return}
        defenseList = con.defenses;
        index = defIdx;
    } else {
        toast('مقصد نامعتبر',true);return;
    }
    
    const def = defenseList[index];
    if(!def){toast('پدافند یافت نشد',true);return}
    const dData = DEFENSES_DB[def.name];
    if(!dData){toast('داده‌های پدافند نامعتبر',true);return}
    if(def.hp >= dData.hp){toast('پدافند سالم است',true);return}
    
    const cost = FIGHTER_REPAIR_COST;
    if((player.gold||0) < cost){toast('💰 طلا کافی نیست',true);return}
    
    player.gold -= cost;
    def.hp = Math.min(dData.hp, def.hp + 50);
    await saveCurrent();updateUI();
    toast(`🔧 ${def.name} تعمیر شد (HP: ${def.hp}/${dData.hp})`);
};

window.removeDefense=async function(baseType, ...args){
    let defenseList, index;
    if(baseType === 'main'){
        if(!player.base?.defenses) {toast('پدافندی وجود ندارد',true);return}
        defenseList = player.base.defenses;
        index = args[0];
    } else if(baseType === 'consulate'){
        const conIdx = args[0];
        const defIdx = args[1];
        const con = player.consulates?.[conIdx];
        if(!con || !con.defenses){toast('پدافند یافت نشد',true);return}
        defenseList = con.defenses;
        index = defIdx;
    } else {
        toast('مقصد نامعتبر',true);return;
    }
    
    if(index >= defenseList.length){toast('پدافند یافت نشد',true);return}
    const def = defenseList[index];
    defenseList.splice(index, 1);
    await saveCurrent();updateUI();
    toast(`🗑️ ${def.name} حذف شد`);
};

window.buildMissile=async function(name){
    const m = MISSILES_DB[name];
    if(!m){toast('موشک نامعتبر',true);return}
    if(!canBuildMissile(player, name)){toast('❌ شرایط ساخت فراهم نیست',true);return}
    
    player.gold=(player.gold||0)-m.cost.gold;
    player.oil=(player.oil||0)-m.cost.oil;
    player.metal=(player.metal||0)-m.cost.metal;
    player.qualityMetal=(player.qualityMetal||0)-m.cost.qualityMetal;
    
    if(!player.missiles) player.missiles = {};
    player.missiles[name] = (player.missiles[name] || 0) + 1;
    
    player.xp = (player.xp || 0) + 1;
    await saveCurrent();updateUI();
    toast(`🚀 ${name} ساخته شد! +۱ XP`);
};

window.launchMissile=async function(targetId){
    if(!canAttackAfterDeclaration(player, targetId)){
        toast('⏳ ابتدا اعلان جنگ کنید و ۳ ساعت صبر کنید', true);
        return;
    }
    
    const warElapsed = player.warStartTime[targetId] ? (ts() - player.warStartTime[targetId]) / 3600000 : 0;
    if(warElapsed >= WAR_DURATION_HOURS){
        toast('⏳ این جنگ به پایان رسیده است! سازمان ملل مداخله کرده', true);
        return;
    }
    
    const totalMissiles = getTotalMissiles(player);
    if(totalMissiles === 0){
        toast('❌ هیچ موشکی برای پرتاب ندارید!', true);
        return;
    }
    
    if((player.gold||0) < MISSILE_LAUNCH_COST){
        toast(`💰 ${MISSILE_LAUNCH_COST} طلا برای پرتاب موشک لازم است`, true);
        return;
    }
    
    await loadAll();
    const ti=allPlayers.findIndex(p=>p.id===targetId);
    if(ti===-1){toast('کشور یافت نشد',true);return}
    const target=allPlayers[ti];
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}
    
    const targetType = document.getElementById('missileTargetType')?.value || 'resources';
    const missileNames = Object.keys(player.missiles).filter(name => player.missiles[name] > 0);
    if(missileNames.length === 0){toast('موشکی موجود نیست',true);return}
    
    const randomIndex = Math.floor(Math.random() * missileNames.length);
    const missileName = missileNames[randomIndex];
    const missileData = MISSILES_DB[missileName];
    
    player.gold -= MISSILE_LAUNCH_COST;
    player.missiles[missileName]--;
    if(player.missiles[missileName] <= 0) delete player.missiles[missileName];
    
    const missileDefense = getMissileDefense(target);
    const interceptChance = Math.min(missileDefense, 85);
    const isIntercepted = Math.random() * 100 < interceptChance;
    
    if(isIntercepted){
        toast(`🛡️ موشک ${missileName} توسط پدافند ${target.name} رهگیری شد!`, false, 'missile');
        await saveCurrent();updateUI();
        return;
    }
    
    let damageMessage = '';
    let xpGain = 2;
    const power = missileData.power || 50;
    const damageMultiplier = 0.5 + (power / 200);
    
    switch(targetType){
        case 'resources':
            const goldLoss = Math.floor(target.gold * 0.3 * damageMultiplier);
            const oilLoss = Math.floor(target.oil * 0.3 * damageMultiplier);
            const metalLoss = Math.floor(target.metal * 0.3 * damageMultiplier);
            target.gold = Math.max(0, target.gold - goldLoss);
            target.oil = Math.max(0, target.oil - oilLoss);
            target.metal = Math.max(0, target.metal - metalLoss);
            damageMessage = `💰 ${goldLoss} طلا، ${oilLoss} نفت، ${metalLoss} فلز نابود شد`;
            break;
        case 'buildings':
            const buildingTypes = ['oilWell','farm','mine','barracks','wall','warehouse','refinery'];
            const randBuild = buildingTypes[Math.floor(Math.random() * buildingTypes.length)];
            const levelLoss = Math.floor(1 + damageMultiplier);
            if(target.buildings[randBuild] > 1){
                target.buildings[randBuild] = Math.max(1, target.buildings[randBuild] - levelLoss);
                damageMessage = `🏗️ ${randBuild} ${levelLoss} سطح کاهش یافت`;
            } else {
                damageMessage = `🏗️ ساختمانی برای تخریب وجود ندارد`;
            }
            break;
        case 'military':
            const infantryLoss = Math.floor(target.units.infantry * 0.2 * damageMultiplier);
            const cavalryLoss = Math.floor(target.units.cavalry * 0.2 * damageMultiplier);
            const artilleryLoss = Math.floor(target.units.artillery * 0.2 * damageMultiplier);
            target.units.infantry = Math.max(0, target.units.infantry - infantryLoss);
            target.units.cavalry = Math.max(0, target.units.cavalry - cavalryLoss);
            target.units.artillery = Math.max(0, target.units.artillery - artilleryLoss);
            damageMessage = `⚔️ ${infantryLoss} پیاده، ${cavalryLoss} سواره، ${artilleryLoss} توپخانه نابود شد`;
            xpGain = 3;
            break;
        case 'population':
            const popLoss = Math.floor(target.population * 0.05 * damageMultiplier * 2);
            target.population = Math.max(10, target.population - popLoss);
            damageMessage = `👥 ${popLoss} نفر از جمعیت کشته شدند`;
            xpGain = 3;
            break;
        case 'base':
            let baseFightersDestroyed = 0;
            if(target.base?.fighters){
                const destroyCount = Math.floor(target.base.fighters.length * 0.15 * damageMultiplier);
                const actualDestroy = Math.min(destroyCount, target.base.fighters.length);
                target.base.fighters.splice(0, actualDestroy);
                baseFightersDestroyed = actualDestroy;
            }
            let baseDefensesDestroyed = 0;
            if(target.base?.defenses){
                target.base.defenses.forEach(d => {
                    if(d.hp > 0){
                        const damage = Math.floor(20 * damageMultiplier + 10);
                        d.hp = Math.max(0, d.hp - damage);
                        if(d.hp <= 0) baseDefensesDestroyed++;
                    }
                });
                target.base.defenses = target.base.defenses.filter(d => d.hp > 0);
            }
            damageMessage = `🏰 ${baseFightersDestroyed} جنگنده و ${baseDefensesDestroyed} پدافند تخریب شد`;
            xpGain = 4;
            break;
        default:
            damageMessage = '💥 حمله موشکی انجام شد';
    }
    
    toast(`🚀 موشک ${missileName} به ${target.name} اصابت کرد! ${damageMessage}`, false, 'missile');
    player.xp = (player.xp || 0) + xpGain;
    player.lastMissileLaunch = ts();
    allPlayers[ti] = target;
    
    await saveCurrent();await queueSave();updateUI();
};

window.createOffer=async function(){
    if(!player) return;
    const res = document.getElementById('sellRes').value;
    const amount = parseInt(document.getElementById('sellAmt').value) || 50;
    const price = parseInt(document.getElementById('sellPrice').value) || 100;
    if(amount < 1 || price < 1){toast('مقادیر نامعتبر',true);return}
    const resMap = {oil:'oil', food:'food', metal:'metal', qualityMetal:'qualityMetal'};
    const key = resMap[res];
    if(!key || (player[key]||0) < amount){toast('منبع کافی نیست',true);return}
    player[key]=(player[key]||0)-amount;
    marketOffers.push({sellerId:player.id, resource:res, amount, price, time:ts()});
    await saveCurrent();updateUI();toast(`📢 آگهی ${res} ثبت شد`);
};

window.buyOffer=async function(index){
    if(!player) return;
    const offer = marketOffers[index];
    if(!offer){toast('آگهی حذف شده',true);return}
    if(offer.sellerId === player.id){toast('آگهی خودتان است',true);return}
    if((player.gold||0) < offer.price){toast('💰 طلا کافی نیست',true);return}
    const seller = allPlayers.find(p => p.id === offer.sellerId);
    if(!seller){toast('فروشنده یافت نشد',true);return}
    const resMap = {oil:'oil', food:'food', metal:'metal', 'فلز باکیفیت':'qualityMetal'};
    const key = resMap[offer.resource] || offer.resource;
    if(!key || (seller[key]||0) < offer.amount){toast('فروشنده منبع کافی ندارد',true);return}
    player.gold=(player.gold||0)-offer.price;
    seller.gold=(seller.gold||0)+offer.price;
    seller[key]=(seller[key]||0)-offer.amount;
    player[key]=(player[key]||0)+offer.amount;
    marketOffers.splice(index, 1);
    const si = allPlayers.findIndex(p => p.id === seller.id);
    if(si !== -1) allPlayers[si] = seller;
    await saveCurrent();await queueSave();updateUI();toast(`✅ ${offer.resource} خریداری شد`);
};

async function saveCurrent(){
    if(!player)return;
    player.lastActive=ts();
    const idx=allPlayers.findIndex(p=>p.id===player.id);
    if(idx!==-1)allPlayers[idx]={...player};
    else allPlayers.push({...player});
    await queueSave();
    updateUI();
}

window.renderRanking=async function(){
    await loadAll();
    const sorted=[...allPlayers].sort((a,b)=>militaryPower(b)-militaryPower(a));
    document.getElementById('rankContent').innerHTML=sorted.length===0?'<div class="empty">کشوری ثبت نشده</div>':
        sorted.map((p,i)=>`<div class="player-row"><div>${i+1}. ${p.name} ${p.id===player?.id?'(شما)':''} ${getTotalFighters(p)>0 ? '🛩️' : ''} ${getTotalMissiles(p)>0 ? '🚀' : ''} ${getNavalPower(p)>0 ? '⚓' : ''} ${getTotalHelicopters(p)>0 ? '🚁' : ''} ${p.alliance ? '🤝' : ''}</div><div>⚡ ${militaryPower(p)} 🎖️${p.militaryLevel||1} 👥${p.population||0} 🛡️${getDefensePower(p)} 🚀${getTotalMissiles(p)} ⚓${getNavalPower(p)} 🚁${getTotalHelicopters(p)}</div></div>`).join('');
};

// ==================== بک‌گراند ====================
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let particles = [];
for(let i = 0; i < 80; i++){
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5,
        opacity: Math.random() * 0.5 + 0.2
    });
}

function drawBackground(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width*0.7);
    gradient.addColorStop(0, 'rgba(20, 30, 60, 0.3)');
    gradient.addColorStop(0.5, 'rgba(10, 15, 30, 0.5)');
    gradient.addColorStop(1, 'rgba(2, 6, 23, 0.8)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if(p.x < 0) p.x = canvas.width;
        if(p.x > canvas.width) p.x = 0;
        if(p.y < 0) p.y = canvas.height;
        if(p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245, 158, 11, ${p.opacity})`;
        ctx.fill();
    });
    
    requestAnimationFrame(drawBackground);
}
drawBackground();

// ==================== شروع ====================
async function startGame(){
    const name=document.getElementById('playerName').value.trim();
    const pass=document.getElementById('playerPassword').value.trim();
    if(!name||name.length<3){toast('نام حداقل ۳ کاراکتر',true);return}
    if(!pass||pass.length<4){toast('رمز حداقل ۴ کاراکتر',true);return}
    document.getElementById('startBtn').disabled=true;
    await loadAll();
    let found=allPlayers.find(p=>p.name===name&&p.password===pass);
    if(found){
        player={...found,specialWeapons:found.specialWeapons||{},weaponResearchOrigin:found.weaponResearchOrigin||{},fighters:found.fighters||{},missiles:found.missiles||{},navals:found.navals||[],tankers:found.tankers||[],helicopters:found.helicopters||[],fuel:found.fuel||100,base:found.base||{level:1,storage:0,maxStorage:10000,defense:10,fighters:[],defenses:[]},consulates:(found.consulates||[]).map(c=>({...c,fighters:c.fighters||[],defenses:c.defenses||[]})),colonies:found.colonies||[],warDeclarations:found.warDeclarations||{},peaceOffers:found.peaceOffers||{},atWarWith:found.atWarWith||[],peaceWith:found.peaceWith||[],threats:found.threats||{},diplomacyChat:found.diplomacyChat||[],lastDiplomacyTime:found.lastDiplomacyTime||0,alliance:found.alliance||null,allianceName:found.allianceName||null,loans:found.loans||[],loanDebt:found.loanDebt||0,lastLoanCheck:found.lastLoanCheck||0,warStartTime:found.warStartTime||{}};
        player.lastActive=ts();
        if(canClaimDailyXP(player)){
            player.xp = (player.xp || 0) + 1;
            player.lastDailyXP = ts();
            toast('⭐ +۱ XP روزانه دریافت شد!');
        }
        toast(`👋 خوش آمدید ${name}`);
    }else if(allPlayers.some(p=>p.name===name)){toast('❌ این نام ثبت شده',true);document.getElementById('startBtn').disabled=false;return}
    else{
        player=createPlayer(name,pass);
        player.xp = 1;
        player.lastDailyXP = ts();
        player.militaryLevel = 1;
        player.base = {level:1,storage:0,maxStorage:10000,defense:10,fighters:[],defenses:[]};
        player.consulates = [];
        player.colonies = [];
        player.navals = [];
        player.tankers = [];
        player.helicopters = [];
        player.fuel = 100;
        player.warDeclarations = {};
        player.peaceOffers = {};
        player.atWarWith = [];
        player.peaceWith = [];
        player.missiles = {};
        player.threats = {};
        player.diplomacyChat = [];
        player.lastDiplomacyTime = 0;
        player.alliance = null;
        player.allianceName = null;
        player.loans = [];
        player.loanDebt = 0;
        player.lastLoanCheck = 0;
        player.warStartTime = {};
        toast(`🏴 کشور ${name} تأسیس شد! +۱ XP اولیه`);
    }
    document.getElementById('loginBox').style.display='none';
    document.getElementById('gameUI').style.display='block';
    await saveCurrent();updateUI();
    setInterval(async()=>{
        if(player){
            await loadAll();
            checkColonyRevolts();
            checkLoans();
            checkWarTimeouts();
            updateUI();
        }
    },45000);
}

document.getElementById('startBtn').onclick=startGame;
document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=async()=>{
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        const tn=tab.dataset.tab;
        const panelMap = {
            'city':'panelCity','military':'panelMilitary','fighters':'panelFighters',
            'missiles':'panelMissiles','naval':'panelNaval','helicopters':'panelHelicopters',
            'alliance':'panelAlliance','companies':'panelCompanies','research':'panelResearch',
            'market':'panelMarket','weapons':'panelWeapons','bases':'panelBases',
            'colonies':'panelColonies','diplomacy':'panelDiplomacy','rank':'panelRank'
        };
        document.getElementById(panelMap[tn]).classList.add('active');
        if(tn==='military')renderMilitary();
        if(tn==='rank')await window.renderRanking();
        if(tn==='fighters')renderFighters();
        if(tn==='missiles')renderMissiles();
        if(tn==='naval')renderNaval();
        if(tn==='helicopters')renderHelicopters();
        if(tn==='alliance')renderAlliance();
        if(tn==='bases')renderBases();
        if(tn==='colonies')renderColonies();
        if(tn==='diplomacy')renderDiplomacy();
    };
});
