// ==================== فیلتر کلمات نامناسب ====================
const BAD_WORDS = ['کوس', 'گوه', 'مادر', 'جنده', 'حرام', 'زن', 'پدر', 'سگ', 'خر', 'کونی', 'ممه', 'شاش', 'گوز', 'حیف', 'لعنت', 'نفرین', 'کش', 'بزن', 'بگو', 'برو', 'بیا', 'بریز', 'بپا', 'بشین'];

function filterMessage(msg){
    if(!msg || msg.trim() === '') return '';
    let filtered = msg;
    BAD_WORDS.forEach(word => {
        const regex = new RegExp(word, 'gi');
        filtered = filtered.replace(regex, '***');
    });
    if(filtered.length > MSG_MAX_LENGTH) filtered = filtered.substring(0, MSG_MAX_LENGTH) + '...';
    return filtered;
}

function isMessageValid(msg){
    if(!msg || msg.trim() === '') return false;
    if(msg.length < 3) return false;
    const filtered = filterMessage(msg);
    if(filtered.includes('***')) return false;
    return true;
}

function toast(m,e=false,type=''){
    const t=document.createElement('div');
    t.className='toast'+(e?' error':'')+(type==='war'?' war':'')+(type==='peace'?' peace':'')+(type==='missile'?' missile':'')+(type==='threat'?' threat':'')+(type==='diplomacy'?' diplomacy':'')+(type==='colony'?' colony':'')+(type==='naval'?' naval':'')+(type==='fuel'?' fuel':'')+(type==='alliance'?' alliance':'')+(type==='loan'?' loan':'')+(type==='un'?' un':'')+(type==='helicopter'?' helicopter':'');
    t.innerHTML=m;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000)
}
function ts(){return Date.now()}
function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min}
async function api(method,params={}){
    try{
        const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)});
        return await r.json();
    }catch(e){return{ok:false,error:e.message}}
}

// ==================== تلگرام ====================
async function initTelegram(){
    try{
        const b=await api('getMe');
        if(!b.ok){document.getElementById('syncStatus').innerHTML='❌ توکن نامعتبر';return false}
        const c=await api('getChat',{chat_id:CHANNEL_ID});
        if(!c.ok){document.getElementById('syncStatus').innerHTML='❌ ربات ادمین کانال نیست';return false}
        if(c.result.pinned_message&&c.result.pinned_message.text&&c.result.pinned_message.text.includes(DATA_KEY)){
            msgId=c.result.pinned_message.message_id;
        }
        if(!msgId){
            const init={key:DATA_KEY,players:[],weaponSales:[],marketOffers:[],diplomacy:[],unPeace:[],ts:ts()};
            const s=await api('sendMessage',{chat_id:CHANNEL_ID,text:`🌍 ${DATA_KEY}\n${JSON.stringify(init)}`});
            if(s.ok){
                msgId=s.result.message_id;
                await api('pinChatMessage',{chat_id:CHANNEL_ID,message_id:msgId,disable_notification:true});
            }
        }
        document.getElementById('syncStatus').innerHTML='✅ آنلاین | متصل به کانال';
        return true;
    }catch(e){
        document.getElementById('syncStatus').innerHTML='❌ خطا در اتصال';
        return false;
    }
}

async function saveAll(){
    if(!isConnected||!msgId)return;
    try{
        const d={key:DATA_KEY,players:allPlayers.map(p=>({...p,lastActive:p.lastActive||ts()})),weaponSales:globalWeaponSales,marketOffers:marketOffers,diplomacy:diplomacyMessages,unPeace:unPeaceMessages,ts:ts()};
        await api('editMessageText',{chat_id:CHANNEL_ID,message_id:msgId,text:`🌍 ${DATA_KEY}\n${JSON.stringify(d)}`});
        document.getElementById('syncStatus').innerHTML=`✅ ذخیره شد | ${allPlayers.length} کشور`;
    }catch(e){}
}

async function queueSave(){
    saveQueue.push(ts());
    if(saving)return;
    saving=true;
    while(saveQueue.length>0){
        saveQueue.shift();
        await saveAll();
        if(saveQueue.length>0)await new Promise(r=>setTimeout(r,1500));
    }
    saving=false;
}

async function loadAll(){
    if(!isConnected){
        isConnected=await initTelegram();
        if(!isConnected)return;
    }
    try{
        const c=await api('getChat',{chat_id:CHANNEL_ID});
        if(c.ok&&c.result.pinned_message&&c.result.pinned_message.text){
            let text = c.result.pinned_message.text;
            text = text.replace(`🌍 ${DATA_KEY}\n`,'');
            text = text.replace(`🌍 ${DATA_KEY}\\n`,'');
            try {
                const j=JSON.parse(text);
                if(j.key===DATA_KEY){
                    if(Array.isArray(j.players))allPlayers=j.players;
                    if(Array.isArray(j.weaponSales))globalWeaponSales=j.weaponSales;
                    if(Array.isArray(j.marketOffers))marketOffers=j.marketOffers;
                    if(Array.isArray(j.diplomacy))diplomacyMessages=j.diplomacy;

                }
            } catch(parseError) {

            }
        }
    }catch(e){}
}

function calcProduction(p){
    const hours=Math.min((ts()-(p.lastCollect||ts()))/3600000, 24);
    const baseOil = (p.buildings.oilWell || 1) * 25;
    const baseFood = (p.buildings.farm || 1) * 30;
    const baseMetal = (p.buildings.mine || 1) * 20;
    const baseGold = Math.max(10, p.population || 100) * 0.5;
    const ecoBonus = 1 + ((p.research?.economy || 0) * 0.1);
    let colonyTax = 0;
    if(p.colonies){
        p.colonies.forEach(c => {
            if(c.status === 'active'){
                colonyTax += Math.floor(c.population * 0.3);
            }
        });
    }
    let allianceBonus = 0;
    if(p.alliance){
        const members = allPlayers.filter(pl => pl.alliance === p.alliance && pl.id !== p.id);
        if(members.length > 0){
            allianceBonus = members.length * 50;
        }
    }
    return{
        oil:Math.floor(baseOil * hours * ecoBonus),
        food:Math.floor(baseFood * hours * ecoBonus),
        metal:Math.floor(baseMetal * hours * ecoBonus),
        gold:Math.floor(baseGold * hours * ecoBonus) + colonyTax + allianceBonus,
        qualityMetal:Math.floor((p.buildings.refinery||0) * 0.5 * hours)
    };
}
function storageCap(p){return (p.buildings.warehouse||1)*5000}

function getDefensePower(p){
    let defense = 0;
    if(p.base?.defenses){
        p.base.defenses.forEach(d => {
            if(d.hp > 0){
                defense += d.defense || 0;
            }
        });
    }
    if(p.consulates){
        p.consulates.forEach(c => {
            if(c.defenses){
                c.defenses.forEach(d => {
                    if(d.hp > 0){
                        defense += d.defense || 0;
                    }
                });
            }
        });
    }
    return defense;
}

function getMissileDefense(p){
    let defense = 0;
    if(p.base?.defenses){
        p.base.defenses.forEach(d => {
            if(d.hp > 0 && d.missileDefense){
                defense += d.missileDefense || 0;
            }
        });
    }
    if(p.consulates){
        p.consulates.forEach(c => {
            if(c.defenses){
                c.defenses.forEach(d => {
                    if(d.hp > 0 && d.missileDefense){
                        defense += d.missileDefense || 0;
                    }
                });
            }
        });
    }
    return Math.min(defense, 90);
}

function getNavalPower(p){
    let power = 0;
    if(p.navals){
        p.navals.forEach(n => {
            if(n.status === 'active' || n.status === 'damaged'){
                const nData = NAVAL_DB[n.type];
                if(nData){
                    let pwr = nData.power || 0;
                    if(nData.type === 'هواپیمابر' && n.fighters){
                        pwr += (n.fighters.length || 0) * 20;
                    }
                    power += pwr;
                }
            }
        });
    }
    return power;
}

function getTotalFuel(p){
    let total = p.fuel || 0;
    if(p.tankers){
        p.tankers.forEach(t => {
            total += t.fuel || 0;
        });
    }
    return total;
}

function getAllianceMembers(allianceName){
    if(!allianceName) return [];
    return allPlayers.filter(p => p.alliance === allianceName && p.id !== player?.id);
}

function getTotalHelicopters(p){
    return p.helicopters ? p.helicopters.length : 0;
}

function getHelicopterTransportCapacity(p){
    let capacity = 0;
    if(p.helicopters){
        p.helicopters.forEach(h => {
            const hData = HELICOPTERS_DB[h.type];
            if(hData && hData.transport){
                capacity += hData.transport;
            }
        });
    }
    return capacity;
}

function militaryPower(p){
    let power=(p.units?.infantry||0)*10+(p.units?.cavalry||0)*25+(p.units?.artillery||0)*50+((p.research?.military||0)*15);
    if(p.specialWeapons){
        for(const [name,qty] of Object.entries(p.specialWeapons)){
            if(FIGHTERS_DB[name]&&qty>0)power+=FIGHTERS_DB[name].power*qty;
        }
    }
    if(p.fighters){
        for(const [name,data] of Object.entries(p.fighters)){
            if(FIGHTERS_DB[name]&&data.count>0){
                const healthFactor = (data.health || 100) / 100;
                power += FIGHTERS_DB[name].power * data.count * healthFactor;
            }
        }
    }
    power += (p.base?.defense || 0) * 5;
    if(p.consulates){
        p.consulates.forEach(c => {
            power += (c.level || 1) * 3;
        });
    }
    power += getDefensePower(p) * 1.2;
    if(p.missiles){
        for(const [name,qty] of Object.entries(p.missiles)){
            if(MISSILES_DB[name]&&qty>0){
                power += MISSILES_DB[name].power * qty * 0.5;
            }
        }
    }
    power += getNavalPower(p) * 0.8;
    if(p.tankers){
        power += p.tankers.length * 5;
    }
    if(p.alliance){
        const members = getAllianceMembers(p.alliance);
        if(members.length > 0){
            power += members.length * 10;
        }
    }
    if(p.helicopters){
        p.helicopters.forEach(h => {
            const hData = HELICOPTERS_DB[h.type];
            if(hData){
                power += hData.power * 0.6;
            }
        });
    }
    return Math.floor(power);
}

function getTotalFighters(p){
    let total = 0;
    if(p.fighters){
        for(const [name,data] of Object.entries(p.fighters)){
            total += data.count || 0;
        }
    }
    return total;
}

function getTotalFightersInBases(p){
    let total = 0;
    if(p.base?.fighters) total += p.base.fighters.length;
    if(p.consulates){
        p.consulates.forEach(c => {
            if(c.fighters) total += c.fighters.length;
        });

    return total;
}

function getTotalMissiles(p){

    if(p.missiles){
        for(const [name,data] of Object.entries(p.missiles)){

        }
    }
    return total;
}

function isProtected(p){return(ts()-p.createdAt)<PROTECTION_HOURS*3600000}
function canAttack(p,targetId){
    const last=p.attackedRecently?.[targetId]||0;
    return(ts()-last)>ATTACK_COOLDOWN_HOURS*3600000;
}
function canSellWeapons(p){
    const last=p.lastWeaponSell||0;
    return(ts()-last)>WEAPON_SELL_COOLDOWN_HOURS*3600000;
}
function getTotalSpecialWeaponsGlobal(){
    return globalWeaponSales.reduce((sum,s)=>sum+(s.quantity||0),0);
}
function getPlayerResearchedWeapons(p){
    const available=[];
    for(const [name,data] of Object.entries(FIGHTERS_DB)){
        if((p.research?.aviation||0)>=data.requiredResearch&&p.weaponResearchOrigin&&p.weaponResearchOrigin[name]){
            available.push({name,...data});
        }
    }
    return available;
}
function canPlayerBuyWeapon(p,weaponName){
    const w=FIGHTERS_DB[weaponName];
    if(!w)return false;
    const totalGlobal=getTotalSpecialWeaponsGlobal();
    if(totalGlobal>=MAX_WEAPONS_GLOBAL)return false;
    return (p.gold||0)>=w.cost.gold&&(p.oil||0)>=w.cost.oil&&(p.metal||0)>=w.cost.metal&&(p.qualityMetal||0)>=w.cost.qualityMetal;
}
function getFighterGlobalCount(name){
    let count = 0;
    allPlayers.forEach(p => {
        if(p.fighters && p.fighters[name]) count += p.fighters[name].count || 0;
    });
    return count;
}
function canBuildFighter(p, name){
    const f = FIGHTERS_DB[name];
    if(!f) return false;
    if(getFighterGlobalCount(name) >= f.maxGlobal) return false;
    if((p.research?.aviation||0) < f.requiredResearch) return false;
    if((p.gold||0) < f.cost.gold || (p.oil||0) < f.cost.oil || (p.metal||0) < f.cost.metal || (p.qualityMetal||0) < f.cost.qualityMetal) return false;
    if(p.research?.aviation < FIGHTER_BUILD_BASE) return false;
    return true;
}

function getMissileGlobalCount(name){
    let count = 0;
    allPlayers.forEach(p => {
        if(p.missiles && p.missiles[name]) count += p.missiles[name] || 0;
    });
    return count;
}
function canBuildMissile(p, name){
    const m = MISSILES_DB[name];
    if(!m) return false;
    if(getMissileGlobalCount(name) >= m.maxGlobal) return false;
    if((p.research?.missile||0) < m.requiredResearch) return false;
    if((p.gold||0) < m.cost.gold || (p.oil||0) < m.cost.oil || (p.metal||0) < m.cost.metal || (p.qualityMetal||0) < m.cost.qualityMetal) return false;
    return true;
}

function getNavalGlobalCount(name){
    let count = 0;
    allPlayers.forEach(p => {
        if(p.navals){
            p.navals.forEach(n => {
                if(n.type === name) count++;
            });
        }
    });
    return count;
}
function canBuildNaval(p, name){
    const n = NAVAL_DB[name];
    if(!n) return false;
    if(getNavalGlobalCount(name) >= n.maxGlobal) return false;
    if((p.gold||0) < n.cost.gold || (p.oil||0) < n.cost.oil || (p.metal||0) < n.cost.metal || (p.qualityMetal||0) < n.cost.qualityMetal) return false;
    if(p.navals && p.navals.length >= MAX_NAVAL) return false;
    return true;
}

function canBuildTanker(p, name){
    const t = TANKER_DB[name];
    if(!t) return false;
    let count = 0;
    if(p.tankers){
        p.tankers.forEach(tk => {
            if(tk.type === name) count++;
        });
    }
    if(count >= t.maxGlobal) return false;
    if((p.gold||0) < t.cost.gold || (p.oil||0) < t.cost.oil || (p.metal||0) < t.cost.metal || (p.qualityMetal||0) < t.cost.qualityMetal) return false;
    return true;
}

function getHelicopterGlobalCount(name){
    let count = 0;
    allPlayers.forEach(p => {
        if(p.helicopters){
            p.helicopters.forEach(h => {
                if(h.type === name) count++;
            });
        }
    });
    return count;
}

function canBuildHelicopter(p, name){
    const h = HELICOPTERS_DB[name];
    if(!h) return false;
    if(getHelicopterGlobalCount(name) >= h.maxGlobal) return false;
    if((p.research?.helicopter||0) < 3) return false;
    if((p.gold||0) < h.cost.gold || (p.oil||0) < h.cost.oil || (p.metal||0) < h.cost.metal || (p.qualityMetal||0) < h.cost.qualityMetal) return false;
    return true;
}

function canClaimDailyXP(p){
    const now = new Date();
    const today = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
    return (p.lastDailyXP || 0) < new Date(today).getTime();
}

window.createAlliance = async function(){
    if(!player) return;
    if(player.alliance){toast('❌ شما قبلاً در یک اتحاد هستید',true);return;}
    const name = prompt('نام اتحادیه خود را وارد کنید:');
    if(!name || name.trim() === '') return;
    const exists = allPlayers.some(p => p.alliance === name.trim());
    if(exists){toast('❌ این نام قبلاً ثبت شده است',true);return;}
    if((player.gold||0) < 5000){toast('💰 ۵۰۰۰ طلا برای ایجاد اتحاد لازم است',true);return;}
    player.gold -= 5000;
    player.alliance = name.trim();
    player.allianceName = name.trim();
    toast(`🤝 اتحادیه ${name.trim()} با موفقیت ایجاد شد!`, false, 'alliance');
    await saveCurrent();
    renderAlliance();
    updateUI();
};

window.joinAlliance = async function(allianceName){
    if(!player) return;
    if(player.alliance){toast('❌ شما قبلاً در یک اتحاد هستید',true);return;}
    const members = allPlayers.filter(p => p.alliance === allianceName);
    if(members.length >= MAX_ALLIANCE_MEMBERS){toast(`❌ اتحادیه پر است (حداکثر ${MAX_ALLIANCE_MEMBERS})`,true);return;}
    if((player.gold||0) < 1000){toast('💰 ۱۰۰۰ طلا برای پیوستن لازم است',true);return;}
    player.gold -= 1000;
    player.alliance = allianceName;
    player.allianceName = allianceName;
    toast(`🤝 شما به اتحادیه ${allianceName} پیوستید!`, false, 'alliance');
    await saveCurrent();
    renderAlliance();
    updateUI();
};

window.leaveAlliance = async function(){
    if(!player || !player.alliance){toast('❌ شما در اتحاد نیستید',true);return;}
    if(!confirm('آیا از ترک اتحاد مطمئن هستید؟')) return;

};

window.allianceAttack = async function(targetId){
    if(!player || !player.alliance){toast('❌ شما در اتحاد نیستید',true);return;}
    if(!isWarDeclared(player, targetId)){toast('❌ ابتدا باید اعلان جنگ کنید',true);return;}
    const members = getAllianceMembers(player.alliance);
    if(members.length === 0){toast('❌ هیچ عضو دیگری در اتحاد نیست',true);return;}
    
    let totalDamage = 0;
    for(const member of members){
        const power = militaryPower(member);
        totalDamage += Math.floor(power * 0.3);
    }
    
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return;}
    
    const goldLoss = Math.min(totalDamage, target.gold || 0);
    target.gold = Math.max(0, (target.gold||0) - goldLoss);
    const oilLoss = Math.min(Math.floor(totalDamage/2), target.oil || 0);
    target.oil = Math.max(0, (target.oil||0) - oilLoss);
    
    const bonus = Math.floor(totalDamage / members.length);
    members.forEach(m => {
        const p = allPlayers.find(pl => pl.id === m.id);
        if(p) p.gold = (p.gold||0) + bonus;
    });
    
    toast(`⚔️ حمله گروهی به ${target.name}! ${goldLoss} طلا و ${oilLoss} نفت غارت شد`, false, 'alliance');
    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1) allPlayers[idx] = target;
    await saveCurrent();
    renderAlliance();
    updateUI();
};

// ==================== سیستم وام ====================
window.takeLoan = async function(){
    if(!player) return;
    if(player.loanDebt > 0){toast('❌ شما قبلاً بدهی دارید!',true);return;}
    const amount = parseInt(prompt(`مبلغ وام (حداکثر ${MAX_LOAN_AMOUNT} طلا، بهره روزانه ${Math.round(LOAN_INTEREST_RATE*100)}%):`));
    if(isNaN(amount) || amount < 100 || amount > MAX_LOAN_AMOUNT){toast('مبلغ نامعتبر',true);return;}
    
    if(!player.loans) player.loans = [];
    player.loans.push({
        amount: amount,
        takenAt: ts(),
        interest: LOAN_INTEREST_RATE,
        days: LOAN_DAYS,
        remaining: LOAN_DAYS
    });
    player.loanDebt += amount;
    player.gold = (player.gold||0) + amount;
    toast(`💰 وام ${amount} طلا دریافت شد! (${LOAN_DAYS} روز مهلت)`, false, 'loan');
    await saveCurrent();
    renderAlliance();
    updateUI();
};

window.payLoan = async function(){
    if(!player || player.loanDebt <= 0){toast('❌ بدهی ندارید',true);return;}
    const totalDebt = Math.floor(player.loanDebt * (1 + LOAN_INTEREST_RATE * LOAN_DAYS));
    if((player.gold||0) < totalDebt){
        toast(`💰 طلا کافی نیست! نیاز ${totalDebt} طلا`, true);
        return;
    }
    player.gold -= totalDebt;
    player.loanDebt = 0;
    if(player.loans) player.loans = [];
    toast(`✅ بدهی ${totalDebt} طلا پرداخت شد!`, false, 'loan');
    await saveCurrent();
    renderAlliance();
    updateUI();
};

function checkLoans(){
    if(!player || !player.loans) return;
    const now = ts();
    if((now - (player.lastLoanCheck||0)) < 3600000) return;
    player.lastLoanCheck = now;
    
    player.loans.forEach(loan => {
        loan.remaining -= 1/24;
        if(loan.remaining <= 0){
            const penalty = Math.floor(loan.amount * 0.05);
            player.loanDebt += penalty;
            loan.remaining = 1;
            toast(`⚠️ جریمه دیرکرد: ${penalty} طلا به بدهی شما اضافه شد`, false, 'loan');
        }
    });
    if(player.loanDebt > 20000) player.loanDebt = 20000;
}

// ==================== سیستم مستعمرات ====================
window.colonize = async function(targetId){
    if(!player) return;
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}
    if(!isWarDeclared(player, targetId)){toast('❌ ابتدا باید در جنگ باشید!',true);return}
    if(militaryPower(player) < militaryPower(target) * 2.5){
        toast('❌ قدرت شما کافی نیست! (حداقل ۲.۵ برابر)',true);
        return;
    }
    if(target.population > 35){
        toast('❌ جمعیت هدف زیاد است! (حداکثر ۳۵ نفر)',true);
        return;
    }
    if((player.gold||0) < COLONIZE_COST){
        toast(`💰 ${COLONIZE_COST} طلا لازم است`,true);
        return;
    }
    if((player.colonies || []).length >= MAX_COLONIES){
        toast(`❌ حداکثر ${MAX_COLONIES} مستعمره می‌توانید داشته باشید`,true);
        return;
    }
    if(player.colonies && player.colonies.some(c => c.countryId === targetId)){
        toast('❌ قبلاً این کشور را مستعمره کرده‌اید',true);
        return;
    }

    player.gold -= COLONIZE_COST;
    player.xp = (player.xp || 0) + 30;

    if(!player.colonies) player.colonies = [];
    player.colonies.push({
        countryId: targetId,
        countryName: target.name,
        colonizedAt: ts(),
        population: target.population,
        gold: target.gold,
        oil: target.oil,
        metal: target.metal,
        qualityMetal: target.qualityMetal || 0,
        status: 'active',
        rebellionChance: 15,
        taxRate: 30,
        garrison: 0,
        daysLeft: COLONY_AUTO_FREE_DAYS,
        cultureLevel: 1,
        loyalty: 70
    });

    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1){
        target.gold = Math.floor(target.gold * 0.2);
        target.oil = Math.floor(target.oil * 0.2);
        target.metal = Math.floor(target.metal * 0.2);
        target.qualityMetal = Math.floor((target.qualityMetal||0) * 0.2);
        target.population = Math.floor(target.population * 0.5);
        allPlayers[idx] = target;
    }

    await saveCurrent();
    toast(`🏛️ ${target.name} به مستعمره شما تبدیل شد! +۳۰ XP`, false, 'colony');
    renderColonies();
    updateUI();
};

window.freeColony = async function(index){
    if(!player || !player.colonies || index >= player.colonies.length) return;
    const colony = player.colonies[index];
    if(colony.status !== 'active'){toast('این مستعمره فعال نیست',true);return;}
    
    const cost = 5000 + (colony.population * 50);
    if((player.gold||0) < cost){
        toast(`💰 ${cost} طلا برای آزادی نیاز است`,true);
        return;
    }
    
    player.gold -= cost;
    
    const target = allPlayers.find(p => p.id === colony.countryId);
    if(target){
        target.gold += Math.floor(colony.gold * 0.5);
        target.population += Math.floor(colony.population * 0.5);
        target.peaceWith = target.peaceWith || [];
        if(!target.peaceWith.includes(player.id)) target.peaceWith.push(player.id);
        const idx = allPlayers.findIndex(p => p.id === colony.countryId);
        if(idx !== -1) allPlayers[idx] = target;
    }
    
    colony.status = 'freed';
    toast(`🕊️ ${colony.countryName} آزاد شد!`, false, 'peace');
    renderColonies();
    await saveCurrent();
    updateUI();
};

window.increaseCulture = async function(index){
    if(!player || !player.colonies || index >= player.colonies.length) return;
    const colony = player.colonies[index];
    if(colony.status !== 'active'){toast('مستعمره فعال نیست',true);return;}
    const cost = 3000 * colony.cultureLevel;
    if((player.gold||0) < cost){toast(`💰 ${cost} طلا لازم است`,true);return;}
    player.gold -= cost;
    colony.cultureLevel = (colony.cultureLevel || 1) + 1;
    colony.loyalty = Math.min(100, (colony.loyalty || 70) + 10);
    colony.rebellionChance = Math.max(5, (colony.rebellionChance || 15) - 3);
    toast(`🎭 سطح فرهنگ ${colony.countryName} افزایش یافت! وفاداری +۱۰`, false, 'colony');
    renderColonies();
    await saveCurrent();
    updateUI();
};

function renderColonies(){
    const c=document.getElementById('coloniesContent');
    if(!player) {
        c.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
        return;
    }
    
    let html = `
        <div class="section-title">🏛️ مستعمرات شما</div>
        <div class="info-bar">💰 هزینه استعمار: ${COLONIZE_COST} طلا | حداکثر ${MAX_COLONIES} مستعمره | آزادی خودکار بعد از ${COLONY_AUTO_FREE_DAYS} روز</div>
        <div class="info-bar">💰 مالیات: ۳۰٪ تولید مستعمره | 🛡️ خطر شورش: ۱۵٪ روزانه | 🎭 فرهنگ سطح وفاداری را افزایش می‌دهد</div>
    `;
    
    if(!player.colonies || player.colonies.length === 0){
        html += `<div class="empty">هیچ مستعمره‌ای ندارید</div>`;
    }else{
        const now = ts();
        player.colonies.forEach((colony, index) => {
            const daysPassed = Math.floor((now - colony.colonizedAt) / (24*3600000));
            const daysLeft = Math.max(0, COLONY_AUTO_FREE_DAYS - daysPassed);
            const isAlive = colony.status === 'active';
            const rebellionChance = colony.rebellionChance || 15;
            const loyalty = colony.loyalty || 70;
            
            html += `
                <div class="colony-card" style="border-color:${isAlive ? '#8b5cf6' : '#ef4444'}">
                    <div><strong>${colony.countryName}</strong> ${isAlive ? '<span class="badge badge-green">🟢 زنده</span>' : '<span class="badge badge-red">🔴 آزاد شد</span>'}</div>
                    <div style="font-size:0.6rem;color:#94a3b8">
                        👥 جمعیت: ${colony.population} | 💰 طلا: ${colony.gold} | 🛢️ نفت: ${colony.oil} | ⛏️ فلز: ${colony.metal}
                    </div>
                    <div style="font-size:0.6rem;color:#94a3b8">
                        📅 روزهای باقیمانده: ${daysLeft} روز | 🛡️ شورش: ${rebellionChance}% | ❤️ وفاداری: ${loyalty}% | 🎭 فرهنگ: ${colony.cultureLevel || 1}
                    </div>
                    <div style="font-size:0.6rem;color:#fbbf24">
                        💰 مالیات: ${Math.floor(colony.population * 0.3)} طلا/ساعت
                    </div>
                    ${isAlive ? `
                        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
                            <button class="btn-gold" onclick="sendGarrison(${index})">🛡️ اعزام نیرو (۲۰۰۰ طلا)</button>
                            <button class="btn-purple" onclick="increaseCulture(${index})">🎭 افزایش فرهنگ (${3000 * (colony.cultureLevel || 1)} طلا)</button>
                            <button class="btn-green" onclick="freeColony(${index})">🕊️ آزادی (${5000 + (colony.population * 50)} طلا)</button>
                            <button class="btn-red" onclick="abandonColony(${index})">🗑️ رها کردن</button>
                        </div>
                    ` : '<span class="badge badge-gray">آزاد شده</span>'}
                </div>
            `;
        });
    }
    
    const colonizable = allPlayers.filter(p => 
        p.id !== player.id && 
        !isProtected(p) && 
        isWarDeclared(player, p.id) &&
        militaryPower(player) >= militaryPower(p) * 2.5 &&
        p.population <= 35 &&
        !(player.colonies || []).some(c => c.countryId === p.id) &&
        (player.colonies || []).length < MAX_COLONIES
    );
    
    if(colonizable.length > 0){
        html += `<div class="section-title">🎯 کشورهای قابل استعمار</div>`;
        colonizable.forEach(p => {
            html += `
                <div class="player-row">
                    <div><strong>${p.name}</strong> 
                        <span class="badge badge-yellow">جنگ فعال</span>
                        <div style="font-size:0.6rem;color:#94a3b8">⚡ ${militaryPower(p)} | 👥 ${p.population}</div>
                    </div>
                    <button class="btn-colony" onclick="colonize('${p.id}')">🏛️ استعمار (${COLONIZE_COST} طلا)</button>
                </div>
            `;
        });
    }else{
        html += `<div class="empty">کشور قابل استعمار وجود ندارد</div>`;
    }
    
    c.innerHTML = html;
}

    if((player.gold||0) < 2000){toast('💰 ۲۰۰۰ طلا لازم است',true);return;}
    
    player.gold -= 2000;
    colony.garrison = (colony.garrison || 0) + 1;
    colony.rebellionChance = Math.max(5, (colony.rebellionChance || 15) - 5);

    toast(`🛡️ نیرو به ${colony.countryName} اعزام شد! (شورش ${colony.rebellionChance}%)`, false, 'colony');

};

window.abandonColony = async function(index){
    if(!player || !player.colonies || index >= player.colonies.length) return;
    const colony = player.colonies[index];
    if(colony.status !== 'active'){toast('این مستعمره فعال نیست',true);return;}
    if(!confirm(`آیا از رها کردن ${colony.countryName} مطمئن هستید؟`)) return;
    
    const target = allPlayers.find(p => p.id === colony.countryId);
    if(target){
        target.gold += Math.floor(colony.gold * 0.3);
        target.population += Math.floor(colony.population * 0.3);
        const idx = allPlayers.findIndex(p => p.id === colony.countryId);
        if(idx !== -1) allPlayers[idx] = target;
    }
    
    colony.status = 'abandoned';
    toast(`🗑️ ${colony.countryName} رها شد`, false, 'colony');
    renderColonies();
    await saveCurrent();
    updateUI();
};

function checkColonyRevolts(){
    if(!player || !player.colonies) return;
    const now = ts();
    player.colonies.forEach((colony, index) => {
        if(colony.status !== 'active') return;
        const daysPassed = Math.floor((now - colony.colonizedAt) / (24*3600000));
        if(daysPassed >= COLONY_AUTO_FREE_DAYS){
            colony.status = 'auto_freed';
            toast(`🕊️ ${colony.countryName} بعد از ${COLONY_AUTO_FREE_DAYS} روز آزاد شد!`, false, 'peace');
            return;
        }
        
        const loyaltyBonus = (colony.loyalty || 70) / 100;
        const chance = ((colony.rebellionChance || 15) + (daysPassed * 2)) * (1 - loyaltyBonus * 0.5);
        if(Math.random() * 100 < chance){
            colony.status = 'revolted';
            toast(`💥 شورش در ${colony.countryName}! مستعمره آزاد شد!`, false, 'war');
            const target = allPlayers.find(p => p.id === colony.countryId);
            if(target){
                target.gold += Math.floor(colony.gold * 0.5);
                target.population += Math.floor(colony.population * 0.5);
                target.atWarWith = target.atWarWith || [];
                if(!target.atWarWith.includes(player.id)) target.atWarWith.push(player.id);
                if(!target.warDeclarations) target.warDeclarations = {};
                target.warDeclarations[player.id] = { declaredAt: ts(), status: 'active' };
                const idx = allPlayers.findIndex(p => p.id === colony.countryId);
                if(idx !== -1) allPlayers[idx] = target;
            }
        }
    });
}

window.sendThreat=async function(targetId){
    if(!player) return;
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}
    if(!isWarDeclared(player, targetId)){
        toast('❌ ابتدا باید اعلان جنگ کنید!',true);
        return;
    }
    
    const now = ts();
    if((now - (player.lastDiplomacyTime||0)) < DIPLOMACY_COOLDOWN * 1000){
        toast(`⏳ لطفاً ${DIPLOMACY_COOLDOWN} ثانیه صبر کنید`, true);
        return;
    }
    
    const msg = prompt(`پیام تهدید خود را به ${target.name} بنویسید (حداکثر ${MSG_MAX_LENGTH} کاراکتر):`);
    if(!msg || msg.trim() === '') return;
    const filtered = filterMessage(msg);
    if(!isMessageValid(msg)){
        toast('❌ پیام نامناسب یا کوتاه است!', true);
        return;
    }
    
    player.lastDiplomacyTime = now;
    if(!player.threats) player.threats = {};
    if(!player.threats[targetId]) player.threats[targetId] = [];
    player.threats[targetId].push({from:player.id, msg:filtered, time:ts()});
    if(!target.threats) target.threats = {};
    if(!target.threats[player.id]) target.threats[player.id] = [];
    target.threats[player.id].push({from:player.id, msg:filtered, time:ts()});
    
    diplomacyMessages.push({from:player.id, to:targetId, type:'threat', msg:filtered, time:ts()});
    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1) allPlayers[idx] = target;
    await saveCurrent();
    toast(`🔴 تهدید به ${target.name} ارسال شد!`, false, 'threat');
    renderDiplomacy();
};

window.sendDiplomacy=async function(targetId){
    if(!player) return;
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}

        toast(`⏳ لطفاً ${DIPLOMACY_COOLDOWN} ثانیه صبر کنید`, true);

window.navalAttack = async function(targetId, navalIndex){
    if(!player || !player.navals || navalIndex >= player.navals.length) return;
    const naval = player.navals[navalIndex];
    if(naval.status !== 'active' && naval.status !== 'damaged'){
        toast('ناو فعال نیست',true);
        return;
    }
    
    if(naval.fuel < FUEL_PER_MOVE){
        toast('⛽ سوخت ناو کافی نیست!', true);
        return;
    }
    naval.fuel -= FUEL_PER_MOVE;
    
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(!isWarDeclared(player, targetId)){
        toast('❌ ابتدا باید اعلان جنگ کنید!',true);
        return;
    }
    if(!target.navals || target.navals.length === 0){
        toast('هدف ناو ندارد',true);
        return;
    }
    
    const hasFighter = getTotalFightersInBases(player) > 0 || (naval.fighters && naval.fighters.length > 0);
    const hasMissile = getTotalMissiles(player) > 0;
    if(!hasFighter && !hasMissile){
        toast('❌ برای حمله به ناو به جنگنده یا موشک نیاز دارید!', true);
        return;
    }
    
    const targetNaval = target.navals[0];
    const navalData = NAVAL_DB[naval.type];
    const targetData = NAVAL_DB[targetNaval.type];
    
    let attackPower = navalData.power || 50;
    if(navalData.type === 'هواپیمابر' && naval.fighters){
        attackPower += (naval.fighters.length || 0) * 20;
    }
    if(hasMissile) attackPower += 30;
    if(hasFighter) attackPower += 20;
    
    let targetPower = targetData.power || 50;
    if(targetData.type === 'هواپیمابر' && targetNaval.fighters){
        targetPower += (targetNaval.fighters.length || 0) * 20;
    }
    
    let missileDefense = 0;
    if(targetNaval.defenses){
        targetNaval.defenses.forEach(d => {
            if(d.hp > 0 && d.missileDefense){
                missileDefense += d.missileDefense || 0;
            }
        });
    }
    missileDefense = Math.min(missileDefense, 60);
    const isIntercepted = Math.random() * 100 < missileDefense;
    
    if(isIntercepted && hasMissile){
        toast(`🛡️ موشک شما توسط پدافند ${targetNaval.name} رهگیری شد!`, false, 'missile');
        return;
    }
    
    if(attackPower > targetPower){
        targetNaval.health -= 30;
        if(targetNaval.health <= 0){
            targetNaval.status = 'sunk';
            toast(`🎉 ${targetNaval.name} نابود شد!`, false, 'naval');
            const loot = Math.floor(target.gold * 0.2);
            target.gold -= loot;
            player.gold += loot;
            toast(`💰 ${loot} طلا غارت شد!`);
            player.xp = (player.xp || 0) + 10;
        }else{
            targetNaval.status = 'damaged';
            toast(`💥 ${targetNaval.name} آسیب دید!`, false, 'naval');
            player.xp = (player.xp || 0) + 3;
        }
    }else{
        naval.health -= 20;
        if(naval.health <= 0){
            naval.status = 'sunk';
            toast(`💔 ${naval.name} نابود شد!`, false, 'naval');
        }else{
            naval.status = 'damaged';
            toast(`💔 ${naval.name} آسیب دید!`, false, 'naval');
        }
    }
    
    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1) allPlayers[idx] = target;
    renderNaval();
    await saveCurrent();
    updateUI();
};

window.helicopterAttack = async function(targetId, helicopterIndex){
    if(!player || !player.helicopters || helicopterIndex >= player.helicopters.length) return;
    const heli = player.helicopters[helicopterIndex];
    const hData = HELICOPTERS_DB[heli.type];
    
    if(heli.status !== 'active'){
        toast('هلیکوپتر فعال نیست',true);
        return;
    }
    
    if(hData.type !== 'جنگی' && hData.type !== 'جنگی-ترابری' && hData.type !== 'شناسایی-جنگی'){
        toast('این هلیکوپتر جنگی نیست',true);
        return;
    }
    
    if(heli.fuel < HELICOPTER_FUEL_COST){
        toast(`⛽ سوخت کافی نیست! (نیاز ${HELICOPTER_FUEL_COST})`, true);
        return;
    }
    heli.fuel -= HELICOPTER_FUEL_COST;
    
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(!isWarDeclared(player, targetId)){
        toast('❌ ابتدا باید اعلان جنگ کنید!',true);
        return;
    }
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}
    
    const targetDefense = getDefensePower(target);
    const attackPower = hData.power * (heli.health / 100);
    const defensePower = targetDefense * 0.5 + 20;
    
    if(attackPower > defensePower){
        const damage = Math.floor(attackPower * 0.4);
        const goldLoss = Math.min(damage, target.gold || 0);
        target.gold = Math.max(0, (target.gold||0) - goldLoss);
        const oilLoss = Math.min(Math.floor(damage/2), target.oil || 0);
        target.oil = Math.max(0, (target.oil||0) - oilLoss);
        
        if(target.units){
            const infLoss = Math.floor(target.units.infantry * 0.15);
            target.units.infantry = Math.max(0, (target.units.infantry||0) - infLoss);
        }
        
        toast(`🚁 حمله هوایی به ${target.name}! ${goldLoss} طلا و ${oilLoss} نفت نابود شد`, false, 'helicopter');
        player.xp = (player.xp || 0) + 2;
        heli.missions = (heli.missions || 0) + 1;
    }else{
        heli.health -= 20;
        if(heli.health <= 0){
            heli.status = 'destroyed';
            toast(`💥 ${heli.name} در حمله نابود شد!`, true, 'helicopter');
        }else{
            toast(`💥 ${heli.name} آسیب دید! (سلامت: ${heli.health}%)`, true, 'helicopter');
        }
    }
    
    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1) allPlayers[idx] = target;
    renderHelicopters();
    await saveCurrent();
    updateUI();
};

            `;

    html += `<div class="section-title">🚁 عملیات ترابری</div>`;
    const transportHelis = player.helicopters?.filter(h => {

    }) || [];
    const allies = allPlayers.filter(p => p.id !== player.id && !isWarDeclared(player, p.id) && !isProtected(p));
    
    if(allies.length === 0){
        html += `<div class="empty">کشور برای ارسال نیرو وجود ندارد</div>`;
    }else if(transportHelis.length === 0){
        html += `<div class="empty">هلیکوپتر ترابری فعال ندارید</div>`;

        });
    }
    
    c.innerHTML = html;
}

// ==================== سیستم جنگ با تایمر ۲۴ ساعته و سازمان ملل ====================
function checkWarTimeouts(){
    if(!player) return;
    const now = ts();
    for(const [targetId, decl] of Object.entries(player.warDeclarations || {})){
        if(decl.status === 'active' && decl.declaredAt){
            const elapsed = (now - decl.declaredAt) / 3600000;
            if(elapsed >= WAR_DURATION_HOURS){
                const target = allPlayers.find(p => p.id === targetId);
                if(target){
                    decl.status = 'peace';
                    if(!player.peaceWith) player.peaceWith = [];
                    if(!player.peaceWith.includes(targetId)) player.peaceWith.push(targetId);
                    
                    if(target.warDeclarations && target.warDeclarations[player.id]){
                        target.warDeclarations[player.id].status = 'peace';
                    }
                    if(!target.peaceWith) target.peaceWith = [];
                    if(!target.peaceWith.includes(player.id)) target.peaceWith.push(player.id);
                    
                    const idx = allPlayers.findIndex(p => p.id === targetId);
                    if(idx !== -1) allPlayers[idx] = target;
                    
                    unPeaceMessages.push({
                        from: 'UN',
                        to: [player.id, targetId],
                        message: `🕊️ سازمان ملل متحد اعلام کرد: جنگ بین ${player.name} و ${target.name} پس از ${WAR_DURATION_HOURS} ساعت به پایان رسید. توافق صلح امضاء شد.`,
                        time: now
                    });
                    
                    toast(`🕊️ سازمان ملل: جنگ با ${target.name} پایان یافت! توافق صلح امضاء شد`, false, 'un');
                    updateUI();
                    saveCurrent();
                }
            }
        }
    }
}

    const p=calcProduction(player);

    document.getElementById('rQualityMetal').innerText=Math.floor((player.qualityMetal||0)+(p.qualityMetal||0));
    document.getElementById('rPop').innerText=player.population||0;
    document.getElementById('rXP').innerText=player.xp || 0;
    document.getElementById('rFuel').innerText=getTotalFuel(player);
    checkWarTimeouts();

    renderFighters();

    renderHelicopters();
    renderAlliance();
    renderCompanies();
    renderResearch();

    renderColonies();
    renderDiplomacy();
}

                html += `<div class="consulate-card"><strong>🏛️ کنسولگری ${con.countryName} (${con.fighters.length}/${MAX_FIGHTERS_PER_BASE})</strong>`;

function renderMarket(){
    const c=document.getElementById('marketContent');
    if(!player) {
        c.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
        return;
    }
    let offersHTML = '<div class="section-title">📊 آگهی‌های بازار</div>';
    if(marketOffers.length === 0){
        offersHTML += '<div class="empty">هیچ آگهی در بازار وجود ندارد</div>';
    }else{
        const now = ts();
        marketOffers = marketOffers.filter(o => (now - o.time) < 86400000);
        marketOffers.forEach((o, i) => {
            const seller = allPlayers.find(p => p.id === o.sellerId);
            offersHTML += `
                <div class="offer-item">
                    <div>${o.resource}: ${o.amount} واحد | قیمت: ${o.price} طلا</div>
                    <div style="font-size:0.55rem;color:#94a3b8">فروشنده: ${seller?.name || 'نامشخص'}</div>
                    ${o.sellerId !== player?.id ? `<button class="btn-green" onclick="buyOffer(${i})">خرید</button>` : '<span class="badge badge-yellow">آگهی شما</span>'}
                </div>
            `;
        });
    }
    
    c.innerHTML=`
        <div class="section-title">📊 بازار تبادل منابع</div>
        <div class="inline-form" style="margin-bottom:8px">
            <select id="sellRes"><option value="oil">نفت</option><option value="food">غذا</option><option value="metal">فلز</option><option value="qualityMetal">فلز باکیفیت</option></select>
            <input type="number" id="sellAmt" placeholder="مقدار..." min="1" value="50">

            <button class="btn-gold" onclick="createOffer()">📢 ثبت آگهی</button>
        </div>
        ${offersHTML}
    `;
}

function renderWeapons(){
    const c=document.getElementById('weaponsContent');
    if(!player) {
        c.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
        return;
    }
    const researchedWeapons=getPlayerResearchedWeapons(player);
    const canSell=canSellWeapons(player);
    const totalGlobal=getTotalSpecialWeaponsGlobal();
    
    const sellers=allPlayers.filter(p=>p.id!==player.id&&getPlayerResearchedWeapons(p).length>0);
    
    let sellSection='';
    if(researchedWeapons.length>0){
        sellSection=`
            <div class="section-title">🛒 فروش تسلیحات شما ${!canSell?'<span class="badge badge-red">کول‌داون</span>':''}</div>
            <div class="info-bar">کل تسلیحات فروخته شده در جهان: ${totalGlobal}/${MAX_WEAPONS_GLOBAL} <span class="limited-badge">محدود</span></div>
            ${researchedWeapons.map(w=>`
                <div class="weapon-card">
                    <h4>${w.icon} ${w.name} (قدرت: ${w.power})</h4>
                    <div style="font-size:0.6rem">💰 ${w.cost.gold} طلا | 🛢️ ${w.cost.oil} نفت | ⛏️ ${w.cost.metal} فلز | 💎 ${w.cost.qualityMetal} فلز باکیفیت</div>
                    <div style="font-size:0.6rem">نیاز به تحقیقات هوانوردی سطح ${w.requiredResearch}</div>
                    ${canSell&&totalGlobal<MAX_WEAPONS_GLOBAL?`<button class="btn-purple" onclick="sellWeapon('${w.name}')" style="margin-top:4px">📢 عرضه به بازار جهانی</button>`:`<span class="badge badge-yellow">${!canSell?'⏳ کول‌داون فروش':'❌ سقف جهانی پر شده'}</span>`}
                </div>
            `).join('')}
        `;
    }else{
        sellSection='<div class="empty">🔬 برای فروش تسلیحات باید تحقیق هوانوردی انجام دهید</div>';
    }
    
    let buySection='<div class="section-title">🛍️ خرید تسلیحات از کشورهای دیگر</div>';
    if(sellers.length===0){
        buySection+='<div class="empty">هیچ کشوری تسلیحات ویژه برای فروش ندارد</div>';
    }else{
        sellers.forEach(seller=>{
            const sellerWeapons=getPlayerResearchedWeapons(seller);
            sellerWeapons.forEach(w=>{
                const canBuy=canPlayerBuyWeapon(player,w.name)&&totalGlobal<MAX_WEAPONS_GLOBAL;
                buySection+=`
                    <div class="weapon-card">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">
                            <div>
                                <h4>${w.icon} ${w.name}</h4>
                                <div style="font-size:0.55rem">فروشنده: ${seller.name} | قدرت: ${w.power}</div>
                                <div style="font-size:0.55rem">💰 ${w.cost.gold} طلا | 🛢️ ${w.cost.oil} نفت | ⛏️ ${w.cost.metal} فلز | 💎 ${w.cost.qualityMetal} فلز باکیفیت</div>
                            </div>
                            ${canBuy?`<button class="btn-green" onclick="buyWeapon('${seller.id}','${w.name}')">خرید</button>`:'<span class="badge badge-red">ناکافی</span>'}
                        </div>
                    </div>
                `;
            });
        });
    }
    
    let currentWeapons='<div class="section-title">📦 زرادخانه شما</div>';
    if(player.specialWeapons&&Object.keys(player.specialWeapons).some(k=>player.specialWeapons[k]>0)){
        for(const [name,qty] of Object.entries(player.specialWeapons)){
            if(qty>0&&FIGHTERS_DB[name]){
                const origin=player.weaponResearchOrigin&&player.weaponResearchOrigin[name]?'<span class="badge badge-blue">تحقیق شخصی</span>':'<span class="badge badge-yellow">خریداری شده</span>';
                currentWeapons+=`<div class="player-row"><div>${FIGHTERS_DB[name].icon} ${name}: ${qty} عدد</div><div>${origin}</div></div>`;
            }
        }
    }else{
        currentWeapons+='<div class="empty">هنوز تسلیحات ویژه‌ای ندارید</div>';
    }
    
    c.innerHTML=sellSection+currentWeapons+buySection;
}

function renderBases(){
    const c=document.getElementById('basesContent');
    if(!player) {
        c.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
        return;
    }
    const base = player.base || {level:1,storage:0,maxStorage:10000,defense:10, fighters:[], defenses:[]};
    const consulates = player.consulates || [];
    
    let defenseHTML = `<div class="section-title">🛡️ پدافندهای پایگاه اصلی (${base.defenses?.length || 0})</div>`;
    if(base.defenses && base.defenses.length > 0){
        base.defenses.forEach((d, i) => {
            const dData = DEFENSES_DB[d.name];
            defenseHTML += `
                <div class="defense-card">
                    <div>${dData?.icon || '🛡️'} ${d.name} | دفاع: ${d.defense} | HP: ${d.hp}/${dData?.hp || 100} | 🚀 رهگیری: ${dData?.missileDefense || 0}%</div>
                    <div style="display:flex;gap:4px;flex-wrap:wrap">
                        ${d.hp < (dData?.hp || 100) ? `<button class="btn-green" onclick="repairDefense('main', ${i})">🔧 تعمیر (${FIGHTER_REPAIR_COST} طلا)</button>` : ''}
                        <button class="btn-red" onclick="removeDefense('main', ${i})">🗑️ حذف</button>
                    </div>
                </div>
            `;
        });
    } else {
        defenseHTML += `<div class="empty">هیچ پدافندی در پایگاه اصلی نصب نشده</div>`;
    }
    
    defenseHTML += `<div class="section-title">🛡️ ساخت پدافند برای پایگاه اصلی</div>`;
    defenseHTML += `<div class="fighter-grid">`;
    for(const [name, data] of Object.entries(DEFENSES_DB)){
        const canBuild = (player.gold||0) >= data.cost.gold && (player.oil||0) >= data.cost.oil && (player.metal||0) >= data.cost.metal && (player.qualityMetal||0) >= data.cost.qualityMetal;
        const currentCount = base.defenses?.filter(d => d.name === name).length || 0;
        defenseHTML += `
            <div class="fighter-card" style="border-color:${canBuild ? '#10b981' : '#ef4444'}">
                <div class="icon">${data.icon}</div>
                <div style="font-weight:bold;font-size:0.65rem">${name}</div>
                <div style="font-size:0.5rem;color:#fbbf24">دفاع: ${data.defense} | HP: ${data.hp} | 🚀 رهگیری: ${data.missileDefense || 0}%</div>
                <div style="font-size:0.5rem;color:#94a3b8">هر پایگاه: ${currentCount}/${data.maxPerBase}</div>
                <div style="font-size:0.5rem;color:#fbbf24">💰${data.cost.gold} 🛢️${data.cost.oil} ⛏️${data.cost.metal} 💎${data.cost.qualityMetal}</div>
                ${canBuild && currentCount < data.maxPerBase ? `<button class="btn-defense" onclick="buildDefense('main', '${name}')">🔨 نصب</button>` : 
                    `<span class="badge badge-red">${currentCount >= data.maxPerBase ? 'سقف پایگاه' : 'نیازها'}</span>`}
            </div>
        `;
    }
    defenseHTML += `</div>`;
    
    let consulateDefenseHTML = '';
    if(consulates.length > 0){
        consulates.forEach((con, idx) => {
            consulateDefenseHTML += `<div class="consulate-card"><strong>🏛️ کنسولگری ${con.countryName}</strong>`;
            consulateDefenseHTML += `<div class="section-title" style="font-size:0.65rem;border-color:#3b82f6">🛡️ پدافندها (${con.defenses?.length || 0})</div>`;
            if(con.defenses && con.defenses.length > 0){
                con.defenses.forEach((d, i) => {
                    const dData = DEFENSES_DB[d.name];
                    consulateDefenseHTML += `
                        <div class="defense-card">
                            <div>${dData?.icon || '🛡️'} ${d.name} | دفاع: ${d.defense} | HP: ${d.hp}/${dData?.hp || 100} | 🚀 رهگیری: ${dData?.missileDefense || 0}%</div>
                            <div style="display:flex;gap:4px;flex-wrap:wrap">
                                ${d.hp < (dData?.hp || 100) ? `<button class="btn-green" onclick="repairDefense('consulate', ${idx}, ${i})">🔧 تعمیر (${FIGHTER_REPAIR_COST} طلا)</button>` : ''}
                                <button class="btn-red" onclick="removeDefense('consulate', ${idx}, ${i})">🗑️ حذف</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                consulateDefenseHTML += `<div class="empty">هیچ پدافندی در این کنسولگری نصب نشده</div>`;
            }
            consulateDefenseHTML += `<div class="section-title" style="font-size:0.65rem;border-color:#3b82f6">🛡️ نصب پدافند در کنسولگری</div>`;
            consulateDefenseHTML += `<div class="fighter-grid" style="grid-template-columns:repeat(auto-fill,minmax(110px,1fr))">`;
            for(const [name, data] of Object.entries(DEFENSES_DB)){
                const canBuild = (player.gold||0) >= data.cost.gold && (player.oil||0) >= data.cost.oil && (player.metal||0) >= data.cost.metal && (player.qualityMetal||0) >= data.cost.qualityMetal;
                const currentCount = con.defenses?.filter(d => d.name === name).length || 0;
                consulateDefenseHTML += `
                    <div class="fighter-card" style="border-color:${canBuild ? '#10b981' : '#ef4444'};padding:6px">
                        <div class="icon" style="font-size:1.3rem">${data.icon}</div>
                        <div style="font-weight:bold;font-size:0.6rem">${name}</div>
                        <div style="font-size:0.45rem;color:#fbbf24">دفاع: ${data.defense}</div>
                        <div style="font-size:0.45rem;color:#94a3b8">${currentCount}/${data.maxPerBase}</div>
                        ${canBuild && currentCount < data.maxPerBase ? `<button class="btn-defense" onclick="buildDefense('consulate', '${name}', ${idx})">🔨 نصب</button>` : 
                            `<span class="badge badge-red">${currentCount >= data.maxPerBase ? 'سقف' : 'نیازها'}</span>`}
                    </div>
                `;
            }
            consulateDefenseHTML += `</div></div>`;
        });
    }
    
    let consulateHTML = '<div class="section-title">🏛️ کنسولگری‌ها</div>';
    if(consulates.length === 0){
        consulateHTML += '<div class="empty">هیچ کنسولگری ندارید</div>';
    }else{
        consulates.forEach((con, i) => {
            const target = allPlayers.find(p => p.id === con.countryId);
            const fighterCount = con.fighters?.length || 0;
            consulateHTML += `
                <div class="consulate-card">
                    <div><strong>${con.countryName}</strong> (سطح ${con.level || 1})</div>
                    <div style="font-size:0.6rem">💰 مالیات: ${(con.level || 1) * 50} طلا/ساعت | 🛩️ جنگنده: ${fighterCount}/${MAX_FIGHTERS_PER_BASE} | 🛡️ پدافند: ${con.defenses?.length || 0}</div>
                    <div style="display:flex;gap:4px;flex-wrap:wrap">
                        <button class="btn-gold" onclick="upgradeConsulate(${i})">⬆️ ارتقا (${(con.level||1)*800} طلا)</button>
                        <button class="btn-red" onclick="removeConsulate(${i})">🗑️ حذف</button>
                        ${target ? `<button class="btn-blue" onclick="viewConsulateInfo('${con.countryId}')">🔍 اطلاعات</button>` : ''}
                    </div>
                </div>
            `;
        });
    }
    
    let availableCountries = allPlayers.filter(p => p.id !== player.id && !consulates.some(c => c.countryId === p.id));
    let buildHTML = '';
    if(availableCountries.length > 0){
        buildHTML = `
            <div class="section-title">🏗️ ساخت کنسولگری جدید</div>
            <div class="inline-form">
                <select id="consulateTarget">
                    ${availableCountries.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}
                </select>
                <button class="btn-green" onclick="buildConsulate()">🔨 ساخت (۲۰۰۰ طلا)</button>
            </div>
        `;
    }else{
        buildHTML = '<div class="empty">✅ در همه کشورها کنسولگری دارید</div>';
    }
    
    c.innerHTML=`
        <div class="section-title">🏰 پایگاه اصلی</div>
        <div class="base-card">
            <div>سطح: ${base.level}</div>
            <div>ذخیره: ${base.storage}/${base.maxStorage}</div>
            <div>دفاع: ${base.defense}</div>
            <div>🛩️ جنگنده‌ها: ${base.fighters?.length || 0}/${MAX_FIGHTERS_PER_BASE}</div>
            <div>🛡️ پدافندها: ${base.defenses?.length || 0}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
                <button class="btn-gold" onclick="upgradeBase()">⬆️ ارتقا پایگاه (${base.level*1500} طلا)</button>
                <button class="btn-blue" onclick="depositToBase()">📥 واریز منابع</button>
                <button class="btn-purple" onclick="withdrawFromBase()">📤 برداشت منابع</button>
            </div>
        </div>
        ${defenseHTML}
        ${consulateDefenseHTML}
        ${consulateHTML}
        ${buildHTML}
    `;
}

function renderAlliance(){
    const c=document.getElementById('allianceContent');
    if(!player) {
        c.innerHTML = '<div class="loading">در حال بارگذاری...</div>';
        return;
    }
    
    let html = `<div class="section-title">🤝 اتحادیه‌ها</div>`;
    
    if(player.alliance){
        const members = getAllianceMembers(player.alliance);
        html += `
            <div class="alliance-card">
                <div><strong>${player.alliance}</strong> (${members.length + 1}/${MAX_ALLIANCE_MEMBERS} عضو)</div>
                <div style="font-size:0.6rem;color:#94a3b8">💰 بونوس: ${members.length * 50} طلا/ساعت از هر عضو</div>
                <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
                    <button class="btn-red" onclick="leaveAlliance()">🚪 ترک اتحاد</button>
                </div>
            </div>
        `;
        
        if(members.length > 0){
            html += `<div class="section-title">👥 اعضای اتحادیه</div>`;
            members.forEach(m => {
                html += `
                    <div class="player-row">
                        <div><strong>${m.name}</strong> ⚡${militaryPower(m)} 🚁${getTotalHelicopters(m)}</div>
                        <div style="display:flex;gap:4px">
                            ${isWarDeclared(player, m.id) ? 
                                `<button class="btn-peace" onclick="offerPeace('${m.id}')">🕊️ صلح</button>` :
                                `<button class="btn-gold" onclick="declareWar('${m.id}')">⚔️ اعلان جنگ</button>`
                            }
                            ${isWarDeclared(player, m.id) ? 
                                `<button class="btn-attack" onclick="allianceAttack('${m.id}')">⚔️ حمله گروهی</button>` : ''
                            }
                        </div>
                    </div>
                `;
            });
        }
    } else {
        const alliances = [...new Set(allPlayers.filter(p => p.alliance).map(p => p.alliance))];
        if(alliances.length === 0){
            html += `<div class="empty">هیچ اتحادیه‌ای وجود ندارد</div>`;
        } else {
            alliances.forEach(ally => {
                const members = allPlayers.filter(p => p.alliance === ally);
                html += `
                    <div class="alliance-card">
                        <div><strong>${ally}</strong> (${members.length}/${MAX_ALLIANCE_MEMBERS})</div>
                        <div style="font-size:0.55rem;color:#94a3b8">${members.map(p => p.name).join(', ')}</div>
                        <button class="btn-alliance" onclick="joinAlliance('${ally}')">🤝 پیوستن (۱۰۰۰ طلا)</button>
                    </div>
                `;
            });
        }
        html += `<button class="btn-gold" onclick="createAlliance()" style="margin-top:8px;width:100%">🏛️ ایجاد اتحادیه جدید (۵۰۰۰ طلا)</button>`;
    }
    
    html += `<div class="section-title">💰 سیستم وام</div>`;
    html += `
        <div class="loan-card">
            <div style="font-size:0.6rem">💰 بدهی فعلی: ${Math.floor(player.loanDebt)} طلا</div>
            <div style="font-size:0.6rem;color:#94a3b8">حداکثر وام: ${MAX_LOAN_AMOUNT} طلا | بهره روزانه: ${Math.round(LOAN_INTEREST_RATE*100)}%</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
                ${player.loanDebt <= 0 ? `<button class="btn-loan" onclick="takeLoan()">💰 دریافت وام</button>` : 
                    `<button class="btn-green" onclick="payLoan()">✅ تسویه بدهی</button>`
                }
            </div>
        </div>
    `;
    
    c.innerHTML = html;
}

                    <div><strong>${p.name}</strong> ${warStatus ? `<span class="badge ${warStatus.status === 'active' ? 'badge-red' : 'badge-yellow'}">${warStatus.message}</span>` : ''}</div>
                    <div style="display:flex;gap:4px;flex-wrap:wrap">
                        <button class="btn-diplomacy" onclick="sendDiplomacy('${p.id}')">🤝 دیپلماسی</button>
                        ${warStatus?.status === 'active' ? `<button class="btn-threat" onclick="sendThreat('${p.id}')">🔴 تهدید</button>` : ''}
                    </div>
                </div>
            `;
        });
    }
    
    html += `<div class="section-title">📩 پیام‌های دیپلماتیک</div>`;
    const playerMessages = diplomacyMessages.filter(m => m.to === player.id || m.from === player.id).slice(-20);
    if(playerMessages.length === 0){
        html += `<div class="empty">هیچ پیامی وجود ندارد</div>`;
    } else {
        playerMessages.reverse().forEach(m => {
            const sender = allPlayers.find(p => p.id === m.from);
            const isThreat = m.type === 'threat';
            html += `
                <div class="chat-bubble" style="border-right-color:${isThreat ? '#ef4444' : '#3b82f6'}">
                    <div style="font-size:0.55rem;color:#fbbf24">${sender?.name || 'نامشخص'} ${isThreat ? '🔴' : '💬'}</div>
                    <div style="font-size:0.6rem">${m.msg}</div>
                    <div style="font-size:0.45rem;color:#94a3b8">${new Date(m.time).toLocaleTimeString()}</div>
                </div>
            `;
        });
    }
    
    c.innerHTML = html;
}

// ==================== سیستم جنگ و صلح ====================
function isWarDeclared(p, targetId){
    return p.warDeclarations && p.warDeclarations[targetId] && p.warDeclarations[targetId].status !== 'peace';
}

function canDeclareWar(p, targetId){
    if(isProtected(p)) return false;
    const target = allPlayers.find(pl => pl.id === targetId);
    if(!target || isProtected(target)) return false;
    if((p.gold||0) < WAR_DECLARE_COST) return false;
    if(isWarDeclared(p, targetId)) return false;
    if(p.peaceWith && p.peaceWith.includes(targetId)) return false;
    if(p.alliance && target.alliance === p.alliance){
        toast('❌ شما در یک اتحاد هستید!', true);
        return false;
    }
    return true;
}

function canAttackAfterDeclaration(p, targetId){
    const decl = p.warDeclarations?.[targetId];
    if(!decl) return false;
    if(decl.status === 'active') return true;
    if(decl.status === 'ready' && ts() >= (decl.readyAt||0)){
        decl.status = 'active';
        return true;
    }
    if(decl.status === 'pending' && ts() >= (decl.readyAt||0)){
        decl.status = 'active';
        return true;
    }
    return false;
}

function getWarStatus(p, targetId){
    const decl = p.warDeclarations?.[targetId];
    if(!decl) return null;
    if(decl.status === 'peace') return { status: 'peace', message: '🕊️ صلح' };
    if(decl.status === 'pending'){
        const readyAt = decl.readyAt || decl.declaredAt + WAR_READY_HOURS*3600000;
        const remaining = Math.max(0, readyAt - ts());
        const hours = Math.ceil(remaining / 3600000);
        return { status: 'pending', message: `⏳ ${hours} ساعت تا آماده‌سازی` };
    }
    if(decl.status === 'active' || decl.status === 'ready'){
        const readyAt = decl.readyAt || decl.declaredAt;
        const elapsed = ts() - readyAt;
        const remaining = Math.max(0, WAR_DURATION_HOURS * 3600000 - elapsed);
        const hours = Math.ceil(remaining / 3600000);
        return { status: 'active', message: `⚔️ جنگ فعال (${hours} ساعت تا مداخله سازمان ملل)` };
    }
    return null;
}

window.declareWar=async function(targetId){
    if(!canDeclareWar(player, targetId)){
        toast('❌ امکان اعلان جنگ وجود ندارد', true);
        return;
    }
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    if(target.alliance === player.alliance && target.alliance){
        toast('❌ شما در یک اتحاد هستید!',true);
        return;
    }
    
    player.gold=(player.gold||0)-WAR_DECLARE_COST;
    if(!player.warDeclarations) player.warDeclarations = {};
    const now = ts();
    const readyAt = now + WAR_READY_HOURS * 3600000;
    player.warDeclarations[targetId] = {
        declaredAt: now,
        readyAt: readyAt,
        status: 'pending'
    };
    player.warStartTime[targetId] = now;
    
    if(player.peaceWith) {
        player.peaceWith = player.peaceWith.filter(id => id !== targetId);
    }
    
    await saveCurrent();updateUI();
    toast(`📢 اعلان جنگ علیه ${target.name}! ${WAR_READY_HOURS} ساعت تا شروع جنگ (${WAR_DURATION_HOURS} ساعت زمان جنگ)`, false, 'war');
};

window.cancelWarDeclaration=async function(targetId){
    if(!player.warDeclarations?.[targetId]){toast('اعلان جنگی یافت نشد',true);return}
    const target = allPlayers.find(p => p.id === targetId);
    delete player.warDeclarations[targetId];
    delete player.warStartTime[targetId];
    await saveCurrent();updateUI();
    toast(`❌ اعلان جنگ علیه ${target?.name || 'کشور'} لغو شد`);
};

window.offerPeace=async function(targetId){
    const target = allPlayers.find(p => p.id === targetId);
    if(!target){toast('کشور یافت نشد',true);return}
    
    if(!player.warDeclarations?.[targetId] || player.warDeclarations[targetId].status === 'peace'){
        toast('❌ در جنگ با این کشور نیستید', true);
        return;
    }
    
    if(!target.peaceOffers) target.peaceOffers = {};
    target.peaceOffers[player.id] = {
        offeredAt: ts(),
        status: 'pending'
    };
    
    const idx = allPlayers.findIndex(p => p.id === targetId);
    if(idx !== -1) allPlayers[idx] = target;
    
    await saveCurrent();updateUI();
    toast(`🕊️ پیشنهاد صلح به ${target.name} ارسال شد`, false, 'peace');
};

window.acceptPeace=async function(targetId){
    if(!player.peaceOffers?.[targetId] || player.peaceOffers[targetId].status !== 'pending'){
        toast('پیشنهاد صلح یافت نشد', true);
        return;
    }
    
    const target = allPlayers.find(p => p.id === targetId);
    player.peaceOffers[targetId].status = 'accepted';
    
    if(player.warDeclarations && player.warDeclarations[targetId]){
        player.warDeclarations[targetId].status = 'peace';
    }
    if(!player.peaceWith) player.peaceWith = [];
    if(!player.peaceWith.includes(targetId)) player.peaceWith.push(targetId);
    
    if(player.atWarWith) {
        player.atWarWith = player.atWarWith.filter(id => id !== targetId);
    }
    delete player.warStartTime[targetId];
    
    if(target){
        if(target.warDeclarations && target.warDeclarations[player.id]){
            target.warDeclarations[player.id].status = 'peace';
        }
        if(!target.peaceWith) target.peaceWith = [];
        if(!target.peaceWith.includes(player.id)) target.peaceWith.push(player.id);
        if(target.atWarWith) {
            target.atWarWith = target.atWarWith.filter(id => id !== player.id);
        }
        const idx = allPlayers.findIndex(p => p.id === targetId);
        if(idx !== -1) allPlayers[idx] = target;
    }
    
    await saveCurrent();updateUI();
    toast(`🕊️ صلح با ${target?.name || 'کشور'} برقرار شد`, false, 'peace');
};

window.rejectPeace=async function(targetId){

};

// ==================== حمله ====================
window.attackPlayer=async function(targetId){
    if(!canAttackAfterDeclaration(player, targetId)){
        toast(`⏳ ابتدا اعلان جنگ کنید و ${WAR_READY_HOURS} ساعت صبر کنید`, true);
        return;
    }
    if(!canAttack(player,targetId)){toast('⏳ کول‌داون حمله فعال است!',true);return}
    await loadAll();
    const ti=allPlayers.findIndex(p=>p.id===targetId);
    if(ti===-1){toast('کشور یافت نشد',true);return}
    const target=allPlayers[ti];
    if(isProtected(target)){toast('🛡️ این کشور در دوره محافظت است',true);return}
    
    const warElapsed = player.warStartTime[targetId] ? (ts() - player.warStartTime[targetId]) / 3600000 : 0;
    if(warElapsed >= WAR_DURATION_HOURS){
        toast('⏳ این جنگ به پایان رسیده است! سازمان ملل مداخله کرده', true);
        return;
    }
    
    const attackType = document.getElementById('attackType')?.value || 'normal';
    let ap=militaryPower(player);
    let dp=militaryPower(target);
    const targetDefense = getDefensePower(target);
    dp += targetDefense * 0.8;
    
    if(player.alliance){
        const members = getAllianceMembers(player.alliance);
        ap += members.length * 15;
    }
    
    player.attackedRecently[targetId]=ts();
    player.lastWarAction = ts();
    
    if(attackType === 'population' && getTotalFightersInBases(player) === 0){
        toast('❌ برای حمله ضد انسانی به جنگنده نیاز دارید!', true);
        return;
    }
    
    if(attackType === 'base' && getTotalFightersInBases(player) === 0){
        toast('❌ برای حمله به پایگاه باید حداقل یک جنگنده داشته باشید!', true);
        return;
    }
    
    let defenseDestroyed = 0;
    if(attackType === 'base' || attackType === 'normal'){
        if(target.base?.defenses){
            target.base.defenses.forEach((d, idx) => {
                if(d.hp > 0){
                    const damage = Math.floor((ap / (dp + 1)) * 30 + 10);
                    d.hp = Math.max(0, d.hp - damage);
                    if(d.hp <= 0) defenseDestroyed++;
                }
            });
            target.base.defenses = target.base.defenses.filter(d => d.hp > 0);
        }
        if(target.consulates){
            target.consulates.forEach(con => {
                if(con.defenses){
                    con.defenses.forEach(d => {
                        if(d.hp > 0){
                            const damage = Math.floor((ap / (dp + 1)) * 20 + 5);
                            d.hp = Math.max(0, d.hp - damage);
                            if(d.hp <= 0) defenseDestroyed++;
                        }
                    });
                    con.defenses = con.defenses.filter(d => d.hp > 0);
                }
            });
        }
    }
    
    let fightersDestroyed = 0;
    if(attackType === 'base'){
        if(target.base?.fighters){
            const fighterPower = target.base.fighters.reduce((sum, f) => {
                const fData = FIGHTERS_DB[f.name];
                return sum + (fData ? fData.power : 0) * (f.health / 100);
            }, 0);
            const powerRatio = ap / (dp + 1);
            const destroyCount = Math.floor(target.base.fighters.length * powerRatio * 0.4);
            const actualDestroy = Math.min(destroyCount, target.base.fighters.length);
            for(let i = 0; i < actualDestroy; i++){
                const f = target.base.fighters[i];
                if(f && player.fighters && f.name){
                    if(player.fighters[f.name]) {
                        player.fighters[f.name].count = (player.fighters[f.name].count || 0) + 1;
                    } else {
                        player.fighters[f.name] = {count: 1, health: 100};
                    }
                }
            }
            target.base.fighters.splice(0, actualDestroy);
            fightersDestroyed += actualDestroy;
        }
        if(target.consulates){
            target.consulates.forEach(con => {
                if(con.fighters){
                    const fighterPower = con.fighters.reduce((sum, f) => {
                        const fData = FIGHTERS_DB[f.name];
                        return sum + (fData ? fData.power : 0) * (f.health / 100);
                    }, 0);
                    const powerRatio = ap / (dp + 1);
                    const destroyCount = Math.floor(con.fighters.length * powerRatio * 0.3);
                    const actualDestroy = Math.min(destroyCount, con.fighters.length);
                    for(let i = 0; i < actualDestroy; i++){
                        const f = con.fighters[i];
                        if(f && player.fighters && f.name){
                            if(player.fighters[f.name]) {
                                player.fighters[f.name].count = (player.fighters[f.name].count || 0) + 1;
                            } else {
                                player.fighters[f.name] = {count: 1, health: 100};
                            }
                        }
                    }
                    con.fighters.splice(0, actualDestroy);
                    fightersDestroyed += actualDestroy;
                }
            });
        }
    }
    
    if(attackType === 'normal'){
        if(ap > dp){
            const stolen={gold:Math.floor(target.gold*0.65),oil:Math.floor(target.oil*0.65),food:Math.floor(target.food*0.65),metal:Math.floor(target.metal*0.65),qualityMetal:Math.floor((target.qualityMetal||0)*0.5)};
            player.gold=(player.gold||0)+stolen.gold;
            player.oil=(player.oil||0)+stolen.oil;
            player.food=(player.food||0)+stolen.food;
            player.metal=(player.metal||0)+stolen.metal;
            player.qualityMetal=(player.qualityMetal||0)+(stolen.qualityMetal||0);
            target.gold=Math.max(0,target.gold-stolen.gold);
            target.oil=Math.max(0,target.oil-stolen.oil);
            target.food=Math.max(0,target.food-stolen.food);
            target.metal=Math.max(0,target.metal-stolen.metal);
            target.qualityMetal=Math.max(0,(target.qualityMetal||0)-(stolen.qualityMetal||0));
            toast(`🎉 پیروزی! غارت ۶۵٪ منابع ${target.name}`);
            player.xp = (player.xp || 0) + 1;
        }else{
            player.gold=Math.max(0,(player.gold||0)-Math.floor((player.gold||0)*0.15));
            player.oil=Math.max(0,(player.oil||0)-Math.floor((player.oil||0)*0.15));
            toast(`💔 شکست مقابل ${target.name}`,true);
        }
    } else if(attackType === 'base'){
        toast(`🏰 حمله به پایگاه‌ها! ${fightersDestroyed} جنگنده نابود شد، ${defenseDestroyed} پدافند تخریب شد`);
        player.xp = (player.xp || 0) + 2;
        if(fightersDestroyed > 0){
            toast(`🛩️ ${fightersDestroyed} جنگنده از ${target.name} تصرف شد!`);
        }
    } else if(attackType === 'population'){
        if(ap > dp * 0.6){
            const popLoss = Math.floor(target.population * (ap / (dp + 100)) * 0.3);
            const actualLoss = Math.min(popLoss, Math.floor(target.population * 0.4));
            target.population = Math.max(10, target.population - actualLoss);
            toast(`☠️ حمله ضد انسانی! ${actualLoss} نفر از جمعیت ${target.name} کشته شدند`);
            player.xp = (player.xp || 0) + 2;
        }else{
            toast(`💔 حمله ضد انسانی شکست خورد`, true);
            player.population = Math.max(10, (player.population||0) - Math.floor((player.population||0) * 0.05));
        }
    }
    
    const myLoss = Math.floor((player.units.infantry||0)*0.1+(player.units.cavalry||0)*0.15+(player.units.artillery||0)*0.2);
    player.units.infantry=Math.max(0,(player.units.infantry||0)-Math.floor(myLoss*0.5));
    player.units.cavalry=Math.max(0,(player.units.cavalry||0)-Math.floor(myLoss*0.3));
    player.units.artillery=Math.max(0,(player.units.artillery||0)-Math.floor(myLoss*0.2));
    
    allPlayers[ti]=target;
    await saveCurrent();await queueSave();updateUI();
};

window.buildFighter=async function(name){
    const f = FIGHTERS_DB[name];
    if(!f){toast('جنگنده نامعتبر',true);return}
    if(!canBuildFighter(player, name)){toast('❌ شرایط ساخت فراهم نیست (نیاز به هوانوردی سطح '+FIGHTER_BUILD_BASE+')',true);return}
    
    const baseOptions = [{type:'main', label:'پایگاه اصلی', fighters: player.base?.fighters?.length || 0}];
    if(player.consulates){
        player.consulates.forEach((con, i) => {
            baseOptions.push({type:'consulate', index:i, label:`کنسولگری ${con.countryName}`, fighters: con.fighters?.length || 0});
        });
    }
    
    let selectedBase = null;
    for(const opt of baseOptions){
        if(opt.fighters < MAX_FIGHTERS_PER_BASE){
            selectedBase = opt;
            break;
        }
    }
    
    if(!selectedBase){
        toast('❌ همه پایگاه‌ها پر هستند!', true);
        return;
    }
    
    player.gold=(player.gold||0)-f.cost.gold;
    player.oil=(player.oil||0)-f.cost.oil;
    player.metal=(player.metal||0)-f.cost.metal;
    player.qualityMetal=(player.qualityMetal||0)-f.cost.qualityMetal;
    
    const fighter = { name: name, health: 100 };
    if(selectedBase.type === 'main'){
        if(!player.base.fighters) player.base.fighters = [];
        player.base.fighters.push(fighter);
    } else if(selectedBase.type === 'consulate'){
        const con = player.consulates[selectedBase.index];
        if(!con.fighters) con.fighters = [];
        con.fighters.push(fighter);
    }
    
    if(!player.fighters) player.fighters = {};
    if(!player.fighters[name]) player.fighters[name] = {count:0, health:100};
    player.fighters[name].count++;
    
    player.xp = (player.xp || 0) + 3;
    await saveCurrent();updateUI();
    toast(`🛩️ ${name} ساخته شد و در ${selectedBase.label} مستقر شد! +۳ XP`);
};
