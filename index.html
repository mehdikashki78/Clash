            "S-400": { n: "S-400", i: "🇷🇺", c: { g: 25000, o: 8000, m: 6000 }, def: 150, hp: 200 },
            "Khordad": { n: "خرداد-۱۵", i: "🇮🇷", c: { g: 8000, o: 2000, m: 1500 }, def: 60, hp: 100 },
            "Bavar": { n: "باور-۳۷۳", i: "🇮🇷", c: { g: 15000, o: 4500, m: 3000 }, def: 100, hp: 150 }
        };

        const FACTIONS_DB = {
            "sky_knights": { n: "شوالیه‌های آسمان", i: "🛡️" },
            "red_baron": { n: "بارون‌های سرخ", i: "🌹" },
            "iron_cross": { n: "صلیب‌های آهنین", i: "✠" },
            "grey_wolves": { n: "گرگ‌های خاکستری", i: "🐺" },
            "desert_falcons": { n: "شاهین‌های صحرا", i: "🦅" },
            "sky_phantoms": { n: "شبح‌های آسمان", i: "👻" }
        };

        /* ===== متغیرهای وضعیت ===== */
        let player = null;
        let allPlayers = [];
        let marketOffers = [];
        let battleLogs = [];
        let chatMessages = [];
        let isConnected = false;
        let saving = false;
        let isAttacking = false;
        let globalBanner = "";
        let chatLocked = false;
        let mineTimer = null;
        let activeTab = "mine";

        /* ===== توابع کمکی ===== */
        function toast(m, e = false, type = "") {
            const t = document.createElement("div");
            t.className = "toast" + (e ? " error" : "") + (type ? " " + type : "");
            t.innerHTML = m;
            document.body.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 4500);
        }
        function ts() { return Date.now(); }
        function escapeHtml(str) { return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function isAdmin() { return player && player.name === ADMIN_NAME && player.password === ADMIN_PASS; }

        function getFormattedName(p) {
            const facTag = p.faction ? `<span style="color: #ef4444; font-size: 0.8em; margin-right: 4px;">[${FACTIONS_DB[p.faction]?.n || p.faction}]</span>` : '';
            if (p.name === ADMIN_NAME) {
                return `<span style="color: #3b82f6; font-weight: bold;">🚬 ${escapeHtml(p.name)}</span> ${facTag}`;
            }
            return `${escapeHtml(p.name)} ${facTag}`;
        }

        function timeToFull(current, rate, cap) {
            if (rate <= 0) return '∞';
            const remaining = cap - current;
            if (remaining <= 0) return '✅ پر';
            const secs = Math.ceil(remaining / rate);
            if (secs >= 3600) return Math.floor(secs / 3600) + 'س ' + Math.floor((secs % 3600) / 60) + 'د';
            if (secs >= 60) return Math.floor(secs / 60) + 'د ' + (secs % 60) + 'ث';
            return secs + ' ثانیه';
        }

        function syncPlayerToAllPlayers() {
            if (!player) return;
            const idx = allPlayers.findIndex(p => p.id === player.id);
            if (idx >= 0) allPlayers[idx] = { ...player };
        }

        /* ===== سوپابیس: اتصال، ذخیره، بارگذاری ===== */
        async function initSupabase() {
            updateSyncUI("🔌 در حال اتصال به دیتابیس...", "warn");
            try {
                const { data, error } = await db.from('game_state').select('id').eq('id', 'main_game').maybeSingle();
                if (error) throw error;
                isConnected = true;
                updateSyncUI("✅ متصل به سرور", "online");
                return true;
            } catch (e) {
                console.error(e);
                updateSyncUI("❌ خطا در اتصال", "error");
                return false;
            }
        }

        function updateSyncUI(text, status) {
            document.getElementById("syncText").innerText = text;
            const ob = document.getElementById("onlineBar");
            ob.classList.remove("offline", "warn");
            if (status === "error") ob.classList.add("offline");
            else if (status === "warn") ob.classList.add("warn");
            document.getElementById("onlineText").innerText = text;
        }

        function compressPlayer(p) {
            return {
                i: p.id, n: p.name, p: p.password,
                g: p.gold, o: p.oil, m: p.metal, x: p.xp,
                fac: p.faction, t: p.lastMineCollect, l: p.mineLevel,
                r: [p.research.military, p.research.economy, p.research.aviation],
                f: p.fighters, d: p.defenses, sh: p.shieldExpiry
            };
        }

        function decompressPlayer(c) {
            return {
                id: c.i, name: c.n, password: c.p,
                gold: c.g || 0, oil: c.o || 0, metal: c.m || 0, xp: c.x || 0,
                faction: c.fac || null, lastMineCollect: c.t || ts(), mineLevel: c.l || 1,
                research: { military: c.r?.[0] || 0, economy: c.r?.[1] || 0, aviation: c.r?.[2] || 0 },
                fighters: c.f || {}, defenses: c.d || [], shieldExpiry: c.sh || 0
            };
        }

        function packData() {
            return {
                k: DATA_KEY,
                p: allPlayers.map(compressPlayer),
                m: marketOffers,
                l: battleLogs.slice(-15),
                c: chatMessages.slice(-10),
                b: globalBanner,
                cl: chatLocked
            };
        }

        async function saveAll(force = false) {
            if (!isConnected) return false;
            if (saving) return false;
            saving = true;
            syncPlayerToAllPlayers();
            try {
                const { error } = await db.from('game_state').upsert({ id: 'main_game', data: packData() }, { onConflict: 'id' });
                if (error) throw error;
                updateSyncUI("✅ ذخیره شد", "online");
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                updateSyncUI("❌ خطا در ذخیره", "error");
                return false;
            } finally {
                saving = false;
            }
        }

        async function loadAll() {
            if (!isConnected) if (!await initSupabase()) return false;
            try {
                const { data, error } = await db.from('game_state').select('data').eq('id', 'main_game').single();
                if (error && error.code !== 'PGRST116') throw error;
                if (data && data.data) {
                    const j = data.data;
                    if (j.k === DATA_KEY) {
                        allPlayers = (j.p || []).map(decompressPlayer);
                        marketOffers = j.m || [];
                        battleLogs = j.l || [];
                        chatMessages = j.c || [];
                        globalBanner = j.b || "";
                        chatLocked = j.cl || false;
                        if (player) {
                            const me = allPlayers.find(p => p.id === player.id);
                            if (me) player = me;
                        }
                    }
                }
                return true;
            } catch (e) {
                console.error("Load Error:", e);
                return false;
            }
        }

        /* ===== منطق بازی ===== */
        function createPlayer(name, pass) {
            return {
                id: name + "_" + ts().toString(36), name, password: pass,
                gold: 1000, oil: 300, metal: 300, xp: 0,
                faction: null, lastMineCollect: ts(), mineLevel: 1,
                research: { military: 0, economy: 0, aviation: 0 },
                fighters: {}, defenses: [], shieldExpiry: 0
            };
        }

        function calcMine(p) {
            const elapsed = Math.min((ts() - (p.lastMineCollect || ts())) / 1000, 300);
            const cap = p.mineLevel * 300;
            const rate = p.mineLevel * 0.5;
            return {
                gold: Math.min(cap, Math.floor(rate * 2 * elapsed)),
                oil: Math.min(cap, Math.floor(rate * elapsed)),
                metal: Math.min(cap, Math.floor(rate * 1.5 * elapsed)),
                cap: cap,
                goldRate: rate * 2,
                oilRate: rate,
                metalRate: rate * 1.5
            };
        }

        function calcAttackPower(p) {
            if (!p || !p.fighters) return 0;
            let power = 0;
            for (const [n, d] of Object.entries(p.fighters)) {
                if (F_DB[n] && d.count > 0) power += F_DB[n].p * d.count;
            }
            return Math.floor(power);
        }

        function calcDefensePower(p) {
            if (!p) return 0;
            let power = calcAttackPower(p) * 0.5;
            if (p.defenses) {
                p.defenses.forEach(def => {
                    if (D_DB[def.type] && def.hp > 0) {
                        power += D_DB[def.type].def * (def.hp / def.maxHp);
                    }
                });
            }
            return Math.floor(power);
        }

        function getFactionStats() {
            const stats = {};
            for (const id in FACTIONS_DB) {
                stats[id] = { id, name: FACTIONS_DB[id].n, icon: FACTIONS_DB[id].i, members: 0, points: 0 };
            }
            allPlayers.forEach(p => {
                if (p.faction && stats[p.faction]) {
                    stats[p.faction].members++;
                    stats[p.faction].points += (p.xp || 0);
                }
            });
            return Object.values(stats).sort((a, b) => b.points - a.points);
        }

        /* ===== اکشن‌های بازی ===== */
        window.loginRegister = async function () {
            const name = document.getElementById("playerName").value.trim();
            const pass = document.getElementById("playerPassword").value.trim();
            if (name.length < 3 || pass.length < 4) return toast("نام کاربری و رمز نامعتبر است", true);
            const existing = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                if (existing.password !== pass) return toast("رمز اشتباه است", true);
                player = existing;
            } else {
                if (allPlayers.length >= 50) return toast("سرور پر است", true);
                player = createPlayer(name, pass);
                allPlayers.push(player);
                await saveAll(true);
            }
            document.getElementById("loginBox").style.display = 'none';
            document.getElementById("gameUI").style.display = 'block';
            startMineTimer();
            updateUI();
            renderActiveTab();
            toast("ورود موفق", false, "peace");
        };

        window.collectMine = async function () {
            const m = calcMine(player);
            const total = m.gold + m.oil + m.metal;
            if (total <= 0) return toast("معدن خالی است", true);
            player.gold += m.gold;
            player.oil += m.oil;
            player.metal += m.metal;
            player.lastMineCollect = ts();
            await saveAll();
            updateUI();
            renderMine();
            toast(`💎 +${m.gold} طلا | +${m.oil} نفت | +${m.metal} فلز`, false, "peace");
        };

        window.upgradeMine = async function () {
            const c = player.mineLevel * 10000;
            if (player.gold < c) return toast("طلا کم است", true);
            player.gold -= c;
            player.mineLevel++;
            await saveAll();
            updateUI();
            renderMine();
            toast("⛏️ معدن به سطح " + player.mineLevel + " ارتقا یافت!", false, "peace");
        };

        window.buildFighter = async function (key) {
            const f = F_DB[key];
            if (player.gold < f.c.g || player.oil < f.c.o || player.metal < f.c.m) return toast("منابع کم است", true);
            if ((player.research?.aviation || 0) < f.r) return toast("تحقیقات هوایی کافی نیست", true);
            player.gold -= f.c.g;
            player.oil -= f.c.o;
            player.metal -= f.c.m;
            if (!player.fighters[key]) player.fighters[key] = { count: 0 };
            player.fighters[key].count++;
            await saveAll();
            updateUI();
            renderMilitary();
            toast(`✈️ ${f.n} ساخته شد!`, false, "peace");
        };

        window.buildDefense = async function (key) {
            const d = D_DB[key];
            if (player.gold < d.c.g || player.oil < d.c.o || player.metal < d.c.m) return toast("منابع کم است", true);
            player.gold -= d.c.g;
            player.oil -= d.c.o;
            player.metal -= d.c.m;
            if (!player.defenses) player.defenses = [];
            player.defenses.push({ id: ts().toString(36), type: key, hp: d.hp, maxHp: d.hp });
            await saveAll();
            updateUI();
            renderMilitary();
            toast(`🛡️ ${d.n} ساخته شد!`, false, "peace");
        };

        window.repairDefense = async function (defId) {
            const def = player.defenses.find(d => d.id === defId);
            if (!def) return;
            const dmg = def.maxHp - def.hp;
            const cost = dmg * 10;
            if (player.gold < cost) return toast("طلا برای تعمیر کافی نیست", true);
            player.gold -= cost;
            def.hp = def.maxHp;
            await saveAll();
            updateUI();
            renderMilitary();
            toast("🔧 تعمیر انجام شد", false, "peace");
        };

        window.joinFaction = async function (facId) {
            if (player.faction === facId) {
                player.faction = null;
                toast("از جناح خارج شدید", false, "peace");
            } else {
                player.faction = facId;
                toast(`به ${FACTIONS_DB[facId].n} پیوستید!`, false, "peace");
            }
            await saveAll(true);
            updateUI();
            renderFactions();
            renderRank();
        };

        window.launchAttack = async function (targetId) {
            if (isAttacking) return;
            isAttacking = true;
            try {
                const target = allPlayers.find(p => p.id === targetId);
                if (!target) return toast("هدف یافت نشد", true);
                const myAtt = calcAttackPower(player);
                if (myAtt <= 0) return toast("برای حمله باید جنگنده بسازید!", true, "war");
                if (target.shieldExpiry && ts() < target.shieldExpiry) {
                    const rm = target.shieldExpiry - ts();
                    return toast(`🛡️ سپر فعال (${Math.floor(rm / 3600000)}س ${Math.floor((rm % 3600000) / 60000)}د)`, true);
                }
                if (player.shieldExpiry && ts() < player.shieldExpiry) {
                    player.shieldExpiry = 0;
                    const apIdx = allPlayers.findIndex(p => p.id === player.id);
                    if (apIdx >= 0) allPlayers[apIdx].shieldExpiry = 0;
                    updateUI();
                    await saveAll(true);
                    toast("🛡️ سپر شما به دلیل حمله از بین رفت!", false, "war");
                }

                const enemyDef = calcDefensePower(target);
                let resultMsg = "", resultStr = "", isWin = false;

                if (myAtt > enemyDef) {
                    isWin = true;
                    const ratio = enemyDef / myAtt;
                    const loot = {
                        g: Math.floor(target.gold * 0.3),
                        o: Math.floor(target.oil * 0.3),
                        m: Math.floor(target.metal * 0.3)
                    };
                    target.gold -= loot.g; target.oil -= loot.o; target.metal -= loot.m;
                    player.gold += loot.g; player.oil += loot.o; player.metal += loot.m;
                    player.xp += 15; target.xp += 3;
                    target.shieldExpiry = ts() + SHIELD_DURATION;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        const lost = Math.ceil(f.count * ratio * 0.5);
                        f.count = Math.max(0, f.count - lost);
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * 0.8));
                    }
                    if (target.defenses) target.defenses.forEach(def => { def.hp = 0; });
                    target.defenses = target.defenses ? target.defenses.filter(def => def.hp > 0) : [];
                    resultMsg = `🔥 <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد و پیروز شد! <span class="loot">${loot.g} طلا، ${loot.o} نفت، ${loot.m} فلز</span> غارت شد.`;
                    resultStr = `🏆 پیروزی!<br>غارت: ${loot.g} طلا | ${loot.o} نفت | ${loot.m} فلز`;
                } else {
                    isWin = false;
                    const ratio = myAtt / enemyDef;
                    player.xp += 2; target.xp += 15;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * 0.9));
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * ratio * 0.4));
                    }
                    if (target.defenses) {
                        target.defenses.forEach(def => { def.hp -= 40; if (def.hp < 0) def.hp = 0; });
                        target.defenses = target.defenses.filter(def => def.hp > 0);
                    }
                    resultMsg = `🛡️ <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد اما دفاع شد!`;
                    resultStr = `💥 شکست سنگین!`;
                }

                player.shieldExpiry = 0;
                const preSaveIdx = allPlayers.findIndex(p => p.id === player.id);
                if (preSaveIdx >= 0) allPlayers[preSaveIdx].shieldExpiry = 0;

                battleLogs.push({ ts: ts(), text: resultMsg });
                await saveAll(true);

                /* انیمیشن نبرد */
                document.getElementById('app').classList.add('screen-shake');
                const overlay = document.getElementById('battleOverlay');
                const statusText = document.getElementById('battleStatusText');
                const resultText = document.getElementById('battleResultText');
                const expIcon = document.getElementById('explosionIcon');
                overlay.classList.add('active');
                statusText.innerText = `هدف قفل شد: ${target.name}`;
                statusText.style.color = "#fbbf24";
                resultText.innerText = "";
                expIcon.innerText = "🚀";
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = "برخورد!";
                expIcon.innerText = "💥";
                document.getElementById('app').classList.add('screen-shake');
                await new Promise(r => setTimeout(r, 1500));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = isWin ? "پیروزی!" : "شکست!";
                statusText.style.color = isWin ? "#4ade80" : "#fca5a5";
                resultText.innerHTML = resultStr;
                await new Promise(r => setTimeout(r, 2500));
                overlay.classList.remove('active');
                updateUI();
                renderWar();
                renderBattlelog();
            } finally {
                isAttacking = false;
            }
        };

        /* ===== بازار ===== */
        window.createMarketOffer = async function () {
            const giveRes = document.getElementById('mktGive').value;
            const getRes = document.getElementById('mktGet').value;
            const giveAmt = parseInt(document.getElementById('mktGiveAmt').value);
            const getAmt = parseInt(document.getElementById('mktGetAmt').value);
            if (giveAmt <= 0 || getAmt <= 0) return toast("مقدار نامعتبر", true);
            if (giveRes === getRes) return toast("منبع مشابه نمی‌توانید معامله کنید", true);
            if (player[giveRes] < giveAmt) return toast("منابع کافی ندارید", true);
            player[giveRes] -= giveAmt;
            marketOffers.push({
                id: ts().toString(36), seller: player.name, sid: player.id,
                give: giveRes, ga: giveAmt, get: getRes, gta: getAmt
            });
            await saveAll();
            updateUI();
            renderMarket();
            toast("📋 پیشنهاد ثبت شد", false, "peace");
        };

        window.buyMarketOffer = async function (offerId) {
            const o = marketOffers.find(x => x.id === offerId);
            if (!o) return;
            if (o.sid === player.id) return toast("این پیشنهاد شماست", true);
            if (player[o.get] < o.gta) return toast("منابع کافی ندارید", true);
            player[o.get] -= o.gta;
            player[o.give] += o.ga;
            const seller = allPlayers.find(p => p.id === o.sid);
            if (seller) seller[o.get] += o.gta;
            marketOffers = marketOffers.filter(x => x.id !== offerId);
            await saveAll(true);
            updateUI();
            renderMarket();
            toast("✅ معامله انجام شد!", false, "peace");
        };

        /* ===== تحقیق ===== */
        window.upgradeResearch = async function (branch) {
            const c = (player.research[branch] + 1) * 15;
            if (player.xp < c) return toast("XP کم است", true);
            player.xp -= c;
            player.research[branch]++;
            await saveAll();
            updateUI();
            renderResearch();
            toast("🔬 تحقیق ارتقا یافت!", false, "peace");
        };

        /* ===== چت ===== */
        window.sendChat = async function () {
            if (chatLocked && !isAdmin()) return toast("🔒 چت توسط مدیریت بسته شده", true);
            const input = document.getElementById('chatInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text || text.length > 100) return;
            chatMessages.push({ ts: ts(), n: player.name, t: escapeHtml(text) });
            input.value = '';
            renderChat();
            await saveAll();
        };

        /* ===== اکشن‌های ادمین ===== */
        window.adminGiveRes = async function () {
            const id = document.getElementById('admSel').value;
            const res = document.getElementById('admRes').value;
            const amt = parseInt(document.getElementById('admAmt').value);
            if (!id || !res || isNaN(amt) || amt <= 0) return toast("مقادیر نامعتبر", true);
            const target = allPlayers.find(p => p.id === id);
            if (!target) return toast("بازیکن یافت نشد", true);
            if (res === 'xp') target.xp += amt;
            else target[res] += amt;
            await saveAll(true);
            renderAdmin();
            toast("✅ منابع اضافه شد", false, "peace");
        };

        window.adminToggleShield = async function () {
            const id = document.getElementById('admSel').value;
            if (!id) return toast("بازیکن را انتخاب کنید", true);
            const target = allPlayers.find(p => p.id === id);
            if (!target) return;
            target.shieldExpiry = (target.shieldExpiry && ts() < target.shieldExpiry) ? 0 : ts() + SHIELD_DURATION;
            await saveAll(true);
            renderAdmin();
            toast(target.shieldExpiry ? "🛡️ سپر فعال شد" : "💔 سپر برداشته شد", false, "peace");
        };

        window.adminDeletePlayer = async function () {
            const id = document.getElementById('admSel').value;
            if (!id) return toast("بازیکن را انتخاب کنید", true);
            if (!confirm("آیا از حذف کامل این کاربر مطمئنید؟")) return;
            allPlayers = allPlayers.filter(p => p.id !== id);
            await saveAll(true);
            renderAdmin();
            toast("🗑️ کاربر حذف شد", false, "war");
        };

        window.adminResetPlayer = async function () {
            const id = document.getElementById('admSel').value;
            if (!id) return toast("بازیکن را انتخاب کنید", true);
            const target = allPlayers.find(p => p.id === id);
            if (!target) return;
            if (!confirm("آیا از ریست منابع و ارتش این کاربر مطمئنید؟")) return;
            target.gold = 0; target.oil = 0; target.metal = 0; target.xp = 0;
            target.fighters = {}; target.defenses = []; target.mineLevel = 1;
            target.research = { military: 0, economy: 0, aviation: 0 };
            await saveAll(true);
            renderAdmin();

        /* ===== تایمر معدن ثانیه‌ای ===== */
        function startMineTimer() {
            if (mineTimer) clearInterval(mineTimer);
            mineTimer = setInterval(() => {
                if (player && activeTab === "mine") {
                    updateMineVisuals();
                }
            }, 1000);
        }

        function updateMineVisuals() {
            if (!player) return;
            const m = calcMine(player);
            const cap = m.cap;

            const gBar = document.getElementById('mineBarGold');
            const oBar = document.getElementById('mineBarOil');
            const mBar = document.getElementById('mineBarMetal');
            const gVal = document.getElementById('mineValGold');
            const oVal = document.getElementById('mineValOil');
            const mVal = document.getElementById('mineValMetal');
            const gPctEl = document.getElementById('minePctGold');
            const oPctEl = document.getElementById('minePctOil');
            const mPctEl = document.getElementById('minePctMetal');
            const timeEl = document.getElementById('mineTimeRow');
            const totalEl = document.getElementById('mineTotal');

            if (gBar) {
                const gPct = Math.min(100, (m.gold / cap) * 100);
                gBar.style.width = gPct + '%';
                if (gPct >= 95) gBar.classList.add('full'); else gBar.classList.remove('full');
            }
            if (oBar) {
                const oPct = Math.min(100, (m.oil / cap) * 100);
                oBar.style.width = oPct + '%';
                if (oPct >= 95) oBar.classList.add('full'); else oBar.classList.remove('full');
            }
            if (mBar) {
                const mPct = Math.min(100, (m.metal / cap) * 100);
                mBar.style.width = mPct + '%';
                if (mPct >= 95) mBar.classList.add('full'); else mBar.classList.remove('full');
            }
            if (gVal) gVal.textContent = m.gold.toLocaleString('fa-IR');
            if (oVal) oVal.textContent = m.oil.toLocaleString('fa-IR');
            if (mVal) mVal.textContent = m.metal.toLocaleString('fa-IR');
            if (gPctEl) gPctEl.textContent = Math.min(100, Math.floor((m.gold / cap) * 100)) + '%';
            if (oPctEl) oPctEl.textContent = Math.min(100, Math.floor((m.oil / cap) * 100)) + '%';
            if (mPctEl) mPctEl.textContent = Math.min(100, Math.floor((m.metal / cap) * 100)) + '%';
            if (timeEl) {
                timeEl.innerHTML = `⏱️ پر شدن: <span style="color:#fbbf24">${timeToFull(m.gold, m.goldRate, cap)} طلا</span> | <span style="color:#60a5fa">${timeToFull(m.oil, m.oilRate, cap)} نفت</span> | <span style="color:#d1d5db">${timeToFull(m.metal, m.metalRate, cap)} فلز</span>`;
            }
            if (totalEl) {
                const total = m.gold + m.oil + m.metal;
                totalEl.textContent = total.toLocaleString('fa-IR');
            }

            /* دکمه استخراج */
            const btn = document.getElementById('mineCollectBtn');
            if (btn) {
                const total = m.gold + m.oil + m.metal;
                if (total > 0) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.classList.add('collect-pulse');
                    btn.innerHTML = `💎 استخراج کنید (${total.toLocaleString('fa-IR')} منبع)`;
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.classList.remove('collect-pulse');
                    btn.innerHTML = '💎 در حال تولید...';
                }
            }
        }

        /* ===== رندر UI ===== */
        function updateUI() {
            if (!player) return;

            /* نمایش تب ادمین */
            if (!window.adminVisibilitySet) {
                if (isAdmin()) {
                    document.querySelectorAll('.admin-el').forEach(el => el.classList.remove('is-hidden'));
                }
                window.adminVisibilitySet = true;
            }

            /* === رفع باگ اصلی: 'fa-رس' بود به جای 'fa-IR' === */
            document.getElementById('rGold').innerText = Math.floor(player.gold).toLocaleString('fa-IR');
            document.getElementById('rOil').innerText = Math.floor(player.oil).toLocaleString('fa-IR');
            document.getElementById('rMetal').innerText = Math.floor(player.metal).toLocaleString('fa-IR');
            document.getElementById('rXP').innerText = player.xp.toLocaleString('fa-IR');

            /* بنر اطلاعیه سراسری */
            const bannerEl = document.getElementById('globalBanner');
            const bannerTextEl = document.getElementById('bannerText');
            const bannerDismissBtn = document.getElementById('bannerDismissBtn');
            if (globalBanner && globalBanner.trim()) {
                bannerTextEl.innerHTML = "📢 " + escapeHtml(globalBanner);
                bannerEl.classList.remove('is-hidden');
                if (isAdmin()) bannerDismissBtn.classList.remove('is-hidden');
                else bannerDismissBtn.classList.add('is-hidden');
            } else {
                bannerEl.classList.add('is-hidden');
            }

            /* سپر */
            const shieldBar = document.getElementById('shieldBar');
            if (player.shieldExpiry && ts() < player.shieldExpiry) {
                const rm = player.shieldExpiry - ts();
                const h = Math.floor(rm / 3600000);
                const m = Math.floor((rm % 3600000) / 60000);
                shieldBar.innerHTML = `🛡️ سپر محافظتی: <b>${h} ساعت و ${m} دقیقه</b> باقیمانده`;
                shieldBar.style.display = 'block';
            } else {
                shieldBar.style.display = 'none';
            }
        }

        /* ===== رندر نظامی ===== */
        function renderMilitary() {
            let h = `<div class="section-title">✈️ جنگنده‌ها (قدرت حمله: ${calcAttackPower(player)})</div><div class="grid2">`;
            for (const [k, f] of Object.entries(F_DB)) {
                const reqMet = (player.research?.aviation || 0) >= f.r;
                const canAfford = player.gold >= f.c.g && player.oil >= f.c.o && player.metal >= f.c.m;
                h += `<div class="card" style="opacity:${reqMet ? 1 : 0.5}">
                    <div class="icon">${f.i}</div><div>${f.n}</div>
                    <div class="cost">قدرت: ${f.p} ${f.r > 0 ? '| تحقیق: ' + f.r : ''}</div>
                    <div class="cost">💰${f.c.g} | 🛢️${f.c.o} | ⛏️${f.c.m}</div>
                    <div class="badge badge-blue">دارید: ${player.fighters[k]?.count || 0}</div>
                    <button class="btn btn-blue btn-sm" ${(!reqMet || !canAfford) ? 'disabled' : ''} onclick="buildFighter('${k}')">ساخت</button>
                </div>`;
            }
            h += `</div><div class="section-title">🛡️ سیستم‌های دفاعی (قدرت دفاع: ${calcDefensePower(player)})</div><div class="grid2">`;
            for (const [k, d] of Object.entries(D_DB)) {
                const canAfford = player.gold >= d.c.g && player.oil >= d.c.o && player.metal >= d.c.m;
                h += `<div class="card">
                    <div class="icon">${d.i}</div><div>${d.n}</div>
                    <div class="cost">دفاع: ${d.def} | HP: ${d.hp}</div>
                    <div class="cost">💰${d.c.g} | 🛢️${d.c.o} | ⛏️${d.c.m}</div>
                    <button class="btn btn-green btn-sm" ${!canAfford ? 'disabled' : ''} onclick="buildDefense('${k}')">ساخت</button>
                </div>`;
            }
            h += `</div>`;
            if (player.defenses && player.defenses.length > 0) {
                h += `<div class="section-title">🔧 وضعیت پدافندها</div>`;
                player.defenses.forEach(def => {
                    const dInfo = D_DB[def.type];
                    const hpPct = (def.hp / def.maxHp) * 100;
                    const dmg = def.maxHp - def.hp;
                    const repairCost = dmg * 10;
                    h += `<div class="player-row" style="flex-direction:column;align-items:stretch;">
                        <div style="display:flex;justify-content:space-between;width:100%;margin-bottom:5px;">
                            <span>${dInfo.i} ${dInfo.n}</span>
                            <span style="color:${hpPct > 50 ? '#4ade80' : '#ef4444'}">${def.hp}/${def.maxHp}</span>
                        </div>
                        <div class="storage-bar"><div class="storage-fill hp-fill" style="width:${hpPct}%"></div></div>
                        ${dmg > 0 ? `<button class="btn btn-gold btn-sm" ${player.gold < repairCost ? 'disabled' : ''} onclick="repairDefense('${def.id}')">تعمیر (${repairCost} طلا)</button>` : '<span style="color:#4ade80;font-size:0.5rem;text-align:center;">آماده</span>'}
                    </div>`;
                });
            }
            document.getElementById('militaryContent').innerHTML = h;
        }

        /* ===== رندر جنگ ===== */
        function renderWar() {
            const myAtt = calcAttackPower(player);
            const myDef = calcDefensePower(player);
            let h = `<div class="info-bar">⚔️ قدرت حمله: ${myAtt} | 🛡️ قدرت دفاع: ${myDef}</div><div class="section-title">🎯 اهداف</div>`;
            if (myAtt <= 0) h += `<div class="empty">ابتدا جنگنده بسازید!</div>`;
            const targets = allPlayers.filter(p => p.id !== player.id).sort((a, b) => calcDefensePower(a) - calcDefensePower(b));
            targets.forEach(t => {
                let btnHtml = '';
                if (t.shieldExpiry && ts() < t.shieldExpiry) {
                    const rm = t.shieldExpiry - ts();
                    const hh = Math.floor(rm / 3600000);
                    const mm = Math.floor((rm % 3600000) / 60000);
                    btnHtml = `<button class="btn btn-sm" style="background:#3b82f6;color:#fff;" disabled>🛡️ ${hh}س ${mm}د</button>`;
                } else {
                    btnHtml = `<button class="btn btn-attack btn-sm" ${myAtt <= 0 || isAttacking ? 'disabled' : ''} onclick="launchAttack('${t.id}')">⚔️ حمله</button>`;
                }
                const tDef = calcDefensePower(t);
                h += `<div class="player-row">
                    <div style="text-align:right;">
                        <div>${getFormattedName(t)}</div>
                        <div style="font-size:0.45rem;color:#64748b;">🛡️ ${tDef}</div>
                    </div>
                    ${btnHtml}
                </div>`;
            });
            document.getElementById('warContent').innerHTML = h;
        }

                h += `<div class="empty">هیچ پیامی نیست</div>`;

                    h += `<div class="chat-msg ${isMe ? 'me' : ''} ${isSys ? 'system-msg' : ''}">
                        <span class="sender" style="${isSys ? 'color:#fca5a5;' : ''} ${isAdm ? 'color:#3b82f6;' : ''}">${isSys ? '📢 [SYSTEM]' : (isAdm ? '🚬 ' : '') + escapeHtml(msg.n)}</span>

                h += `<div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="پیام بنویسید..." maxlength="100" onkeydown="if(event.key==='Enter')sendChat()">

            h += `</div>`;
            document.getElementById('chatContent').innerHTML = h;

                }

            const chatBox = document.getElementById('chatBox');
            if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;

                    h += `<div class="player-row" style="${isMine ? 'border-color:#f59e0b66;' : ''}">
                        <div>
                            <div style="font-size:0.6rem;">${escapeHtml(o.seller)} ${isMine ? '<span style="color:#fbbf24;font-size:0.45rem;">(شما)</span>' : ''}</div>
                            <div style="font-size:0.5rem;color:#4ade80;">${resIcons[o.give]} ${o.ga.toLocaleString('fa-IR')} ${resNames[o.give]} → ${resIcons[o.get]} ${o.gta.toLocaleString('fa-IR')} ${resNames[o.get]}</div>
                        </div>
                        ${isMine ? '<span style="font-size:0.45rem;color:#64748b;">پیشنهاد شما</span>' : `<button class="btn btn-green btn-sm" ${player[o.get] < o.gta ? 'disabled' : ''} onclick="buyMarketOffer('${o.id}')">خرید</button>`}
                    </div>`;
                });
            }
            document.getElementById('marketContent').innerHTML = h;
        }

        /* ===== رندر تحقیق ===== */
        function renderResearch() {
            const branches = [
                { key: 'military', name: '⚔️ نظامی', desc: 'ارتقای قدرت جنگی', icon: '⚔️' },
                { key: 'economy', name: '💰 اقتصادی', desc: 'بهبود تولید منابع', icon: '📈' },
                { key: 'aviation', name: '✈️ هوایی', desc: 'باز کردن قفل جنگنده‌ها', icon: '🛩️' }
            ];
            let h = `<div class="info-bar">⭐ XP فعلی: ${player.xp.toLocaleString('fa-IR')}</div>`;
            branches.forEach(b => {
                const lvl = player.research[b.key];
                const cost = (lvl + 1) * 15;
                const canUpgrade = player.xp >= cost;
                let details = '';
                if (b.key === 'aviation') {
                    const unlocked = Object.entries(F_DB).filter(([k, f]) => f.r <= lvl).map(([k, f]) => f.n);
                    const nextUnlock = Object.entries(F_DB).filter(([k, f]) => f.r === lvl + 1).map(([k, f]) => f.n);
                    details = `<div style="font-size:0.45rem;color:#94a3b8;margin-top:4px;">قفل‌شده‌ها: ${unlocked.join('، ') || 'هیچ'}</div>`;
                    if (nextUnlock.length > 0) {
                        details += `<div style="font-size:0.45rem;color:#4ade80;">سطح بعد: ${nextUnlock.join('، ')}</div>`;
                    }
                }
                h += `<div class="card" style="text-align:right;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div>
                            <div style="font-size:0.8rem;font-weight:700;color:#fbbf24;">${b.name} - سطح ${lvl}</div>
                            <div style="font-size:0.5rem;color:#94a3b8;">${b.desc}</div>
                            ${details}
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:1.5rem;">${b.icon}</div>
                            <button class="btn btn-purple btn-sm" ${!canUpgrade ? 'disabled' : ''} onclick="upgradeResearch('${b.key}')">⬆️ (${cost} XP)</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('researchContent').innerHTML = h;
        }

        /* ===== رندر رتبه‌بندی ===== */
        function renderRank() {
            const sorted = [...allPlayers].sort((a, b) => b.xp - a.xp);
            let h = `<div class="section-title">🏆 رتبه‌بندی بازیکنان</div>`;
            sorted.forEach((p, i) => {
                const isMe = p.id === player.id;
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${(i + 1).toLocaleString('fa-IR')}.`;
                const bgStyle = isMe ? 'border-color:#f59e0b;background:rgba(245,158,11,0.05);' : '';
                h += `<div class="player-row" style="${bgStyle}">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span style="font-size:1.1rem;min-width:28px;text-align:center;">${medal}</span>
                        <div>
                            <div>${getFormattedName(p)}</div>
                            <div style="font-size:0.45rem;color:#64748b;">⚔️${calcAttackPower(p)} | 🛡️${calcDefensePower(p)} | 💰${Math.floor(p.gold).toLocaleString('fa-IR')}</div>
                        </div>
                    </div>
                    <span style="color:#fbbf24;font-weight:700;font-size:0.7rem;">⭐ ${p.xp.toLocaleString('fa-IR')}</span>
                </div>`;
            });
            document.getElementById('rankContent').innerHTML = h;
        }

        /* ===== رندر گزارش نبرد ===== */
        function renderBattlelog() {
            let h = `<div class="section-title">📜 گزارش نبردهای اخیر</div>`;
            if (battleLogs.length === 0) {
                h += `<div class="empty">هنوز نبردی رخ نداده</div>`;
            } else {
                h += `<div class="battle-log">`;
                [...battleLogs].reverse().forEach(log => {
                    h += `<div class="log-entry" style="padding:6px 0;border-bottom:1px solid #1a1a2e;">
                        <div style="font-size:0.55rem;color:#64748b;margin-bottom:2px;">${new Date(log.ts).toLocaleString('fa-IR')}</div>
                        <div>${log.text}</div>
                    </div>`;
                });
                h += `</div>`;
            }
            document.getElementById('battlelogContent').innerHTML = h;
        }

        /* ===== رندر پنل ادمین ===== */
        function renderAdmin() {
            if (!isAdmin()) return;
            let playerOptions = `<option value="">انتخاب کاربر...</option>`;
            allPlayers.forEach(p => {
                playerOptions += `<option value="${p.id}">${escapeHtml(p.name)} (💰${Math.floor(p.gold).toLocaleString('fa-IR')} | ⭐${p.xp})</option>`;
            });

            let h = `
            <div class="info-bar" style="border-color:#ef4444;color:#fca5a5;">⚠️ پنل مدیریت اختصاصی سرور | بازیکنان: ${allPlayers.length}</div>

            <div class="admin-panel-box">
                <h3>📢 مدیریت اطلاعیه سراسری</h3>
                <div style="display:flex;gap:5px;margin-bottom:8px;">
                    <input type="text" id="admBannerText" placeholder="متن اطلاعیه برای بالای صفحه..." maxlength="150" style="flex:1;margin:0;">
                    <button class="btn btn-blue btn-sm" onclick="adminSetBanner()">اعلان</button>
                    <button class="btn btn-danger btn-sm" onclick="adminRemoveBanner()">حذف</button>
                </div>
                <div style="display:flex;gap:5px;">
                    <button class="btn btn-sm" style="width:100%;justify-content:center;${chatLocked ? 'background:#10b981;color:#fff;' : 'background:#dc2626;color:#fff;'}" onclick="adminToggleChat()">
                        ${chatLocked ? '🔓 باز کردن چت جهانی' : '🔒 قفل کردن چت جهانی'}
                    </button>
                </div>
            </div>

            <div class="admin-panel-box">
                <h3>🎁 اعطای منابع به کاربر</h3>
                <select id="admSel">${playerOptions}</select>
                <div style="display:flex;gap:5px;margin-top:5px;">
                    <select id="admRes" style="width:35%;margin:0;">
                        <option value="gold">💰 طلا</option>
                        <option value="oil">🛢️ نفت</option>
                        <option value="metal">⛏️ فلز</option>
                        <option value="xp">⭐ XP</option>
                    </select>
                    <input type="number" id="admAmt" placeholder="مقدار" style="width:35%;margin:0;" min="1">
                    <button class="btn btn-gold btn-sm" style="width:30%;margin:0;" onclick="adminGiveRes()">اعطا</button>
                </div>
            </div>

            <div class="admin-panel-box">
                <h3>🛠️ عملیات مدیریتی</h3>
                <div style="display:flex;flex-wrap:wrap;gap:5px;">
                    <button class="btn btn-blue btn-sm" onclick="adminToggleShield()">🛡️ سپر</button>
                    <button class="btn btn-red btn-sm" onclick="adminResetPlayer()">⚠️ ریست منابع</button>
                    <button class="btn btn-danger btn-sm" onclick="adminDeletePlayer()">🗑️ حذف کاربر</button>
                </div>
            </div>

            <div class="admin-panel-box">
                <h3>📢 پیام سراسری در چت</h3>
                <div style="display:flex;gap:5px;">
                    <input type="text" id="admBroad" placeholder="متن پیام سراسری..." maxlength="150" style="flex:1;margin:0;">
                    <button class="btn btn-gold btn-sm" onclick="adminBroadcast()">ارسال</button>
                    <button class="btn btn-danger btn-sm" onclick="adminClearChat()">🧹 پاک</button>
                </div>
            </div>

            <div class="admin-panel-box" style="border-color:#dc2626;">
                <h3 style="color:#fca5a5;">☢️ منطقه خطر</h3>
                <button class="btn btn-danger" style="width:100%;justify-content:center;" onclick="adminNuke()">☢️ نابودی کامل سرور</button>
            </div>
            `;
            document.getElementById('adminContent').innerHTML = h;
        }

        /* ===== سوئیچ تب‌ها ===== */
        const renderMap = {
            mine: renderMine,
            military: renderMilitary,
            war: renderWar,
            chat: renderChat,
            factions: renderFactions,
            market: renderMarket,
            research: renderResearch,
            rank: renderRank,
            battlelog: renderBattlelog,
            admin: renderAdmin
        };

        function renderActiveTab() {
            const fn = renderMap[activeTab];
            if (fn) fn();
        }

        function switchTab(tabName) {
            activeTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabName}"]`)?.classList.add('active');
            document.getElementById('panel' + tabName.charAt(0).toUpperCase() + tabName.slice(1))?.classList.add('active');
            renderActiveTab();
        }

        document.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => switchTab(t.dataset.tab));
        });

        /* ===== حلقه اصلی بازی ===== */
        async function gameLoop() {
            await loadAll();
            if (player) {
                const me = allPlayers.find(p => p.id === player.id);
                if (me) player = me;
                updateUI();
                if (activeTab === "mine") {
                    /* فقط آپدیت بصری، بدون رندر کامل */
                    updateMineVisuals();
                }
            }
        }

        /* ===== شروع ===== */
        async function init() {
            const ok = await initSupabase();
            if (ok) {
                await loadAll();
                document.getElementById("loginBox").style.display = 'flex';
                /* همگام‌سازی هر ۳ ثانیه */
                setInterval(gameLoop, SYNC_INTERVAL);
            } else {
                document.getElementById("syncText").innerText = "❌ اتصال برقرار نشد. صفحه را رفرش کنید.";
            }
        }

        init();
    </script>
</body>
</html>
