<body>
    <div class="container" id="app">

        function toast(m, e = false, type = "") { const t = document.createElement("div"); t.className = "toast" + (e ? " error" : "") + (type ? " " + type : ""); t.innerHTML = m; document.body.appendChild(t); setTimeout(() => { if (t.parentNode) t.remove(); }, 4500); }
        function ts() { return Date.now(); }
        function escapeHtml(str) { return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function isAdmin() { return player && player.name === ADMIN_NAME && player.password === ADMIN_PASS; }
        function getFormattedName(p) {
            const facTag = p.faction ? `<span style="color: #ef4444; font-size: 0.8em; margin-right: 4px;">[${FACTIONS_DB[p.faction]?.n || p.faction}]</span>` : '';
            if (p.name === ADMIN_NAME) return `<span style="color: #3b82f6; font-weight: bold;">🚬 ${escapeHtml(p.name)}</span> ${facTag}`;
            return `${escapeHtml(p.name)} ${facTag}`;
        }
        function timeToFull(current, rate, cap) {
            if (rate <= 0) return '∞';
            const remaining = cap - current;
            if (remaining <= 0) return '✅ پر';
            const secs = Math.ceil(remaining / rate);
            if (secs >= 3600) return Math.floor(secs / 3600) + 'س ' + Math.floor((secs % 3600) / 60) + 'د';
            if (secs >= 60) return Math.floor(secs / 60) + 'د ' + (secs % 60) + 'ث';
            return secs + ' ثانیه';
        }
        function syncPlayerToAllPlayers() { if (!player) return; const idx = allPlayers.findIndex(p => p.id === player.id); if (idx >= 0) allPlayers[idx] = { ...player }; }

        async function initSupabase() {
            updateSyncUI("🔌 در حال اتصال به دیتابیس...", "warn");
            try { const { data, error } = await db.from('game_state').select('id').eq('id', 'main_game').maybeSingle(); if (error) throw error; isConnected = true; updateSyncUI("✅ متصل به سرور", "online"); return true; }

        }
        function updateSyncUI(text, status) {
            document.getElementById("syncText").innerText = text;
            const ob = document.getElementById("onlineBar"); ob.classList.remove("offline", "warn");
            if (status === "error") ob.classList.add("offline"); else if (status === "warn") ob.classList.add("warn");
            document.getElementById("onlineText").innerText = text;
        }
        function compressPlayer(p) { return { i:p.id, n:p.name, p:p.password, g:p.gold, o:p.oil, m:p.metal, x:p.xp, fac:p.faction, t:p.lastMineCollect, l:p.mineLevel, r:[p.research.military, p.research.economy, p.research.aviation], f:p.fighters, d:p.defenses, sh:p.shieldExpiry }; }
        function decompressPlayer(c) { return { id:c.i, name:c.n||'', password:c.p, gold:c.g||0, oil:c.o||0, metal:c.m||0, xp:c.x||0, faction:c.fac||null, lastMineCollect:c.t||ts(), mineLevel:c.l||1, research:{military:c.r?.[0]||0, economy:c.r?.[1]||0, aviation:c.r?.[2]||0}, fighters:c.f||{}, defenses:c.d||[], shieldExpiry:c.sh||0 }; }
        function packData() { return { k:DATA_KEY, p:allPlayers.map(compressPlayer), m:marketOffers, l:battleLogs.slice(-15), c:chatMessages.slice(-10), b:globalBanner, cl:chatLocked }; }
        async function saveAll(force = false) {
            if (!isConnected || saving) return false; saving = true; syncPlayerToAllPlayers();
            try { const { error } = await db.from('game_state').upsert({ id:'main_game', data:packData() }, { onConflict:'id' }); if (error) throw error; updateSyncUI("✅ ذخیره شد", "online"); return true; }
            catch (e) { console.error("Save Error:", e); updateSyncUI("❌ خطا در ذخیره", "error"); return false; }
            finally { saving = false; }
        }
        async function loadAll() {
            if (!isConnected) if (!await initSupabase()) return false;
            try {
                const { data, error } = await db.from('game_state').select('data').eq('id', 'main_game').single();
                if (error && error.code !== 'PGRST116') throw error;
                if (data?.data?.k === DATA_KEY) {
                    const j = data.data;
                    allPlayers = (j.p||[]).map(decompressPlayer); marketOffers = j.m||[]; battleLogs = j.l||[]; chatMessages = j.c||[]; globalBanner = j.b||""; chatLocked = j.cl||false;
                    if (player) { const me = allPlayers.find(p => p.id === player.id); if (me) player = me; }
                }
                return true;
            } catch (e) { console.error("Load Error:", e); return false; }
        }

        function createPlayer(name, pass) { return { id:name+"_"+ts().toString(36), name, password:pass, gold:1000, oil:300, metal:300, xp:0, faction:null, lastMineCollect:ts(), mineLevel:1, research:{military:0,economy:0,aviation:0}, fighters:{}, defenses:[], shieldExpiry:0 }; }

        /* ===== رفع باگ نفت و فلز: نرخ پایه از 0.5 به 1.0 تغییر کرد ===== */
        function calcMine(p) {
            const elapsed = Math.min((ts() - (p.lastMineCollect || ts())) / 1000, 300);
            const cap = p.mineLevel * 300;
            const rate = p.mineLevel * 1.0;
            return {
                gold: Math.min(cap, Math.floor(rate * 2.0 * elapsed)),
                oil: Math.min(cap, Math.floor(rate * 1.5 * elapsed)),
                metal: Math.min(cap, Math.floor(rate * 1.0 * elapsed)),
                cap: cap,
                goldRate: rate * 2.0,
                oilRate: rate * 1.5,
                metalRate: rate * 1.0
            };
        }

        function calcAttackPower(p) { if (!p?.fighters) return 0; let pw = 0; for (const [n, d] of Object.entries(p.fighters)) { if (F_DB[n] && d.count > 0) pw += F_DB[n].p * d.count; } return Math.floor(pw); }
        function calcDefensePower(p) { if (!p) return 0; let pw = calcAttackPower(p) * 0.5; if (p.defenses) p.defenses.forEach(def => { if (D_DB[def.type] && def.hp > 0) pw += D_DB[def.type].def * (def.hp / def.maxHp); }); return Math.floor(pw); }
        function getFactionStats() {
            const stats = {};
            for (const id in FACTIONS_DB) stats[id] = { id, name:FACTIONS_DB[id].n, icon:FACTIONS_DB[id].i, members:0, points:0, memberList:[] };
            allPlayers.forEach(p => { if (p.faction && stats[p.faction]) { stats[p.faction].members++; stats[p.faction].points += (p.xp||0); stats[p.faction].memberList.push(p); } });
            return Object.values(stats).sort((a, b) => b.points - a.points);
        }

        window.loginRegister = async function () {
            const name = document.getElementById("playerName").value.trim(), pass = document.getElementById("playerPassword").value.trim();
            if (name.length < 3 || pass.length < 4) return toast("نام کاربری و رمز نامعتبر", true);
            const existing = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) { if (existing.password !== pass) return toast("رمز اشتباه", true); player = existing; }
            else { if (allPlayers.length >= 50) return toast("سرور پر", true); player = createPlayer(name, pass); allPlayers.push(player); await saveAll(true); }
            document.getElementById("loginBox").style.display = 'none'; document.getElementById("gameUI").style.display = 'block';
            startMineTimer(); updateUI(); renderActiveTab(); toast("ورود موفق", false, "peace");
        };
        window.collectMine = async function () {
            const m = calcMine(player); const total = m.gold + m.oil + m.metal;
            if (total <= 0) return toast("معدن خالی", true);
            player.gold += m.gold; player.oil += m.oil; player.metal += m.metal; player.lastMineCollect = ts();
            await saveAll(); updateUI(); renderMine();
            toast(`💎 +${m.gold} طلا | +${m.oil} نفت | +${m.metal} فلز`, false, "peace");
        };
        window.upgradeMine = async function () { const c = player.mineLevel * 10000; if (player.gold < c) return toast("طلا کم", true); player.gold -= c; player.mineLevel++; await saveAll(); updateUI(); renderMine(); toast("⛏️ سطح " + player.mineLevel, false, "peace"); };
        window.buildFighter = async function (key) { const f = F_DB[key]; if (player.gold<f.c.g||player.oil<f.c.o||player.metal<f.c.m) return toast("منابع کم", true); if ((player.research?.aviation||0)<f.r) return toast("تحقیقات کم", true); player.gold-=f.c.g; player.oil-=f.c.o; player.metal-=f.c.m; if (!player.fighters[key]) player.fighters[key]={count:0}; player.fighters[key].count++; await saveAll(); updateUI(); renderMilitary(); toast(`✈️ ${f.n} ساخته شد`, false, "peace"); };
        window.buildDefense = async function (key) { const d = D_DB[key]; if (player.gold<d.c.g||player.oil<d.c.o||player.metal<d.c.m) return toast("منابع کم", true); player.gold-=d.c.g; player.oil-=d.c.o; player.metal-=d.c.m; if (!player.defenses) player.defenses = []; player.defenses.push({id:ts().toString(36), type:key, hp:d.hp, maxHp:d.hp}); await saveAll(); updateUI(); renderMilitary(); toast(`🛡️ ${d.n} ساخته شد`, false, "peace"); };
        window.repairDefense = async function (defId) { const def = player.defenses.find(d => d.id === defId); if (!def) return; const dmg = def.maxHp - def.hp, cost = dmg * 10; if (player.gold < cost) return toast("طلا کم", true); player.gold -= cost; def.hp = def.maxHp; await saveAll(); updateUI(); renderMilitary(); };
        window.joinFaction = async function (facId) { if (player.faction === facId) { player.faction = null; toast("از جناح خارج شدید", false, "peace"); } else { player.faction = facId; toast(`به ${FACTIONS_DB[facId].n} پیوستید!`, false, "peace"); } await saveAll(true); updateUI(); renderFactions(); renderRank(); };

        window.launchAttack = async function (targetId) {
            if (isAttacking) return; isAttacking = true;
            try {
                const target = allPlayers.find(p => p.id === targetId); if (!target) return toast("هدف یافت نشد", true);
                const myAtt = calcAttackPower(player); if (myAtt <= 0) return toast("جنگنده بسازید!", true, "war");
                if (target.shieldExpiry && ts() < target.shieldExpiry) { const rm = target.shieldExpiry-ts(); return toast(`🛡️ سپر (${Math.floor(rm/3600000)}س ${Math.floor((rm%3600000)/60000)}د)`, true); }
                if (player.shieldExpiry && ts() < player.shieldExpiry) { player.shieldExpiry = 0; const ai = allPlayers.findIndex(p=>p.id===player.id); if(ai>=0) allPlayers[ai].shieldExpiry=0; updateUI(); await saveAll(true); toast("🛡️ سپر شما از بین رفت!", false, "war"); }
                const enemyDef = calcDefensePower(target); let resultMsg = "", resultStr = "", isWin = false;
                if (myAtt > enemyDef) {
                    isWin = true; const ratio = enemyDef/myAtt;
                    const loot = {g:Math.floor(target.gold*0.3), o:Math.floor(target.oil*0.3), m:Math.floor(target.metal*0.3)};
                    target.gold-=loot.g; target.oil-=loot.o; target.metal-=loot.m; player.gold+=loot.g; player.oil+=loot.o; player.metal+=loot.m;
                    player.xp+=15; target.xp+=3; target.shieldExpiry = ts()+SHIELD_DURATION;
                    for(const [k,f] of Object.entries(player.fighters)){f.count=Math.max(0,f.count-Math.ceil(f.count*ratio*0.5));}
                    for(const [k,f] of Object.entries(target.fighters)){f.count=Math.max(0,f.count-Math.ceil(f.count*0.8));}
                    if(target.defenses) target.defenses.forEach(d=>{d.hp=0;}); target.defenses=target.defenses?.filter(d=>d.hp>0)||[];
                    resultMsg=`🔥 <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد و پیروز شد! <span class="loot">${loot.g} طلا، ${loot.o} نفت، ${loot.m} فلز</span> غارت شد.`;
                    resultStr=`🏆 پیروزی!<br>غارت: ${loot.g} طلا | ${loot.o} نفت | ${loot.m} فلز`;
                } else {
                    isWin = false; const ratio = myAtt/enemyDef; player.xp+=2; target.xp+=15;
                    for(const [k,f] of Object.entries(player.fighters)){f.count=Math.max(0,f.count-Math.ceil(f.count*0.9));}
                    for(const [k,f] of Object.entries(target.fighters)){f.count=Math.max(0,f.count-Math.ceil(f.count*ratio*0.4));}
                    if(target.defenses){target.defenses.forEach(d=>{d.hp-=40;if(d.hp<0)d.hp=0;}); target.defenses=target.defenses.filter(d=>d.hp>0);}
                    resultMsg=`🛡️ <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد اما دفاع شد!`; resultStr=`💥 شکست سنگین!`;
                }
                player.shieldExpiry = 0; const pi = allPlayers.findIndex(p=>p.id===player.id); if(pi>=0) allPlayers[pi].shieldExpiry=0;
                battleLogs.push({ts:ts(), text:resultMsg}); await saveAll(true);
                document.getElementById('app').classList.add('screen-shake');
                const overlay=document.getElementById('battleOverlay'), st=document.getElementById('battleStatusText'), rt=document.getElementById('battleResultText'), ei=document.getElementById('explosionIcon');
                overlay.classList.add('active'); st.innerText=`هدف: ${target.name}`; st.style.color="#fbbf24"; rt.innerText=""; ei.innerText="🚀";
                await new Promise(r=>setTimeout(r,1000)); document.getElementById('app').classList.remove('screen-shake');
                st.innerText="برخورد!"; ei.innerText="💥"; document.getElementById('app').classList.add('screen-shake');
                await new Promise(r=>setTimeout(r,1500)); document.getElementById('app').classList.remove('screen-shake');
                st.innerText=isWin?"پیروزی!":"شکست!"; st.style.color=isWin?"#4ade80":"#fca5a5"; rt.innerHTML=resultStr;
                await new Promise(r=>setTimeout(r,2500)); overlay.classList.remove('active');
                updateUI(); renderWar(); renderBattlelog();
            } finally { isAttacking = false; }
        };

            const br=[{k:'military',n:'⚔️ نظامی',d:'ارتقای قدرت جنگی',i:'⚔️'},{k:'economy',n:'💰 اقتصادی',d:'بهبود تولید',i:'📈'},{k:'aviation',n:'✈️ هوایی',d:'باز کردن قفل جنگنده‌ها',i:'🛩️'}];
            let h=`<div class="info-bar">⭐ XP: ${player.xp.toLocaleString('fa-IR')}</div>`;
            br.forEach(b=>{const l=player.research[b.k],c=(l+1)*15,ca=player.xp>=c;let det='';if(b.k==='aviation'){const ul=Object.entries(F_DB).filter(([k,f])=>f.r<=l).map(([k,f])=>f.n);const nl=Object.entries(F_DB).filter(([k,f])=>f.r===l+1).map(([k,f])=>f.n);det=`<div style="font-size:0.45rem;color:#94a3b8;margin-top:4px;">قفل‌شده: ${ul.join('، ')||'هیچ'}</div>`;if(nl.length)det+=`<div style="font-size:0.45rem;color:#4ade80;">بعدی: ${nl.join('، ')}</div>`;}
            h+=`<div class="card" style="text-align:right;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:0.8rem;font-weight:700;color:#fbbf24;">${b.n} - سطح ${l}</div><div style="font-size:0.5rem;color:#94a3b8;">${b.d}</div>${det}</div><div style="text-align:center;"><div style="font-size:1.5rem;">${b.i}</div><button class="btn btn-purple btn-sm" ${!ca?'disabled':''} onclick="upgradeResearch('${b.k}')">⬆️ (${c} XP)</button></div></div></div>`;});
            document.getElementById('researchContent').innerHTML=h;
        }
        function renderRank() {
            const s=[...allPlayers].sort((a,b)=>b.xp-a.xp); let h=`<div class="section-title">🏆 رتبه‌بندی</div>`;
            s.forEach((p,i)=>{const me=p.id===player.id,md=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${(i+1).toLocaleString('fa-IR')}.`; h+=`<div class="player-row" style="${me?'border-color:#f59e0b;background:rgba(245,158,11,0.05);':''}"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:1.1rem;min-width:28px;text-align:center;">${md}</span><div><div>${getFormattedName(p)}</div><div style="font-size:0.45rem;color:#64748b;">⚔️${calcAttackPower(p)} | 🛡️${calcDefensePower(p)} | 💰${Math.floor(p.gold).toLocaleString('fa-IR')}</div></div></div><span style="color:#fbbf24;font-weight:700;font-size:0.7rem;">⭐ ${p.xp.toLocaleString('fa-IR')}</span></div>`;});
            document.getElementById('rankContent').innerHTML=h;
        }
        function renderBattlelog() {
            let h=`<div class="section-title">📜 گزارش نبردها</div>`;
            if(!battleLogs.length) h+=`<div class="empty">هنوز نبردی نبوده</div>`;
            else{h+=`<div class="battle-log">`;[...battleLogs].reverse().forEach(l=>{h+=`<div class="log-entry" style="padding:6px 0;border-bottom:1px solid #1a1a2e;"><div style="font-size:0.55rem;color:#64748b;margin-bottom:2px;">${new Date(l.ts).toLocaleString('fa-IR')}</div><div>${l.text}</div></div>`;});h+=`</div>`;}
            document.getElementById('battlelogContent').innerHTML=h;
        }
        function renderAdmin() {
            if(!isAdmin()) return;
            let po=`<option value="">انتخاب...</option>`; allPlayers.forEach(p=>{po+=`<option value="${p.id}">${escapeHtml(p.name)} (💰${Math.floor(p.gold).toLocaleString('fa-IR')} | ⭐${p.xp})</option>`;});
            document.getElementById('adminContent').innerHTML=`
            <div class="info-bar" style="border-color:#ef4444;color:#fca5a5;">⚠️ پنل مدیریت | بازیکنان: ${allPlayers.length}</div>
            <div class="admin-panel-box"><h3>📢 اطلاعیه سراسری</h3><div style="display:flex;gap:5px;margin-bottom:8px;"><input type="text" id="admBannerText" placeholder="متن اطلاعیه..." maxlength="150" style="flex:1;margin:0;"><button class="btn btn-blue btn-sm" onclick="adminSetBanner()">اعلان</button><button class="btn btn-danger btn-sm" onclick="adminRemoveBanner()">حذف</button></div><div style="display:flex;gap:5px;"><button class="btn btn-sm" style="width:100%;justify-content:center;${chatLocked?'background:#10b981;color:#fff;':'background:#dc2626;color:#fff;'}" onclick="adminToggleChat()">${chatLocked?'🔓 باز کردن چت':'🔒 قفل چت'}</button></div></div>
            <div class="admin-panel-box"><h3>🎁 اعطای منابع</h3><select id="admSel">${po}</select><div style="display:flex;gap:5px;margin-top:5px;"><select id="admRes" style="width:35%;margin:0;"><option value="gold">💰 طلا</option><option value="oil">🛢️ نفت</option><option value="metal">⛏️ فلز</option><option value="xp">⭐ XP</option></select><input type="number" id="admAmt" placeholder="مقدار" style="width:35%;margin:0;" min="1"><button class="btn btn-gold btn-sm" style="width:30%;margin:0;" onclick="adminGiveRes()">اعطا</button></div></div>
            <div class="admin-panel-box"><h3>🛠️ عملیات</h3><div style="display:flex;flex-wrap:wrap;gap:5px;"><button class="btn btn-blue btn-sm" onclick="adminToggleShield()">🛡️ سپر</button><button class="btn btn-red btn-sm" onclick="adminResetPlayer()">⚠️ ریست</button><button class="btn btn-danger btn-sm" onclick="adminDeletePlayer()">🗑️ حذف</button></div></div>
            <div class="admin-panel-box"><h3>📢 پیام سراسری چت</h3><div style="display:flex;gap:5px;"><input type="text" id="admBroad" placeholder="متن..." maxlength="150" style="flex:1;margin:0;"><button class="btn btn-gold btn-sm" onclick="adminBroadcast()">ارسال</button><button class="btn btn-danger btn-sm" onclick="adminClearChat()">🧹 پاک</button></div></div>
            <div class="admin-panel-box" style="border-color:#dc2626;"><h3 style="color:#fca5a5;">☢️ منطقه خطر</h3><button class="btn btn-danger" style="width:100%;justify-content:center;" onclick="adminNuke()">☢️ نابودی سرور</button></div>`;
        }

        const renderMap = { mine:renderMine, military:renderMilitary, war:renderWar, chat:renderChat, factions:renderFactions, market:renderMarket, research:renderResearch, rank:renderRank, battlelog:renderBattlelog, admin:renderAdmin };
        function renderActiveTab() { const fn=renderMap[activeTab]; if(fn) fn(); }
        function switchTab(t) { activeTab=t; document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active')); document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active')); document.querySelector(`.tab[data-tab="${t}"]`)?.classList.add('active'); document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.add('active'); renderActiveTab(); }
        document.querySelectorAll('.tab').forEach(t=>{ t.addEventListener('click', ()=>switchTab(t.dataset.tab)); });

        async function gameLoop() { await loadAll(); if(player){const me=allPlayers.find(p=>p.id===player.id);if(me) player=me; updateUI(); if(activeTab==="mine") updateMineVisuals();} }
        async function init() {
            const ok=await initSupabase();
            if(ok){ await loadAll(); document.getElementById("loginBox").style.display='flex'; setInterval(gameLoop, SYNC_INTERVAL); }
            else{ document.getElementById("syncText").innerText="❌ اتصال برقرار نشد. رفرش کنید."; }
        }
        init();
    </script>
</body>
</html>
