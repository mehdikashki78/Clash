<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Iron sky | آسمان آهنین</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0b0b1a;
            min-height: 100vh;
            padding: 14px;
            color: #e2e8f0;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 30%, #1a1a3e 0%, #0b0b1a 70%),
                radial-gradient(ellipse at 80% 70%, #1a1a2e 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(20, 20, 40, 0.4);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #f59e0b, #d97706);
            border-radius: 10px;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            max-width: 1150px;
            margin: 0 auto;
            background: rgba(8, 8, 24, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 3rem;
            overflow: hidden;
            border: 1px solid rgba(245, 158, 11, 0.25);
            box-shadow:
                0 0 80px rgba(245, 158, 11, 0.06),
                inset 0 0 80px rgba(245, 158, 11, 0.02);
            transition: box-shadow 0.5s ease;
        }
        .container:hover {
            box-shadow: 0 0 100px rgba(245, 158, 11, 0.10);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            background: linear-gradient(145deg, rgba(20, 20, 44, 0.9), rgba(8, 8, 20, 0.95));
            padding: 1.8rem 1rem 1.2rem;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(245, 158, 11, 0.12);
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(245, 158, 11, 0.04), transparent 60%);
            pointer-events: none;
            animation: headerGlow 10s infinite alternate ease-in-out;
        }
        @keyframes headerGlow {
            0% {
                transform: translate(-10%, -10%);
            }
            100% {
                transform: translate(10%, 10%);
            }
        }
        .header h1 {
            color: #fbbf24;
            text-shadow: 0 0 60px rgba(245, 158, 11, 0.25), 0 4px 30px rgba(0, 0, 0, 0.7);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        .header h1 span {
            color: #f59e0b;
        }
        .header .sub {
            font-size: 0.7rem;
            color: #f59e0b;
            letter-spacing: 8px;
            opacity: 0.7;
            margin-top: 2px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        .sync-status {
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 16px;
            text-align: center;
            font-size: 0.6rem;
            color: #fbbf24;
            border-bottom: 1px solid rgba(245, 158, 11, 0.08);
            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
            border-radius: 0 0 20px 20px;
            backdrop-filter: blur(4px);
        }
        .sync-status #syncText {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ============================================================
           ONLINE BAR
           ============================================================ */
        .online-bar {
            background: rgba(10, 30, 10, 0.6);
            padding: 6px 12px;
            text-align: center;
            font-size: 0.6rem;
            color: #4ade80;
            border-bottom: 1px solid rgba(74, 222, 128, 0.12);
            backdrop-filter: blur(4px);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .online-bar.offline {
            background: rgba(30, 10, 10, 0.7);
            color: #fca5a5;
            border-color: rgba(252, 165, 165, 0.15);
        }
        .online-bar.warn {
            background: rgba(30, 30, 10, 0.7);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.15);
        }
        .online-bar .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-dot 1.8s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ============================================================
           SHIELD BAR
           ============================================================ */
        .shield-bar {
            background: rgba(16, 30, 60, 0.7);
            padding: 10px 14px;
            text-align: center;
            font-size: 0.7rem;
            color: #93c5fd;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            display: none;
            font-weight: 700;
            backdrop-filter: blur(4px);
            animation: shieldPulse 2.5s infinite ease-in-out;
            letter-spacing: 0.5px;
        }
        @keyframes shieldPulse {
            0%,
            100% {
                opacity: 1;
                text-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
            }
            50% {
                opacity: 0.75;
                text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            }
        }

        /* ============================================================
           LOGIN BOX
           ============================================================ */
        .login-box {
            padding: 32px 24px 40px;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            gap: 16px;
            backdrop-filter: blur(8px);
            align-items: center;
        }
        .login-box input {
            width: 100%;
            max-width: 400px;
            padding: 16px 24px;
            border-radius: 60px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            text-align: center;
            font-size: 1rem;
            background: rgba(16, 16, 36, 0.8);
            color: white;
            outline: none;
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .login-box input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.10);
            background: rgba(24, 24, 48, 0.9);
        }
        .login-box input::placeholder {
            color: #64748b;
            font-weight: 400;
        }
        .login-box button {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: 800;
            cursor: pointer;
            color: #0f172a;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 8px 40px rgba(245, 158, 11, 0.15);
            letter-spacing: 1px;
        }
        .login-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 50px rgba(245, 158, 11, 0.30);
        }
        .login-box .login-hint {
            font-size: 0.65rem;
            color: #64748b;
            text-align: center;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ============================================================
           RES BAR
           ============================================================ */
        .res-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 10px;
            background: rgba(0, 0, 0, 0.35);
            border-bottom: 1px solid rgba(245, 158, 11, 0.06);
            backdrop-filter: blur(4px);
        }
        .res-item {
            background: rgba(16, 16, 36, 0.7);
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            border: 1px solid rgba(245, 158, 11, 0.08);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }
        .res-item:hover {
            border-color: rgba(245, 158, 11, 0.25);
            transform: translateY(-2px);
        }
        .res-item span {
            color: #fbbf24;
            font-weight: 900;
            font-size: 0.8rem;
            min-width: 44px;
            text-align: center;
        }

        /* ============================================================
           TABS
           ============================================================ */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(245, 158, 11, 0.06);
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 6px;
            gap: 2px;
            backdrop-filter: blur(4px);
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 700;
            color: #94a3b8;
            font-size: 0.65rem;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            text-align: center;
            transition: all 0.25s;
            border-radius: 14px 14px 0 0;
            background: transparent;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .tab:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.02);
        }
        .tab.active {
            color: #fbbf24;
            background: rgba(245, 158, 11, 0.06);
            border-bottom-color: #f59e0b;
            box-shadow: 0 -4px 30px rgba(245, 158, 11, 0.04);
        }
        .tab.admin-tab {
            color: #fca5a5;
            border-color: transparent;
        }
        .tab.admin-tab.active {
            color: #fca5a5;
            background: rgba(220, 38, 38, 0.06);
            border-bottom-color: #ef4444;
        }

        /* ============================================================
           PANELS
           ============================================================ */
        .panel {
            display: none;
            padding: 18px 14px;
            min-height: 460px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
            animation: panelFade 0.35s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes panelFade {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           CARDS
           ============================================================ */
        .grid2 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 16px;
        }
        .card {
            background: rgba(16, 16, 36, 0.65);
            backdrop-filter: blur(10px);
            border-radius: 2.2rem;
            padding: 18px 14px;
            text-align: center;
            border: 1px solid rgba(245, 158, 11, 0.06);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(245, 158, 11, 0.20);
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.4);
            background: rgba(20, 20, 44, 0.75);
        }
        .card .icon {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .card .cost {
            font-size: 0.6rem;
            color: #fbbf24;
            margin-top: 4px;
            font-weight: 600;
            opacity: 0.9;
        }
        .card h3 {
            font-size: 1rem;
            margin: 6px 0 2px;
            color: #f1f5f9;
            font-weight: 700;
        }

        /* ============================================================
           PLAYER ROW
           ============================================================ */
        .player-row {
            background: rgba(0, 0, 0, 0.30);
            border-radius: 2rem;
            padding: 10px 18px;
            margin-bottom: 8px;
            border: 1px solid rgba(245, 158, 11, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .player-row:hover {
            border-color: rgba(245, 158, 11, 0.12);
            background: rgba(0, 0, 0, 0.40);
        }

        /* ============================================================
           BUTTONS
           ============================================================ */
        .btn {
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.65rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 2px;
            letter-spacing: 0.4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }
        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-attack {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #fff;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
        }
        .btn-green {
            background: linear-gradient(135deg, #10b981, #047857);
            color: #fff;
        }
        .btn-purple {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff;
        }
        .btn-blue {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: #fff;
        }
        .btn-red {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #fff;
        }
        .btn-danger {
            background: linear-gradient(135deg, #7f1d1d, #450a0a);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
        .btn-sm {
            padding: 5px 14px;
            font-size: 0.55rem;
        }
        .btn-glow {
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.10);
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: rgba(12, 12, 32, 0.92);
            backdrop-filter: blur(16px);
            color: #fbbf24;
            padding: 14px 26px;
            border-radius: 60px;
            border-right: 5px solid #f59e0b;
            z-index: 9999;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, fadeOut 4.5s ease forwards 0.6s;
            max-width: 92%;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.error {
            border-right-color: #ef4444;
            color: #fca5a5;
        }
        .toast.war {
            background: rgba(30, 8, 8, 0.92);
            border-right-color: #ef4444;
            color: #fca5a5;
        }
        .toast.peace {
            background: rgba(8, 30, 8, 0.92);
            border-right-color: #10b981;
            color: #4ade80;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            70% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
                visibility: hidden;
            }
        }

        /* ============================================================
           EMPTY
           ============================================================ */
        .empty {
            text-align: center;
            padding: 36px 16px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ============================================================
           SECTION TITLE
           ============================================================ */
        .section-title {
            color: #fbbf24;
            margin: 16px 0 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(51, 65, 85, 0.30);
            padding-bottom: 8px;
            font-weight: 800;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), transparent);
        }

        /* ============================================================
           INFO BAR
           ============================================================ */
        .info-bar {
            background: rgba(16, 16, 36, 0.55);
            padding: 12px 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            font-size: 0.7rem;
            text-align: center;
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.06);
            backdrop-filter: blur(4px);
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* ============================================================
           INPUTS & SELECTS
           ============================================================ */
        input,
        select {
            background: rgba(12, 12, 32, 0.75);
            border: 1px solid rgba(51, 65, 85, 0.40);
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
            margin: 4px 0;
            font-size: 0.65rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        input:focus,
        select:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.04);
        }
        input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        /* ============================================================
           BADGE
           ============================================================ */
        .badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.5rem;
            font-weight: 800;
            letter-spacing: 0.4px;
        }
        .badge-blue {
            background: rgba(30, 64, 175, 0.50);
            color: #93c5fd;
            backdrop-filter: blur(4px);
        }

        /* ============================================================
           BATTLE LOG
           ============================================================ */
        .battle-log {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(245, 158, 11, 0.04);
            border-radius: 2rem;
            padding: 14px;
            max-height: 340px;
            overflow-y: auto;
            font-size: 0.65rem;
            backdrop-filter: blur(4px);
        }
        .battle-log .log-entry {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .battle-log .log-entry:last-child {
            border-bottom: none;
        }
        .battle-log .log-entry small {
            color: #64748b;
            font-size: 0.5rem;
        }
        .attacker {
            color: #fca5a5;
        }
        .defender {
            color: #7dd3fc;
        }
        .loot {
            color: #4ade80;
        }
        .lost {
            color: #ef4444;
        }

        /* ============================================================
           BATTLE OVERLAY
           ============================================================ */
        .battle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(12px);
            animation: overlayIn 0.5s ease;
        }
        .battle-overlay.active {
            display: flex;
        }
        @keyframes overlayIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .explosion {
            font-size: 8rem;
            animation: boom 0.7s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 50px #ef4444);
        }
        @keyframes boom {
            0% {
                transform: scale(1) rotate(-6deg);
                opacity: 1;
            }
            100% {
                transform: scale(1.3) rotate(6deg);
                opacity: 0.7;
            }
        }
        .battle-text {
            color: #fbbf24;
            font-size: 2rem;
            font-weight: 900;
            margin-top: 28px;
            text-shadow: 0 0 40px rgba(245, 158, 11, 0.4);
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
        }
        .result-text {
            color: #e2e8f0;
            font-size: 1.4rem;
            text-align: center;
            margin-top: 16px;
            max-width: 90%;
            font-weight: 700;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
        }
        .screen-shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }
        @keyframes shake {
            10%,
            90% {
                transform: translate3d(-3px, 0, 0);
            }
            20%,
            80% {
                transform: translate3d(6px, 0, 0);
            }
            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0);
            }
            40%,
            60% {
                transform: translate3d(8px, 0, 0);
            }
        }

        /* ============================================================
           STORAGE BAR
           ============================================================ */
        .storage-bar {
            height: 10px;
            background: rgba(51, 65, 85, 0.30);
            border-radius: 20px;
            margin: 6px 0 4px;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            transition: width 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 20px;
        }
        .hp-fill {
            background: linear-gradient(90deg, #10b981, #ef4444);
        }

    <script>
        // ================================================================
        //  ════════════════════════════════════════════════════════════════
        //  تمام کدهای مربوط به Supabase و منطق بازی بدون تغییر باقی می‌ماند
        //  ════════════════════════════════════════════════════════════════
        // ================================================================

        const SUPABASE_URL = 'https://rxugexswtpvuotijdlzn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gsgiccX5kQMLrXnSqbAPwQ_ZoRRsYT3';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ADMIN_NAME = "Dev";
        const ADMIN_PASS = "admin1313";

        const DATA_KEY = "EMPIRE_DATA_V46_UNIQ";
        const SYNC_INTERVAL = 3000;
        const SHIELD_DURATION = 12 * 60 * 60 * 1000;

        let player = null,
            allPlayers = [],
            marketOffers = [],
            battleLogs = [],
            chatMessages = [];
        let isConnected = false,
            saving = false;
        let isAttacking = false;

        const F_DB = {
            "A-4": { n: "Qaher-313", i: "🇮🇷", p: 15, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "F-5E": { n: "F-5E Tiger", i: "🇺🇸", p: 20, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "MiG-21": { n: "MiG-21", i: "🇷🇺", p: 25, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "F-16": { n: "F-16", i: "🇺🇸", p: 130, c: { g: 5500, o: 1600, m: 900 }, r: 3 },
            "MiG-29": { n: "MiG-29", i: "🇷🇺", p: 180, c: { g: 8000, o: 2200, m: 1300 }, r: 4 },
            "F-35": { n: "F-35 Lightning", i: "🇺🇸", p: 300, c: { g: 16000, o: 4500, m: 2800 }, r: 5 },
            "Su-57": { n: "Su-57 Felon", i: "🇷🇺", p: 400, c: { g: 22000, o: 6000, m: 4500 }, r: 6 },
            "F-22": { n: "F-22 Raptor", i: "🇺🇸", p: 500, c: { g: 38000, o: 11000, m: 8500 }, r: 8 }
        };

        const D_DB = {
            "Patriot": { n: "Patriot", i: "🇺🇸", c: { g: 20000, o: 6000, m: 4000 }, def: 120, hp: 180 },
            "S-400": { n: "S-400", i: "🇷🇺", c: { g: 25000, o: 8000, m: 6000 }, def: 150, hp: 200 },
            "Khordad": { n: "خرداد-۱۵", i: "🇮🇷", c: { g: 8000, o: 2000, m: 1500 }, def: 60, hp: 100 },
            "Bavar": { n: "باور-۳۷۳", i: "🇮🇷", c: { g: 15000, o: 4500, m: 3000 }, def: 100, hp: 150 },
        };

        const FACTIONS_DB = {
            "sky_knights": { n: "شوالیه‌های آسمان", i: "🛡️" },
            "red_baron": { n: "بارون‌های سرخ", i: "🌹" },
            "iron_cross": { n: "صلیب‌های آهنین", i: "✠" },
            "grey_wolves": { n: "گرگ‌های خاکستری", i: "🐺" },
            "desert_falcons": { n: "شاهین‌های صحرا", i: "🦅" },
            "sky_phantoms": { n: "شبح‌های آسمان", i: "👻" }
        };

        function toast(m, e = false, type = "") {
            const t = document.createElement("div");
            t.className = "toast" + (e ? " error" : "") + (type ? " " + type : "");
            t.innerHTML = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        function ts() { return Date.now(); }

        function escapeHtml(str) {
            return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function isAdmin() {
            return player && player.name === ADMIN_NAME && player.password === ADMIN_PASS;
        }

        function getFormattedName(p) {
            const facTag = p.faction ? `<span style="color: #ef4444; font-size: 0.8em; margin-right: 4px;">[${FACTIONS_DB[p.faction]?.n || p.faction}]</span>` :
                '';
            if (p.name === ADMIN_NAME) {
                return `<span style="color: #3b82f6; font-weight: bold;">🚬 ${escapeHtml(p.name)}</span> ${facTag}`;
            }
            return `${escapeHtml(p.name)} ${facTag}`;
        }

        function syncPlayerToAllPlayers() {
            if (!player) return;
            const idx = allPlayers.findIndex(p => p.id === player.id);
            if (idx >= 0) allPlayers[idx] = player;
        }

        async function initSupabase() {
            updateSyncUI("🔌 در حال اتصال به دیتابیس...", "warn");
            try {
                const { data, error } = await db.from('game_state').select('id').eq('id', 'main_game').maybeSingle();
                if (error) throw error;
                isConnected = true;
                updateSyncUI("✅ متصل به سرور", "online");
                return true;
            } catch (e) {
                console.error(e);
                updateSyncUI("❌ خطا در اتصال به سوپابیس", "error");
                return false;
            }
        }

        function updateSyncUI(text, status) {
            document.getElementById("syncText").innerText = text;
            const ob = document.getElementById("onlineBar");
            ob.classList.remove("offline", "warn");
            if (status === "error") ob.classList.add("offline");
            else if (status === "warn") ob.classList.add("warn");
            document.getElementById("onlineText").innerText = text;
        }

        function compressPlayer(p) {
            return { i: p.id, n: p.name, p: p.password, g: p.gold, o: p.oil, m: p.metal, x: p.xp, fac: p.faction,
                t: p.lastMineCollect, l: p.mineLevel, r: [p.research.military, p.research.economy, p.research.aviation],
                f: p.fighters, d: p.defenses, sh: p.shieldExpiry };
        }

        function decompressPlayer(c) {
            return { id: c.i, name: c.n, password: c.p, gold: c.g || 0, oil: c.o || 0, metal: c.m || 0, xp: c.x || 0,
                faction: c.fac || null, lastMineCollect: c.t || ts(), mineLevel: c.l || 1,
                research: { military: c.r ? .[0] || 0, economy: c.r ? .[1] || 0, aviation: c.r ? .[2] || 0 },
                fighters: c.f || {}, defenses: c.d || [], shieldExpiry: c.sh || 0 };
        }

        function packData() {
            return { k: DATA_KEY, p: allPlayers.map(compressPlayer), m: marketOffers, l: battleLogs.slice(-15),
                c: chatMessages.slice(-10) };
        }

        async function saveAll(force = false) {
            if (!isConnected) return false;
            if (saving && !force) return false;
            if (saving) return false;
            saving = true;
            syncPlayerToAllPlayers();
            const dataToSave = packData();
            try {
                const { error } = await db.from('game_state').upsert({ id: 'main_game', data: dataToSave }, { onConflict: 'id' });
                if (error) throw error;
                updateSyncUI("✅ ذخیره شد", "online");
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                updateSyncUI("❌ خطا در ذخیره", "error");
                return false;
            } finally {
                saving = false;
            }
        }

        async function loadAll() {
            if (!isConnected) if (!await initSupabase()) return false;
            try {
                const { data, error } = await db.from('game_state').select('data').eq('id', 'main_game').single();
                if (error && error.code !== 'PGRST116') throw error;
                if (data && data.data) {
                    const j = data.data;
                    if (j.k === DATA_KEY) {
                        allPlayers = (j.p || []).map(decompressPlayer);
                        marketOffers = j.m || [];
                        battleLogs = j.l || [];
                        chatMessages = j.c || [];
                        if (player) {
                            const me = allPlayers.find(p => p.id === player.id);
                            if (me) player = me;
                        }
                        return true;
                    }
                }
                return true;
            } catch (e) {
                console.error("Load Error:", e);
                return false;
            }
        }

        function createPlayer(name, pass) {
            return { id: name + "_" + ts().toString(36), name, password: pass, gold: 1000, oil: 300, metal: 300, xp: 0,
                faction: null, lastMineCollect: ts(), mineLevel: 1, research: { military: 0, economy: 0, aviation: 0 },
                fighters: {}, defenses: [], shieldExpiry: 0 };
        }

        function calcMine(p) {
            const sec = Math.min((ts() - (p.lastMineCollect || ts())) / 1000, 300);
            const cap = p.mineLevel * 300;
            const yieldRate = p.mineLevel * 0.5;
            return { gold: Math.min(cap, Math.floor(yieldRate * 2 * sec)), oil: Math.min(cap, Math.floor(yieldRate * sec)),
                metal: Math.min(cap, Math.floor(yieldRate * 1.5 * sec)), cap: cap };
        }

        function calcAttackPower(p) {
            if (!p || !p.fighters) return 0;
            let power = 0;
            for (const [n, d] of Object.entries(p.fighters))
                if (F_DB[n] && d.count > 0) power += F_DB[n].p * d.count;
            return Math.floor(power);
        }

        function calcDefensePower(p) {
            if (!p) return 0;
            let power = calcAttackPower(p) * 0.5;
            if (p.defenses) p.defenses.forEach(def => { if (D_DB[def.type] && def.hp > 0) power += D_DB[def.type].def * (def
                    .hp / def.maxHp); });
            return Math.floor(power);
        }

        function getFactionStats() {
            const stats = {};
            for (const id in FACTIONS_DB) stats[id] = { id, name: FACTIONS_DB[id].n, icon: FACTIONS_DB[id].i, members: 0,
                points: 0 };
            allPlayers.forEach(p => { if (p.faction && stats[p.faction]) { stats[p.faction].members++;
                    stats[p.faction].points += (p.xp || 0); } });
            return Object.values(stats).sort((a, b) => b.points - a.points);
        }

        // ================================================================
        //  WINDOW FUNCTIONS (همه توابع بازی بدون تغییر)
        // ================================================================

        window.loginRegister = async function() {
            const name = document.getElementById("playerName").value.trim(),
                pass = document.getElementById("playerPassword").value.trim();
            if (name.length < 3 || pass.length < 4) return toast("نام کاربری و رمز نامعتبر است", true);
            const existing = allPlayers.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existing) {
                if (existing.password !== pass) return toast("رمز اشتباه است", true);
                player = existing;
            } else {
                if (allPlayers.length >= 50) return toast("سرور پر است", true);
                player = createPlayer(name, pass);
                allPlayers.push(player);
                await saveAll(true);
            }
            document.getElementById("loginBox").style.display = 'none';
            document.getElementById("gameUI").style.display = 'block';
            updateUI();
            renderMine();
            toast("ورود موفق", false, "peace");
        };

        window.collectMine = async function() {
            const m = calcMine(player);
            player.gold += m.gold;
            player.oil += m.oil;
            player.metal += m.metal;
            player.lastMineCollect = ts();
            await saveAll();
            updateUI();
            renderMine();
            toast("💎 استخراج شد", false, "peace");
        };
        window.upgradeMine = async function() {
            const c = player.mineLevel * 10000;
            if (player.gold < c) return toast("طلا کم است", true);
            player.gold -= c;
            player.mineLevel++;
            await saveAll();
            updateUI();
            renderMine();
            toast("معدن ارتقا یافت!", false, "peace");
        };

        window.buildFighter = async function(key) {
            const f = F_DB[key];
            if (player.gold < f.c.g || player.oil < f.c.o || player.metal < f.c.m) return toast("منابع کم است", true);
            if ((player.research?.aviation || 0) < f.r) return toast("تحقیقات کم است", true);
            player.gold -= f.c.g;
            player.oil -= f.c.o;
            player.metal -= f.c.m;
            if (!player.fighters[key]) player.fighters[key] = { count: 0 };
            player.fighters[key].count++;
            await saveAll();
            updateUI();
            renderMilitary();
        };
        window.buildDefense = async function(key) {
            const d = D_DB[key];
            if (player.gold < d.c.g) return toast("طلا کم است", true);
            player.gold -= d.c.g;
            player.oil -= d.c.o;
            player.metal -= d.c.m;
            if (!player.defenses) player.defenses = [];
            player.defenses.push({ id: ts().toString(36), type: key, hp: d.hp, maxHp: d.hp });
            await saveAll();
            updateUI();
            renderMilitary();
        };

        window.repairDefense = async function(defId) {
            const def = player.defenses.find(d => d.id === defId);
            if (!def) return;
            const dmg = def.maxHp - def.hp;
            const cost = dmg * 10;
            if (player.gold < cost) return toast("طلا برای تعمیر کافی نیست", true);
            player.gold -= cost;
            def.hp = def.maxHp;
            await saveAll();
            updateUI();
            renderMilitary();
        };

        window.joinFaction = async function(facId) {
            player.faction = facId;
            await saveAll(true);
            updateUI();
            renderFactions();
            renderRank();
            toast(`به ${FACTIONS_DB[facId].n} پیوستید!`, false, "peace");
        };

        window.launchAttack = async function(targetId) {
            if (isAttacking) return;
            isAttacking = true;
            try {
                const target = allPlayers.find(p => p.id === targetId);
                if (!target) return toast("هدف یافت نشد", true);
                const myAtt = calcAttackPower(player);
                if (myAtt <= 0) return toast("برای حمله باید حداقل یک جنگنده بسازید!", true, "war");
                if (target.shieldExpiry && ts() < target.shieldExpiry) {
                    const remainingMs = target.shieldExpiry - ts();
                    const h = Math.floor(remainingMs / 3600000);
                    const m = Math.floor((remainingMs % 3600000) / 60000);
                    return toast(`🛡️ این کشور تحت حمایت سپر است (${h} ساعت و ${m} دقیقه باقیمانده)`, true);
                }
                if (player.shieldExpiry && ts() < player.shieldExpiry) {
                    player.shieldExpiry = 0;
                    const apIdx = allPlayers.findIndex(p => p.id === player.id);
                    if (apIdx >= 0) allPlayers[apIdx].shieldExpiry = 0;
                    updateUI();
                    await saveAll(true);
                    toast("🛡️ سپر شما به دلیل آغاز حمله از بین رفت!", false, "war");
                }

                const enemyDef = calcDefensePower(target);
                let resultMsg = "",
                    resultStr = "",
                    isWin = false;

                if (myAtt > enemyDef) {
                    isWin = true;
                    const ratio = enemyDef / myAtt;
                    const loot = { g: Math.floor(target.gold * 0.3), o: Math.floor(target.oil * 0.3), m: Math.floor(target
                            .metal * 0.3) };
                    target.gold -= loot.g;
                    target.oil -= loot.o;
                    target.metal -= loot.m;
                    player.gold += loot.g;
                    player.oil += loot.o;
                    player.metal += loot.m;
                    player.xp += 15;
                    target.xp += 3;
                    target.shieldExpiry = ts() + SHIELD_DURATION;
                    let attackerLost = 0;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        const lost = Math.ceil(f.count * ratio * 0.5);
                        f.count = Math.max(0, f.count - lost);
                        attackerLost += lost;
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        const lost = Math.ceil(f.count * 0.8);
                        f.count = Math.max(0, f.count - lost);
                    }
                    if (target.defenses) target.defenses.forEach(def => { def.hp = 0; });
                    target.defenses = target.defenses ? target.defenses.filter(def => def.hp > 0) : [];
                    resultMsg =
                        `🔥 <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد و پیروز شد! <span class="loot">${loot.g} طلا، ${loot.o} نفت، ${loot.m} فلز</span> غارت شد.`;
                    resultStr = `🏆 پیروزی!<br>غارت: ${loot.g}طلا | ${loot.o}نفت`;
                } else {
                    isWin = false;
                    const ratio = myAtt / enemyDef;
                    player.xp += 2;
                    target.xp += 15;
                    let attackerLost = 0;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        const lost = Math.ceil(f.count * 0.9);
                        f.count = Math.max(0, f.count - lost);
                        attackerLost += lost;
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        const lost = Math.ceil(f.count * ratio * 0.4);
                        f.count = Math.max(0, f.count - lost);
                    }
                    if (target.defenses) {
                        target.defenses.forEach(def => { def.hp -= 40; if (def.hp < 0) def.hp = 0; });
                        target.defenses = target.defenses.filter(def => def.hp > 0);
                    }
                    resultMsg =
                        `🛡️ <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد اما دفاع شد!`;
                    resultStr = `💥 شکست سنگین!`;
                }

                player.shieldExpiry = 0;
                const preSaveIdx = allPlayers.findIndex(p => p.id === player.id);
                if (preSaveIdx >= 0) allPlayers[preSaveIdx].shieldExpiry = 0;

                battleLogs.push({ ts: ts(), text: resultMsg });
                await saveAll(true);

                document.getElementById('app').classList.add('screen-shake');
                const overlay = document.getElementById('battleOverlay');
                const statusText = document.getElementById('battleStatusText');
                const resultText = document.getElementById('battleResultText');
                const expIcon = document.getElementById('explosionIcon');
                overlay.classList.add('active');
                statusText.innerText = `هدف قفل شد: ${target.name}`;
                statusText.style.color = "#fbbf24";
                resultText.innerText = "";
                expIcon.innerText = "🚀";
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = "برخورد!";

                document.getElementById('app').classList.add('screen-shake');
                await new Promise(r => setTimeout(r, 1500));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = isWin ? "پیروزی!" : "شکست!";

                isAttacking = false;
            }
        };

            if (player[o.get] < o.gta) return toast("پول کافی ندارید", true);
            player[o.get] -= o.gta;

            renderMarket();

        function renderMarket() {
            let h =
                `<div class="section-title">🛒 فروش</div><div class="card"><select id="mktGive"><option value="gold">💰 طلا</option><option value="oil">🛢️ نفت</option><option value="metal">⛏️ فلز</option></select><input type="number" id="mktGiveAmt" placeholder="مقدار"><select id="mktGet"><option value="gold">💰 طلا</option><option value="oil">🛢️ نفت</option><option value="metal">⛏️ فلز</option></select><input type="number" id="mktGetAmt" placeholder="مقدار درخواست"><button class="btn btn-gold" onclick="createMarketOffer()">ثبت</button></div><div class="section-title">📜 بازار</div>`;
            if (marketOffers.length === 0) h += `<div class="empty">بازار خالی است</div>`;
            marketOffers.forEach(o => {
                const r = { gold: "💰طلا", oil: "🛢️نفت", metal: "⛏️فلز" };
                h +=
                    `<div class="player-row"><span>${escapeHtml(o.seller)}: ${o.ga} ${r[o.give]} ➡️ ${o.gta} ${r[o.get]}</span>${o.sid===player.id?'<button class="btn btn-red btn-sm" disabled>شما</button>':`<button class="btn btn-green btn-sm" onclick="buyMarketOffer('${o.id}')">خرید</button>`}</div>`;
            });
            document.getElementById('marketContent').innerHTML = h;
        }

        function renderResearch() {
            const b = { military: "⚔️ نظامی", economy: "💰 اقتصاد", aviation: "✈️ هوانوردی" };
            let h = `<div class="section-title">🔬 تحقیقات (XP: ${player.xp})</div><div class="grid2">`;
            for (const [k, n] of Object.entries(b)) {
                const l = player.research[k],
                    c = (l + 1) * 15;
                h +=
                    `<div class="card"><div class="icon">${n}</div><div class="cost">سطح: ${l}</div><div class="cost">هزینه: ${c} XP</div><button class="btn btn-purple btn-sm" ${player.xp<c?'disabled':''} onclick="upgradeResearch('${k}')">ارتقا</button></div>`;
            }
            document.getElementById('researchContent').innerHTML = h + `</div>`;
        }

        function renderRank() {
            let h = "";
            const fStats = getFactionStats();
            h += `<div class="section-title">🛡️ رتبه جناح‌ها</div>`;
            fStats.forEach((f, i) => {
                const rank = i + 1;
                let crown = rank <= 3 ? "👑 " : "";
                let style = rank <= 3 ? "color: #fbbf24; font-weight: bold;" : "";
                h +=
                    `<div class="player-row"><span style="${style}">#${rank} ${crown}${f.icon} ${f.name}</span><span>👥 ${f.members} | ⭐ ${f.points}</span></div>`;
            });
            h += `<div class="section-title">🏆 رتبه بازیکنان</div>`;
            const sortedPlayers = [...allPlayers].sort((a, b) => (b.xp || 0) - (a.xp || 0));
            sortedPlayers.forEach((p, i) => {
                const rank = i + 1;
                let crown = rank <= 3 ? "👑 " : "";
                let style = rank <= 3 ? "color: #fbbf24; font-weight: bold;" : "";
                h +=
                    `<div class="player-row"><span style="${style}">#${rank} ${crown}${getFormattedName(p)} ${p.id===player.id?'(شما)':''}</span><span>⭐ ${p.xp || 0}</span></div>`;
            });
            document.getElementById('rankContent').innerHTML = h;
        }

        function renderBattlelog() {
            let h =
                `<div class="section-title">📜 گزارش جنگ‌ها (آخرین ۱۵ مورد)</div><div class="battle-log">`;
            if (battleLogs.length === 0) h += `<div class="empty">جنگی ثبت نشده</div>`;
            battleLogs.slice().reverse().forEach(l => h +=
                `<div class="log-entry">${l.text}<br><small>${new Date(l.ts).toLocaleTimeString('fa-IR')}</small></div>`);
            document.getElementById('battlelogContent').innerHTML = h + `</div>`;
        }

        // ================================================================
        //  TAB EVENTS
        // ================================================================

        document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            const tn = t.dataset.tab;
            document.getElementById('panel' + tn.charAt(0).toUpperCase() + tn.slice(1)).classList.add('active');
            if (tn === 'mine') renderMine();
            else if (tn === 'military') renderMilitary();
            else if (tn === 'war') renderWar();
            else if (tn === 'chat') renderChat();
            else if (tn === 'factions') renderFactions();
            else if (tn === 'market') renderMarket();
            else if (tn === 'research') renderResearch();
            else if (tn === 'rank') renderRank();
            else if (tn === 'battlelog') renderBattlelog();
            else if (tn === 'admin') renderAdmin();
        }));

        // ================================================================
        //  SYNC LOOP
        // ================================================================

        async function syncLoop() {
            if (isConnected && !isAttacking) {
                await loadAll();
                if (player) {
                    updateUI();
                    if (document.querySelector('.tab.active')?.dataset.tab === 'chat') renderChat();
                }
            }
        }

        // ================================================================
        //  INIT
        // ================================================================

        async function init() {
            if (await initSupabase()) {
                await loadAll();
                document.getElementById('loginBox').style.display = 'flex';
                setInterval(syncLoop, SYNC_INTERVAL);
            }
        }
        init();
    </script>
</body>
</html>
