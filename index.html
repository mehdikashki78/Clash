<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚔️ جنگ قبایل | آنلاین</title>
    <style>
        /* تمام استایل‌های قبلی را اینجا قرار دهید */
        /* (برای کوتاهی، استایل کامل در فایل‌های قبلی موجود است) */
    </style>
</head>
<body>
    <!-- تمام HTML بازی را اینجا قرار دهید -->
    <!-- (مشابه فایل قبلی) -->
    <script>
        // ============================================================
        //  CONFIG – آدرس هاست PHP خود را اینجا قرار دهید
        // ============================================================
        const API_URL = 'https://clashgamemini.fastino.site/data.php'; // ← این را به آدرس data.php روی هاست خود تغییر دهید
        const TOKEN = 'clash2025secure';
        const GEM_INTERVAL = 12 * 3600 * 1000;
        const TRAIN_COOLDOWN = 5 * 60 * 1000;
        const ATTACK_COOLDOWN = 15 * 60 * 1000;
        const CLAN_CREATE_COST = 30;
        const PVP_COOLDOWN = 24 * 3600 * 1000;
        const PVP_LOSS_COOLDOWN = 5 * 60 * 1000;
        const PVP_DEFENDER_SHIELD = 30 * 60 * 1000;

        let currentPlayer = null;
        let allPlayers = [];
        let allClans = [];
        let allShop = [];
        let allWars = [];
        let pendingClans = [];
        let announcementData = null;

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(msg, type = 'info', icon = '📢', duration = 4000) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span class="icon">${icon}</span>
                <span class="text">${msg}</span>
                <span class="close-toast" onclick="this.parentElement.remove()">✕</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => { if (toast.parentElement) toast.remove(); }, duration);
        }

        // ============================================================
        //  HELPERS
        // ============================================================
        function log(msg) { console.log(msg); }
        function toast(msg, err = false) {
            if (err) showToast(msg, 'error', '❌');
            else showToast(msg, 'success', '✅');
        }
        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }

        // ============================================================
        //  API
        // ============================================================
        async function apiGet() {
            try {
                const r = await fetch(API_URL + '?token=' + TOKEN);
                const text = await r.text();
                try {
                    const d = JSON.parse(text);
                    if (d.ok) {
                        allPlayers = d.players || [];
                        allClans = d.clans || [];
                        allShop = d.shop || [];
                        allWars = d.wars || [];
                        pendingClans = d.pendingClans || [];
                        announcementData = d.announcement || null;
                        return true;
                    }
                    return false;
                } catch (e) { log('API GET parse error'); return false; }
            } catch (e) { log('API GET fetch error'); return false; }
        }

        async function apiSave() {
            try {
                const payload = {
                    token: TOKEN,
                    players: allPlayers,
                    clans: allClans,
                    shop: allShop,
                    wars: allWars,
                    pendingClans: pendingClans,
                    announcement: announcementData
                };
                const r = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const text = await r.text();
                try {
                    const d = JSON.parse(text);
                    if (d.ok) { document.getElementById('syncStatus').textContent = '✅ ذخیره شد | ' + allPlayers.length + ' بازیکن'; return true; }
                    return false;
                } catch (e) { return false; }
            } catch (e) { return false; }
        }

        // ============================================================
        //  CLASSES
        // ============================================================
        class Player {
            constructor(name, pass) {
                this.id = uid();
                this.name = name;
                this.password = pass;
                this.gold = 300;
                this.elixir = 100;
                this.gems = 10;
                this.townHall = 1;
                this.defenseLevel = 0;
                this.troops = { barbarian: 0, archer: 0, giant: 0, goblin: 0 };
                this.clanId = null;
                this.clanRank = null;
                this.respect = 100;
                this.wins = 0;
                this.losses = 0;
                this.lastActive = Date.now();
                this.createdAt = Date.now();
                this.history = [];
                this.isAdmin = false;
                this.goldCollectedToday = 0;
                this.elixirCollectedToday = 0;
                this.lastCollectionDate = new Date().toISOString().split('T')[0];
                this.lastTroopRequest = 0;
                this.chatColor = '#ffd700';
                this.emoji = '';
                this.lastGemTime = Date.now() - GEM_INTERVAL;
                this.shieldExpiry = 0;
                this.lastTrainTime = 0;
                this.purchasedEmojis = [];
                this.purchasedColors = [];
                this.lastAttackTime = 0;
                this.lastAttackTimes = {};
                this.lastAttackReceived = {};
                this.lastPvPAttempt = 0;
            }
        }

        class Clan {
            constructor(name, leaderId, leaderName) {
                this.id = uid();
                this.name = name;
                this.description = 'اتحاد جدید';
                this.isOpen = true;
                this.leaderId = leaderId;
                this.coLeaders = [];
                this.elders = [];
                this.members = [];
                this.chat = [];
                this.createdAt = Date.now();
                this.totalStars = 0;
                this.warWins = 0;
                this.warLosses = 0;
                this.members.push(leaderId);
                this.treasuryGold = 0;
                this.treasuryElixir = 0;
                this.treasuryLevel = 1;
                this.lastWarParticipants = [];
            }
        }

        class War {
            constructor(clan1Id, clan2Id, type, attackers1, attackers2) {
                this.id = uid();
                this.clan1Id = clan1Id;
                this.clan2Id = clan2Id;
                this.type = type;
                this.attackers1 = attackers1;
                this.attackers2 = attackers2;
                this.attacks1 = [];
                this.attacks2 = [];
                this.status = 'preparation';
                this.startTime = Date.now();
                const days = type === '5v5' ? 5 : 10;
                this.endTime = Date.now() + days * 24 * 3600 * 1000;
                this.winner = null;
                this.stars1 = 0;
                this.stars2 = 0;
                this.participantsConfirmed1 = false;
                this.participantsConfirmed2 = false;
            }
        }

        // ============================================================
        //  HELPERS
        // ============================================================
        function getPlayerById(id) { return allPlayers.find(p => p.id === id); }
        function getClanById(id) { return allClans.find(c => c.id === id); }
        function getClanByPlayerId(pid) {
            const p = getPlayerById(pid);
            if (!p || !p.clanId) return null;
            return getClanById(p.clanId);
        }
        function getClanMembers(clanId) {
            const c = getClanById(clanId);
            if (!c) return [];
            const all = [c.leaderId, ...c.coLeaders, ...c.elders, ...c.members];
            return all.filter((v, i, a) => a.indexOf(v) === i);
        }
        function getClanMemberCount(clanId) {
            const c = getClanById(clanId);
            if (!c) return 0;
            return getClanMembers(clanId).length;
        }

        function getPlayerPower(p) {
            if (!p) return 0;
            let totalTroops = 0;
            for (let t in p.troops) totalTroops += p.troops[t];
            return (p.townHall * 5) + (p.defenseLevel * 3) + (totalTroops * 3);
        }

        function getClanLevel(clan) {
            if (!clan) return 1;
            let stars = clan.totalStars || 0;
            let level = Math.floor(stars / 50) + 1;
            if (level > 10) level = 10;
            return level;
        }

        function getGoldCap(player) {
            return 50 + player.townHall * player.townHall * 15;
        }
        function getElixirCap(player) {
            return 30 + player.townHall * player.townHall * 8;
        }

        function resetDailyIfNeeded(player) {
            const today = new Date().toISOString().split('T')[0];
            if (player.lastCollectionDate !== today) {
                player.goldCollectedToday = 0;
                player.elixirCollectedToday = 0;
                player.lastCollectionDate = today;
            }
        }

        function getShieldRemaining(player) {
            if (!player || !player.shieldExpiry) return 0;
            const remaining = player.shieldExpiry - Date.now();
            return remaining > 0 ? remaining : 0;
        }
        function hasShield(player) { return getShieldRemaining(player) > 0; }
        function formatShieldTime(ms) {
            if (ms <= 0) return 'ندارد';
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            if (hours >= 24) return `${Math.floor(hours/24)} روز ${hours%24} ساعت`;
            if (hours > 0) return `${hours} ساعت ${minutes} دقیقه`;
            return `${minutes} دقیقه`;
        }
        function loseAllTroops(player) {
            const types = ['barbarian', 'archer', 'giant', 'goblin'];
            let totalLost = 0;
            for (let t of types) {
                if (player.troops[t] > 0) {
                    totalLost += player.troops[t];
                    player.troops[t] = 0;
                }
            }
            return totalLost;
        }

        // ============================================================
        //  ANNOUNCEMENT
        // ============================================================
        function showAnnouncement() {
            const bar = document.getElementById('announcementBar');
            const msgEl = document.getElementById('announcementMsg');
            const timeEl = document.getElementById('announcementTime');
            if (announcementData && announcementData.text) {
                msgEl.textContent = announcementData.text;
                if (announcementData.time) {
                    const d = new Date(announcementData.time);
                    timeEl.textContent = '📅 ' + d.toLocaleString('fa-IR');
                } else { timeEl.textContent = ''; }
                bar.style.display = 'flex';
            } else { bar.style.display = 'none'; }
        }
        window.closeAnnouncement = function() { document.getElementById('announcementBar').style.display = 'none'; };
        window.sendAnnouncement = async function() {
            if (!currentPlayer || !currentPlayer.isAdmin) { showToast('فقط ادمین می‌تواند اطلاعیه ارسال کند!', 'error', '🚫'); return; }
            const text = document.getElementById('announcementText').value.trim();
            if (!text) { showToast('متن اطلاعیه را وارد کنید!', 'warning', '⚠️'); return; }
            announcementData = { text: text, time: Date.now() };
            await apiSave();
            showToast('📢 اطلاعیه با موفقیت ارسال شد!', 'success', '📢');
            document.getElementById('announcementText').value = '';
            showAnnouncement();
        };
        window.clearAnnouncement = async function() {
            if (!currentPlayer || !currentPlayer.isAdmin) { showToast('فقط ادمین می‌تواند اطلاعیه را حذف کند!', 'error', '🚫'); return; }
            if (!confirm('آیا از حذف اطلاعیه اطمینان دارید؟')) return;
            announcementData = null;
            await apiSave();
            showToast('🗑️ اطلاعیه حذف شد', 'warning', '🗑️');
            showAnnouncement();
        };

        // ============================================================
        //  PENDING CLANS
        // ============================================================
        async function renderPendingClans() {
            const container = document.getElementById('pendingClansContainer');
            if (!container) return;
            if (!currentPlayer || !currentPlayer.isAdmin) {
                container.innerHTML = '<div class="empty">فقط ادمین می‌تواند درخواست‌ها را مدیریت کند.</div>';
                return;
            }
            await apiGet();
            if (pendingClans.length === 0) {
                container.innerHTML = '<div class="empty">هیچ درخواستی وجود ندارد.</div>';
                return;
            }
            container.innerHTML = pendingClans.map(req => {
                const p = getPlayerById(req.leaderId);
                const name = p ? p.name : req.leaderName;
                return `
                    <div class="pending-clan-item">
                        <div class="info">
                            <span><strong>${req.name}</strong> توسط <span style="color:#ffd700;">${name}</span></span>
                            <span>💎 ${req.gemsPaid} جواهر</span>
                            <span class="text-xs">${new Date(req.time).toLocaleString('fa-IR')}</span>
                        </div>
                        <div class="actions">
                            <button onclick="approveClan('${req.id}')" style="background:#2a5a2a;border:1px solid #4a8a4a;color:#8a8a8a;padding:4px 14px;border-radius:20px;cursor:pointer;">✅ تایید</button>
                            <button onclick="rejectClan('${req.id}')" style="background:#5a2a2a;border:1px solid #8a4a4a;color:#8a8a8a;padding:4px 14px;border-radius:20px;cursor:pointer;">❌ رد</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.approveClan = async function(reqId) {
            if (!currentPlayer || !currentPlayer.isAdmin) return;
            const reqIdx = pendingClans.findIndex(r => r.id === reqId);
            if (reqIdx === -1) { showToast('درخواست یافت نشد!', 'error', '❌'); return; }
            const req = pendingClans[reqIdx];
            const leader = getPlayerById(req.leaderId);
            if (!leader) { showToast('رهبر اتحاد یافت نشد!', 'error', '❌'); return; }
            if (allClans.some(c => c.name === req.name)) {
                showToast('اتحادی با این نام قبلاً وجود دارد!', 'error', '❌');
                pendingClans.splice(reqIdx, 1);
                await apiSave();
                renderPendingClans();
                return;
            }
            const clan = new Clan(req.name, req.leaderId, leader.name);
            allClans.push(clan);
            leader.clanId = clan.id;
            leader.clanRank = 'leader';
            pendingClans.splice(reqIdx, 1);
            await savePlayer();
            await apiSave();
            showToast(`🏴 اتحاد ${req.name} با موفقیت ساخته شد!`, 'success', '🏴');
            renderPendingClans();
            renderClan();
            updateUI();
        };

        window.rejectClan = async function(reqId) {
            if (!currentPlayer || !currentPlayer.isAdmin) return;
            const reqIdx = pendingClans.findIndex(r => r.id === reqId);
            if (reqIdx === -1) { showToast('درخواست یافت نشد!', 'error', '❌'); return; }
            const req = pendingClans[reqIdx];
            const leader = getPlayerById(req.leaderId);
            if (leader) {
                leader.gems = (leader.gems || 0) + req.gemsPaid;
                leader.history.push({ time: Date.now(), text: `بازگشت ${req.gemsPaid} جواهر (رد درخواست اتحاد ${req.name})`, type: 'neutral' });
            }
            pendingClans.splice(reqIdx, 1);
            await savePlayer();
            await apiSave();
            showToast(`❌ درخواست اتحاد ${req.name} رد شد و ${req.gemsPaid} جواهر برگشت داده شد.`, 'warning', '🔁');
            renderPendingClans();
            updateUI();
        };

        // ============================================================
        //  GEM GENERATION
        // ============================================================
        function checkGemGeneration(player) {
            if (!player) return;
            const now = Date.now();
            if (now - player.lastGemTime >= GEM_INTERVAL) {
                const gemsToAdd = Math.floor((now - player.lastGemTime) / GEM_INTERVAL);
                if (gemsToAdd > 0) {
                    player.gems += gemsToAdd;
                    player.lastGemTime += gemsToAdd * GEM_INTERVAL;
                    if (gemsToAdd > 10) {
                        player.gems -= (gemsToAdd - 10);
                        player.lastGemTime = now - GEM_INTERVAL * 10;
                    }
                    showToast(`💎 +${Math.min(gemsToAdd, 10)} جواهر دریافت کردید!`, 'success', '💎');
                }
            }
        }

        // ============================================================
        //  SHIELD BUY
        // ============================================================
        window.buyShield = async function(hours) {
            if (!currentPlayer) return;
            const costs = {1:1,2:2,3:3,4:4,6:6,12:10,168:50};
            const cost = costs[hours];
            if (!cost) { showToast('مدت نامعتبر!', 'error', '❌'); return; }
            if (currentPlayer.gems < cost) {
                showToast(`جواهر کافی نیست! نیاز به ${cost} جواهر دارید.`, 'error', '💎');
                return;
            }
            currentPlayer.gems -= cost;
            const duration = hours * 3600 * 1000;
            const newExpiry = Math.max(Date.now() + duration, (currentPlayer.shieldExpiry || 0) + duration);
            currentPlayer.shieldExpiry = newExpiry;
            currentPlayer.history.push({ time: Date.now(), text: `خرید سپر ${hours} ساعته با ${cost} جواهر`, type: 'neutral' });
            showToast(`🛡️ سپر ${hours} ساعته فعال شد!`, 'success', '🛡️');
            await savePlayer();
            updateUI();
        };

        // ============================================================
        //  SAVE CURRENT PLAYER
        // ============================================================
        async function savePlayer() {
            if (!currentPlayer) return;
            currentPlayer.lastActive = Date.now();
            const idx = allPlayers.findIndex(p => p.id === currentPlayer.id);
            if (idx !== -1) allPlayers[idx] = JSON.parse(JSON.stringify(currentPlayer));
            else allPlayers.push(JSON.parse(JSON.stringify(currentPlayer)));
            return await apiSave();
        }

        // ============================================================
        //  AUTH
        // ============================================================
        async function registerPlayer(name, pass) {
            const loaded = await apiGet();
            if (!loaded) { showToast('❌ اتصال به سرور برقرار نیست!', 'error', '❌'); return false; }
            if (allPlayers.some(p => p.name === name)) { showToast('❌ این نام قبلاً ثبت شده!', 'error', '❌'); return false; }
            const newPlayer = new Player(name, pass);
            if (name === 'Admin' && pass === 'admin123') newPlayer.isAdmin = true;
            currentPlayer = newPlayer;
            allPlayers.push(JSON.parse(JSON.stringify(currentPlayer)));
            const saved = await apiSave();
            if (!saved) {
                allPlayers = allPlayers.filter(p => p.id !== currentPlayer.id);
                currentPlayer = null;
                showToast('❌ خطا در ثبت نام در سرور!', 'error', '❌');
                return false;
            }
            return true;
        }

        async function loginPlayer(name, pass) {
            const loaded = await apiGet();
            if (!loaded) { showToast('❌ اتصال به سرور برقرار نیست!', 'error', '❌'); return false; }
            const found = allPlayers.find(p => p.name === name && p.password === pass);
            if (found) {
                currentPlayer = new Player(found.name, found.password);
                Object.assign(currentPlayer, found);
                if (!currentPlayer.history) currentPlayer.history = [];
                resetDailyIfNeeded(currentPlayer);
                checkGemGeneration(currentPlayer);
                await savePlayer();
                return true;
            }
            return false;
        }

        // ============================================================
        //  UI UPDATE
        // ============================================================
        function updateUI() {
            if (!currentPlayer) return;
            resetDailyIfNeeded(currentPlayer);
            checkGemGeneration(currentPlayer);

            document.getElementById('goldAmount').textContent = currentPlayer.gold;
            document.getElementById('elixirAmount').textContent = currentPlayer.elixir;
            document.getElementById('gemAmount').textContent = currentPlayer.gems;
            document.getElementById('townHallLevel').textContent = currentPlayer.townHall;
            document.getElementById('totalPower').textContent = getPlayerPower(currentPlayer);

            const goldCap = getGoldCap(currentPlayer);
            const elixirCap = getElixirCap(currentPlayer);
            document.getElementById('goldDaily').textContent = `(امروز: ${currentPlayer.goldCollectedToday}/${goldCap})`;
            document.getElementById('elixirDaily').textContent = `(امروز: ${currentPlayer.elixirCollectedToday}/${elixirCap})`;

            const shieldMs = getShieldRemaining(currentPlayer);
            if (shieldMs > 0) {
                document.getElementById('shieldStatus').textContent = formatShieldTime(shieldMs);
                document.getElementById('shieldStatus').style.color = '#4ade80';
            } else {
                document.getElementById('shieldStatus').textContent = 'ندارد';
                document.getElementById('shieldStatus').style.color = '#ff6b6b';
            }

            const nextGem = Math.max(0, currentPlayer.lastGemTime + GEM_INTERVAL - Date.now());
            const nextGemHours = Math.floor(nextGem / 3600000);
            const nextGemMins = Math.floor((nextGem % 3600000) / 60000);
            document.getElementById('gemTimer').textContent = nextGem > 0 ? `(${nextGemHours}h ${nextGemMins}m)` : '🟢 آماده';

            const power = getPlayerPower(currentPlayer);
            const cdEl = document.getElementById('attackCooldownDisplay');
            const elapsedSinceLoss = Date.now() - currentPlayer.lastPvPAttempt;
            if (elapsedSinceLoss < PVP_LOSS_COOLDOWN) {
                const remaining = Math.ceil((PVP_LOSS_COOLDOWN - elapsedSinceLoss) / 60000);
                cdEl.textContent = `⏳ ${remaining} دقیقه`;
                cdEl.style.display = 'inline-block';
            } else if (power < 10) {
                const elapsed = Date.now() - currentPlayer.lastAttackTime;
                const remaining = Math.max(0, ATTACK_COOLDOWN - elapsed);
                if (remaining > 0) {
                    const mins = Math.ceil(remaining / 60000);
                    cdEl.textContent = `⏳ ${mins} دقیقه`;
                    cdEl.style.display = 'inline-block';
                } else { cdEl.style.display = 'none'; }
            } else { cdEl.style.display = 'none'; }

            renderVillage();
            renderProfile();
            renderClan();
            renderWar();
            renderArmy();
            renderShop();
            renderAttackList();
            if (currentPlayer.isAdmin) {
                document.getElementById('adminTab').style.display = 'block';
                populateBanSelect();
                renderPendingClans();
            } else {
                document.getElementById('adminTab').style.display = 'none';
            }
            showAnnouncement();
        }

        // ============================================================
        //  VILLAGE
        // ============================================================
        function renderVillage() {
            const grid = document.getElementById('villageGrid');
            if (!grid || !currentPlayer) return;
            const shieldMs = getShieldRemaining(currentPlayer);
            const shieldText = shieldMs > 0 ? formatShieldTime(shieldMs) : 'غیرفعال';
            const buildings = [
                { icon: '🏰', name: 'تالار قبیله', level: currentPlayer.townHall, desc: 'مرکز قدرت', prod: 'سطح ' + currentPlayer.townHall },
                { icon: '⛏️', name: 'معدن طلا', level: Math.floor(currentPlayer.townHall / 2) + 1, desc: 'تولید طلا', prod: '+۵/دقیقه' },
                { icon: '🧪', name: 'مزرعه اکسیر', level: Math.floor(currentPlayer.townHall / 2) + 1, desc: 'تولید اکسیر', prod: '+۳/دقیقه' },
                { icon: '🛡️', name: 'برج دفاعی', level: currentPlayer.defenseLevel || 0, desc: 'دفاع از پایگاه', prod: 'قدرت دفاع: ' + (currentPlayer.defenseLevel * 5) },
                { icon: '🏹', name: 'سربازخانه', level: Math.floor(currentPlayer.townHall / 2) + 1, desc: 'آموزش سرباز', prod: 'سطح ' + (Math.floor(currentPlayer.townHall / 2) + 1) },
                { icon: '💎', name: 'جواهر', level: '∞', desc: `سپر: ${shieldText}`, prod: 'هر ۱۲س +۱' }
            ];
            grid.innerHTML = buildings.map(b => `
                <div class="building-card" onclick="upgradeBuilding('${b.name}')">
                    <span class="icon">${b.icon}</span>
                    <div class="bname">${b.name}</div>
                    <div class="blevel">سطح ${b.level}</div>
                    <div class="bprod">${b.prod}</div>
                    <div class="bcost">${b.desc}</div>
                </div>
            `).join('');
        }

        window.upgradeBuilding = async function(name) {
            if (!currentPlayer) return;
            if (name === 'تالار قبیله') {
                const costGold = currentPlayer.townHall * 500;
                const costElixir = currentPlayer.townHall * 200;
                if (currentPlayer.gold >= costGold && currentPlayer.elixir >= costElixir) {
                    currentPlayer.gold -= costGold;
                    currentPlayer.elixir -= costElixir;
                    currentPlayer.townHall += 1;
                    currentPlayer.respect += 20;
                    currentPlayer.goldCollectedToday = 0;
                    currentPlayer.elixirCollectedToday = 0;
                    currentPlayer.history.push({ time: Date.now(), text: `تالار به سطح ${currentPlayer.townHall} ارتقاء یافت`, type: 'neutral' });
                    showToast(`🏰 تالار به سطح ${currentPlayer.townHall} ارتقاء یافت!`, 'success', '🏰');
                    await savePlayer();
                } else showToast('💰 منابع کافی نیست!', 'error', '💰');
            } else if (name === 'برج دفاعی') {
                const cost = 300 + currentPlayer.defenseLevel * 100;
                if (currentPlayer.gold >= cost) {
                    currentPlayer.gold -= cost;
                    currentPlayer.defenseLevel += 1;
                    currentPlayer.respect += 5;
                    currentPlayer.history.push({ time: Date.now(), text: `برج دفاعی به سطح ${currentPlayer.defenseLevel} ارتقاء یافت`, type: 'neutral' });
                    showToast(`🛡️ برج دفاعی سطح ${currentPlayer.defenseLevel}!`, 'success', '🛡️');
                    await savePlayer();
                } else showToast('💰 طلا کافی نیست!', 'error', '💰');
            } else { showToast('📌 این ساختمان قابل ارتقاء نیست', 'warning', '📌'); }
        };

        // ============================================================
        //  COLLECT
        // ============================================================
        document.getElementById('collectBtn')?.addEventListener('click', async function() {
            if (!currentPlayer) return;
            resetDailyIfNeeded(currentPlayer);
            const goldCap = getGoldCap(currentPlayer);
            const elixirCap = getElixirCap(currentPlayer);
            let goldRemaining = goldCap - currentPlayer.goldCollectedToday;
            let elixirRemaining = elixirCap - currentPlayer.elixirCollectedToday;
            if (goldRemaining <= 0 && elixirRemaining <= 0) {
                showToast('⛔ امروز به سقف جمع‌آوری رسیده‌اید!', 'warning', '⛔');
                return;
            }
            let goldGain = 0, elixirGain = 0;
            if (goldRemaining > 0) {
                goldGain = Math.min(rand(3, 8), goldRemaining);
                currentPlayer.gold += goldGain;
                currentPlayer.goldCollectedToday += goldGain;
            }
            if (elixirRemaining > 0) {
                elixirGain = Math.min(rand(1, 4), elixirRemaining);
                currentPlayer.elixir += elixirGain;
                currentPlayer.elixirCollectedToday += elixirGain;
            }
            currentPlayer.history.push({ time: Date.now(), text: `جمع‌آوری: +${goldGain} طلا، +${elixirGain} اکسیر`, type: 'neutral' });
            showToast(`💰 +${goldGain} طلا  🔮 +${elixirGain} اکسیر`, 'success', '💰');
            await savePlayer();
            updateUI();
        });

        document.getElementById('upgradeTownHallBtn')?.addEventListener('click', async function() {
            if (!currentPlayer) return;
            const costGold = currentPlayer.townHall * 500;
            const costElixir = currentPlayer.townHall * 200;
            if (currentPlayer.gold >= costGold && currentPlayer.elixir >= costElixir) {
                currentPlayer.gold -= costGold;

                currentPlayer.townHall += 1;
                currentPlayer.respect += 20;
                currentPlayer.goldCollectedToday = 0;
                currentPlayer.elixirCollectedToday = 0;
                currentPlayer.history.push({ time: Date.now(), text: `تالار به سطح ${currentPlayer.townHall} ارتقاء یافت`, type: 'neutral' });
                showToast(`🏰 تالار به سطح ${currentPlayer.townHall} ارتقاء یافت!`, 'success', '🏰');

        // ============================================================
        //  PROFILE
        // ============================================================
        function renderProfile() {
            if (!currentPlayer) return;
            document.getElementById('profileName').textContent = currentPlayer.name;
            document.getElementById('profileEmoji').textContent = currentPlayer.emoji || '❌';
            const colorEl = document.getElementById('profileColor');
            colorEl.textContent = currentPlayer.chatColor || '#ffd700';
            colorEl.style.backgroundColor = currentPlayer.chatColor || '#ffd700';
            colorEl.style.color = '#000';

            const emojiContainer = document.getElementById('emojiSelectContainer');
            const emojis = currentPlayer.purchasedEmojis || [];
            if (emojis.length === 0) {
                emojiContainer.innerHTML = '<span class="text-xs" style="color:#8a7a6a;">هیچ ایموجی خریداری نشده است.</span>';
            } else {
                emojiContainer.innerHTML = emojis.map(e => `
                    <label style="background:${currentPlayer.emoji === e ? '#6a3a1a' : 'rgba(20,10,10,0.6)'};border-color:${currentPlayer.emoji === e ? '#b8860b' : '#3a2a1a'};">
                        <input type="radio" name="profileEmoji" value="${e}" ${currentPlayer.emoji === e ? 'checked' : ''}> ${e}
                    </label>
                `).join('');
            }

            const colorContainer = document.getElementById('colorSelectContainer');
            const colors = currentPlayer.purchasedColors || [];
            if (colors.length === 0) {
                colorContainer.innerHTML = '<span class="text-xs" style="color:#8a7a6a;">هیچ رنگی خریداری نشده است.</span>';
            } else {
                colorContainer.innerHTML = colors.map(c => `
                    <label style="background:${currentPlayer.chatColor === c ? '#6a3a1a' : 'rgba(20,10,10,0.6)'};border-color:${c};">
                        <input type="radio" name="profileColor" value="${c}" ${currentPlayer.chatColor === c ? 'checked' : ''}>
                        <span style="display:inline-block;width:20px;height:20px;border-radius:50%;background:${c};border:1px solid #fff;"></span>
                        ${c}
                    </label>
                `).join('');
            }
        }

        window.saveProfile = async function() {
            if (!currentPlayer) return;
            const selectedEmoji = document.querySelector('input[name="profileEmoji"]:checked');
            if (selectedEmoji) currentPlayer.emoji = selectedEmoji.value;
            const selectedColor = document.querySelector('input[name="profileColor"]:checked');
            if (selectedColor) currentPlayer.chatColor = selectedColor.value;
            await savePlayer();
            showToast('✅ پروفایل ذخیره شد!', 'success', '✅');
            updateUI();
        };

        // ============================================================
        //  ATTACK (PvP)
        // ============================================================
        async function renderAttackList() {
            const container = document.getElementById('attackList');
            if (!container || !currentPlayer) return;
            await apiGet();

            const alertContainer = document.getElementById('shieldAlertContainer');
            if (hasShield(currentPlayer)) {
                const remaining = getShieldRemaining(currentPlayer);
                alertContainer.innerHTML = `
                    <div class="shield-alert" style="background:rgba(0,0,0,0.5);border-radius:1rem;padding:6px 14px;border:1px solid #4ade80;color:#4ade80;display:flex;align-items:center;gap:8px;font-size:0.75rem;">
                        <span class="icon">🛡️</span>
                        <span>سپر فعال (${formatShieldTime(remaining)})</span>
                    </div>
                `;
            } else {
                alertContainer.innerHTML = '';
            }

            const others = allPlayers.filter(p => p.id !== currentPlayer.id && p.id !== 'admin_');

            let recentAttack = false;
            for (let targetId in currentPlayer.lastAttackReceived) {
                if (Date.now() - currentPlayer.lastAttackReceived[targetId] < 30 * 60 * 1000) {
                    recentAttack = true;
                    break;
                }
            }
            if (recentAttack) {
                showToast('⚔️ شما اخیراً مورد حمله قرار گرفته‌اید! برای انتقام به بخش «حمله» بروید.', 'warning', '⚔️');
            }

            if (!others.length) {
                container.innerHTML = '<div class="empty">هیچ بازیکن دیگری برای حمله وجود ندارد.</div>';
                return;
            }

            const now = Date.now();
            const attackerLossCooldown = now - currentPlayer.lastPvPAttempt < PVP_LOSS_COOLDOWN;

            container.innerHTML = others.map(p => {
                const hasShieldTarget = hasShield(p);
                const hasShieldAttacker = hasShield(currentPlayer);
                const color = p.chatColor || '#ffd700';

                const lastAttackTime = currentPlayer.lastAttackTimes[p.id] || 0;
                const canAttackTarget = (now - lastAttackTime >= PVP_COOLDOWN);
                const timeRemaining = Math.ceil((PVP_COOLDOWN - (now - lastAttackTime)) / 3600000);

                const lastReceived = currentPlayer.lastAttackReceived[p.id] || 0;
                const canRevenge = (now - lastReceived < PVP_COOLDOWN);

                const normalDisabled = !canAttackTarget || attackerLossCooldown;
                const revengeDisabled = !canRevenge || attackerLossCooldown;

                let normalButton = `<button class="war-attack-btn" style="width:auto;padding:6px 16px;" onclick="attackPlayer('${p.id}', false)" ${normalDisabled ? 'disabled' : ''}>⚔️ حمله</button>`;
                if (!canAttackTarget && !attackerLossCooldown) {
                    normalButton = `<span class="cooldown-badge">⏳ ${timeRemaining} ساعت</span>`;
                }

                let revengeButton = '';
                if (canRevenge) {
                    revengeButton = `<button class="war-attack-btn" style="width:auto;padding:6px 16px;background:#6a3a1a;border:1px solid #b8860b;" onclick="attackPlayer('${p.id}', true)" ${revengeDisabled ? 'disabled' : ''}>🔥 انتقام</button>`;
                }

                let lossCooldownMsg = '';
                if (attackerLossCooldown) {
                    const remaining = Math.ceil((PVP_LOSS_COOLDOWN - (now - currentPlayer.lastPvPAttempt)) / 60000);
                    lossCooldownMsg = `<span class="cooldown-badge" style="display:block;margin-top:4px;">⏳ ${remaining} دقیقه تا حمله بعدی</span>`;
                }

                let shieldHint = hasShieldAttacker ? ' (🛡️ سپر دارید)' : '';

                return `
                    <div class="clan-member">
                        <span><span style="color:${color}">${p.emoji||''} ${p.name}</span> ${hasShieldTarget ? '🛡️' : ''}</span>
                        <span>⚔️${getPlayerPower(p)} | 💰${p.gold}</span>
                        <span style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                            ${normalButton}${shieldHint}
                            ${revengeButton}
                            ${lossCooldownMsg}
                        </span>
                    </div>
                `;
            }).join('');
        }

        window.attackPlayer = async function(targetId, isRevenge = false) {
            if (!currentPlayer) return;

            if (hasShield(currentPlayer)) {
                showToast('🛡️ شما سپر دارید! نمی‌توانید در نبردهای تک‌نفره حمله کنید.', 'error', '🛡️');
                return;
            }

            const elapsedSinceLoss = Date.now() - currentPlayer.lastPvPAttempt;
            if (elapsedSinceLoss < PVP_LOSS_COOLDOWN) {
                const remaining = Math.ceil((PVP_LOSS_COOLDOWN - elapsedSinceLoss) / 60000);
                showToast(`⏳ شما اخیراً در حمله شکست خورده‌اید! ${remaining} دقیقه دیگر می‌توانید حمله کنید.`, 'warning', '⏳');
                return;
            }

            const target = getPlayerById(targetId);
            if (!target) { showToast('هدف یافت نشد!', 'error', '❌'); return; }
            if (target.id === currentPlayer.id) { showToast('نمی‌توانید به خودتان حمله کنید!', 'error', '❌'); return; }
            if (hasShield(target)) {
                showToast('🛡️ این بازیکن سپر دارد! نمی‌توانید حمله کنید.', 'error', '🛡️');
                return;
            }

            if (!isRevenge) {
                const lastAttackTime = currentPlayer.lastAttackTimes[targetId] || 0;
                if (Date.now() - lastAttackTime < PVP_COOLDOWN) {
                    const hoursLeft = Math.ceil((PVP_COOLDOWN - (Date.now() - lastAttackTime)) / 3600000);
                    showToast(`⏳ شما قبلاً به این بازیکن حمله کرده‌اید! ${hoursLeft} ساعت دیگر می‌توانید دوباره حمله کنید.`, 'warning', '⏳');
                    return;
                }
            }

            const myPower = getPlayerPower(currentPlayer);
            const targetPower = getPlayerPower(target);
            const myRoll = myPower + rand(0, 20);
            const targetRoll = targetPower + rand(0, 20);
            const troopsLost = loseAllTroops(currentPlayer);

            let attackerWin = myRoll > targetRoll;
            let lootGold = 0, lootElixir = 0;
            let defenderRespectGain = 0;
            let attackerRespectGain = 0;

            if (attackerWin) {
                lootGold = Math.floor(target.gold * 0.1);
                lootElixir = Math.floor(target.elixir * 0.1);
                target.gold = Math.max(0, target.gold - lootGold);
                target.elixir = Math.max(0, target.elixir - lootElixir);
                attackerRespectGain = Math.floor(currentPlayer.respect * 0.08);
                if (attackerRespectGain < 1) attackerRespectGain = 1;
                currentPlayer.respect += attackerRespectGain;
                currentPlayer.history.push({ time: Date.now(), text: `🎉 پیروزی در حمله به ${target.name}! +${lootGold} طلا +${lootElixir} اکسیر، +${attackerRespectGain} احترام (همه سربازان از دست رفتند: ${troopsLost})`, type: 'victory' });
                target.history.push({ time: Date.now(), text: `💔 شکست از ${currentPlayer.name} (از دست دادن ${lootGold} طلا و ${lootElixir} اکسیر)`, type: 'defeat' });
                showToast(`🎉 پیروزی! +${lootGold} طلا +${lootElixir} اکسیر، +${attackerRespectGain} احترام (همه ${troopsLost} سرباز از دست رفتند)`, 'success', '🏆');
                currentPlayer.gold += lootGold;
                currentPlayer.elixir += lootElixir;
                currentPlayer.wins += 1;
                target.losses += 1;
                target.shieldExpiry = Math.max(target.shieldExpiry || 0, Date.now() + PVP_DEFENDER_SHIELD);
                showToast(`🛡️ ${target.name} به مدت ۳۰ دقیقه سپر دریافت کرد!`, 'warning', '🛡️');
            } else {
                defenderRespectGain = Math.floor(target.respect * 0.05);
                if (defenderRespectGain < 1) defenderRespectGain = 1;
                target.respect += defenderRespectGain;
                const respectLoss = Math.floor(currentPlayer.respect * 0.05);
                currentPlayer.respect = Math.max(0, currentPlayer.respect - respectLoss);
                currentPlayer.history.push({ time: Date.now(), text: `💔 شکست در حمله به ${target.name}! (از دست دادن ${respectLoss} احترام و همه ${troopsLost} سرباز)`, type: 'defeat' });
                target.history.push({ time: Date.now(), text: `🎉 دفاع موفق در برابر ${currentPlayer.name}! +${defenderRespectGain} احترام`, type: 'victory' });
                showToast(`💔 شکست خوردید! -${respectLoss} احترام، همه ${troopsLost} سرباز از دست رفتند`, 'error', '💔');
                currentPlayer.losses += 1;
                target.wins += 1;
                currentPlayer.lastPvPAttempt = Date.now();
            }

            const now = Date.now();
            currentPlayer.lastAttackTimes[targetId] = now;
            target.lastAttackReceived[currentPlayer.id] = now;

            const idx = allPlayers.findIndex(p => p.id === target.id);
            if (idx !== -1) allPlayers[idx] = JSON.parse(JSON.stringify(target));

            await savePlayer();
            await apiSave();
            renderAttackList();
            updateUI();
        };
