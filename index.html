<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Iron sky | آسمان آهنین</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0a1a; min-height: 100vh; padding: 10px; color: #e2e8f0; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; background: rgba(15, 23, 42, 0.92); border-radius: 2rem; overflow: hidden; border: 2px solid #f59e0b; box-shadow: 0 0 60px rgba(245, 158, 11, 0.15); backdrop-filter: blur(4px); }
        .header { background: linear-gradient(145deg, #1a1a2e 0%, #0f0f23 100%); padding: 1.2rem 1rem; text-align: center; }
        .header h1 { color: #fbbf24; text-shadow: 0 0 40px rgba(245, 158, 11, 0.3); font-size: 1.6rem; }
        .header .sub { font-size: 0.65rem; color: #f59e0b; letter-spacing: 4px; opacity: 0.8; }
        .sync-status { background: #0a0a1a; padding: 8px; text-align: center; font-size: 0.6rem; color: #fbbf24; border-bottom: 1px solid #f59e0b33; display: flex; justify-content: center; gap: 8px; align-items: center; }
        .login-box { padding: 18px; background: #0a0a1a; display: flex; flex-direction: column; gap: 12px; }
        .login-box input { padding: 14px 18px; border-radius: 40px; border: 1px solid #f59e0b44; text-align: center; font-size: 1rem; background: #1a1a2e; color: white; outline: 2px solid transparent; }
        .login-box input:focus { outline-color: #f59e0b; }
        .login-box button { background: linear-gradient(135deg, #f59e0b, #d97706); border: none; padding: 14px; border-radius: 40px; font-weight: 700; cursor: pointer; color: #0f172a; font-size: 1.05rem; }
        .res-bar { display: flex; justify-content: space-around; padding: 8px; background: #0a0a1a; flex-wrap: wrap; border-bottom: 1px solid #f59e0b44; }
        .res-item { background: #1a1a2e; padding: 4px 14px; border-radius: 30px; font-weight: 600; font-size: 0.65rem; border: 1px solid #f59e0b22; }
        .res-item span { color: #fbbf24; font-weight: 700; }
        .online-bar { background: #0a1a0a; padding: 4px; text-align: center; font-size: 0.55rem; color: #4ade80; }
        .online-bar.offline { background: #1a0a0a; color: #fca5a5; }
        .online-bar.warn { background: #1a1a0a; color: #fbbf24; }
        .shield-bar { background: #0a1a2e; padding: 8px; text-align: center; font-size: 0.65rem; color: #93c5fd; border-bottom: 1px solid #3b82f633; display: none; font-weight: 600; }
        .global-banner { background: linear-gradient(90deg, #7f1d1d 0%, #991b1b 50%, #7f1d1d 100%); padding: 12px 16px; text-align: center; font-size: 0.78rem; color: #fca5a5; border-bottom: 2px solid #ef4444; display: flex; justify-content: space-between; align-items: center; animation: bannerIn 0.6s ease; position: relative; overflow: hidden; }
        .global-banner::before { content: ''; position: absolute; top: 0; left: -100%; width: 300%; height: 100%; background: linear-gradient(90deg, transparent, rgba(239,68,68,0.15), transparent); animation: bannerSweep 3s linear infinite; }
        @keyframes bannerIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bannerSweep { 0% { transform: translateX(-33%); } 100% { transform: translateX(33%); } }
        .tabs { display: flex; background: #0a0a1a; border-bottom: 1px solid #f59e0b44; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 12px; cursor: pointer; font-weight: 600; color: #94a3b8; font-size: 0.6rem; white-space: nowrap; border-bottom: 2px solid transparent; text-align: center; }
        .tab.active { color: #fbbf24; background: #1a1a2e; border-bottom-color: #f59e0b; }
        .tab.admin-tab { color: #fca5a5; border-color: #7f1d1d33; }
        .tab.admin-tab.active { color: #fca5a5; background: #450a0a; border-bottom-color: #ef4444; }
        .panel { display: none; padding: 12px; min-height: 440px; background: rgba(10, 10, 26, 0.85); }
        .panel.active { display: block; }
        .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #1a1a2e; border-radius: 1.2rem; padding: 12px; text-align: center; border: 1px solid #f59e0b44; margin-bottom: 8px; }
        .card .icon { font-size: 1.8rem; }
        .card .cost { font-size: 0.55rem; color: #fbbf24; margin-top: 4px; }
        .player-row { background: #0a0a1a; border-radius: 1.2rem; padding: 8px 12px; margin-bottom: 8px; border: 1px solid #f59e0b44; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .btn { transition: 0.2s; cursor: pointer; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 700; font-size: 0.6rem; display: inline-flex; align-items: center; gap: 6px; margin: 2px; }
        .btn:active { transform: scale(0.94); }
        .btn-attack { background: #ef4444; color: #fff; }
        .btn-gold { background: #f59e0b; color: #0f172a; }
        .btn-green { background: #10b981; color: #fff; }
        .btn-purple { background: #8b5cf6; color: #fff; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-red { background: #dc2626; color: #fff; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
        .btn-sm { padding: 4px 10px; font-size: 0.5rem; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a2e; color: #fbbf24; padding: 12px 18px; border-radius: 40px; border-right: 4px solid #f59e0b; z-index: 9999; animation: fadeOut 4.5s forwards; max-width: 92%; font-size: 0.8rem; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8); }
        .toast.error { border-right-color: #ef4444; color: #fca5a5; }
        .toast.war { background: #1a0a0a; border-right-color: #ef4444; color: #fca5a5; }
        .toast.peace { background: #0a1a0a; border-right-color: #10b981; color: #4ade80; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateY(0); } 70% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(20px); visibility: hidden; } }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 0.8rem; }
        .section-title { color: #fbbf24; margin: 10px 0 6px; font-size: 0.7rem; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .info-bar { background: #1a1a2e; padding: 8px; border-radius: 10px; margin-bottom: 10px; font-size: 0.6rem; text-align: center; color: #fbbf24; border: 1px solid #f59e0b44; }
        input, select { background: #1a1a2e; border: 1px solid #334155; color: white; padding: 6px 10px; border-radius: 12px; text-align: center; width: 100%; margin: 3px 0; font-size: 0.6rem; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.45rem; font-weight: 700; }
        .badge-blue { background: #1e40af; color: #93c5fd; }
        .battle-log { background: #0a0a1a; border: 1px solid #f59e0b44; border-radius: 1rem; padding: 10px; max-height: 300px; overflow-y: auto; font-size: 0.6rem; }
        .battle-log .log-entry { padding: 4px 0; border-bottom: 1px solid #1a1a2e; }
        .attacker { color: #fca5a5; } .defender { color: #7dd3fc; } .loot { color: #4ade80; } .lost { color: #ef4444; }
        .battle-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(4px); }
        .battle-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .explosion { font-size: 8rem; animation: boom 0.8s infinite alternate; filter: drop-shadow(0 0 20px #ef4444); }
        @keyframes boom { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0.7; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .battle-text { color: #fbbf24; font-size: 1.5rem; font-weight: bold; margin-top: 20px; text-shadow: 0 0 10px #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .result-text { color: white; font-size: 1.2rem; text-align: center; margin-top: 10px; max-width: 90%; }
        .screen-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .storage-bar { height: 10px; background: #334155; border-radius: 10px; margin: 6px 0; overflow: hidden; }
        .storage-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #ef4444); transition: width 0.3s; }
        .hp-fill { background: linear-gradient(90deg, #10b981, #ef4444); }
        .chat-container { display: flex; flex-direction: column; height: 400px; background: #0a0a1a; border-radius: 1rem; border: 1px solid #f59e0b44; overflow: hidden; }
        .chat-box { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.65rem; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { background: #1a1a2e; padding: 8px 12px; border-radius: 12px; border: 1px solid #334155; }
        .chat-msg.me { border-color: #f59e0b66; background: #1e293b; }
        .chat-msg.system-msg { border-color: #ef4444; background: rgba(127, 29, 29, 0.3); }
        .chat-msg .sender { color: #fbbf24; font-weight: bold; font-size: 0.6rem; }
        .chat-msg .time { color: #64748b; font-size: 0.4rem; float: left; margin-top: 2px; }
        .chat-input-area { padding: 10px; background: #1a1a2e; border-top: 1px solid #f59e0b44; display: flex; gap: 5px; }
        .chat-input-area input { margin: 0; flex: 1; }
        .admin-panel-box { background: #0f0f0f; border: 1px solid #7f1d1d; border-radius: 1rem; padding: 12px; margin-bottom: 12px; }
        .admin-panel-box h3 { color: #fca5a5; font-size: 0.75rem; margin-bottom: 8px; border-bottom: 1px solid #7f1d1d; padding-bottom: 4px; }
        .spy-data { background: #1a1a2e; padding: 8px; border-radius: 8px; font-size: 0.55rem; color: #94a3b8; text-align: right; max-height: 150px; overflow-y: auto; direction: ltr; text-align: left; margin-top: 5px; }
        .is-hidden { display: none !important; }

        /* === معدن === */
        .mine-card { background: linear-gradient(160deg, #1a1a2e 0%, #0f1729 50%, #1a1025 100%); border: 1px solid #f59e0b55; border-radius: 1.4rem; padding: 18px; position: relative; overflow: hidden; }
        .mine-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 20%, rgba(245,158,11,0.04) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(139,92,246,0.03) 0%, transparent 50%); pointer-events: none; }
        .mine-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; position: relative; z-index: 1; }
        .mine-icon-wrap { font-size: 2.8rem; animation: mineSwing 2s ease-in-out infinite; filter: drop-shadow(0 0 8px rgba(245,158,11,0.4)); }
        @keyframes mineSwing { 0%, 100% { transform: rotate(-12deg) scale(1); } 50% { transform: rotate(12deg) scale(1.1); } }
        .mine-title { color: #fbbf24; font-size: 1.15rem; font-weight: 800; }
        .mine-subtitle { color: #94a3b8; font-size: 0.6rem; margin-top: 2px; }
        .mine-res-section { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; position: relative; z-index: 1; }
        .mine-res-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 0.65rem; }
        .mine-res-name { font-weight: 700; }
        .mine-res-vals { color: #e2e8f0; font-weight: 600; font-size: 0.6rem; }
        .mine-rate { color: #4ade80; font-size: 0.5rem; font-weight: 600; background: rgba(16,185,129,0.1); padding: 1px 8px; border-radius: 20px; }
        .mine-bar-track { height: 18px; background: #0a0a1a; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #1e293b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .mine-bar-fill { height: 100%; border-radius: 12px; transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .mine-bar-fill::after { content: ''; position: absolute; top: 0; left: -100%; width: 300%; height: 100%; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 45%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0.18) 55%, transparent 100%); animation: barShimmer 2.8s linear infinite; }
        @keyframes barShimmer { 0% { transform: translateX(-33.33%); } 100% { transform: translateX(0%); } }
        .mine-bar-fill.gold-bar { background: linear-gradient(90deg, #92400e, #d97706, #f59e0b, #fbbf24); }
        .mine-bar-fill.oil-bar { background: linear-gradient(90deg, #1e3a8a, #2563eb, #3b82f6, #60a5fa); }
        .mine-bar-fill.metal-bar { background: linear-gradient(90deg, #374151, #6b7280, #9ca3af, #d1d5db); }
        .mine-bar-fill.full { animation: barGlow 1.2s ease-in-out infinite; }
        @keyframes barGlow { 0%, 100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.5) saturate(1.3); } }
        .mine-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.45rem; font-weight: 800; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); pointer-events: none; z-index: 2; }
        .mine-time-row { text-align: center; font-size: 0.52rem; color: #94a3b8; margin-bottom: 14px; padding: 8px; background: rgba(10,10,26,0.6); border-radius: 10px; border: 1px solid #1e293b; position: relative; z-index: 1; }
        .mine-collect-btn { width: 100%; padding: 15px; font-size: 0.95rem; border-radius: 16px; margin-bottom: 14px; font-weight: 800; letter-spacing: 0.5px; position: relative; z-index: 1; }
        .collect-pulse { animation: collectBeat 1.5s ease-in-out infinite; }
        @keyframes collectBeat { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(245,158,11,0); } 50% { transform: scale(1.03); box-shadow: 0 0 25px rgba(245,158,11,0.5); } }
        .mine-upgrade-section { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(10,10,26,0.6); border-radius: 12px; border: 1px solid #1e293b; position: relative; z-index: 1; }
        .mine-upgrade-info { font-size: 0.6rem; color: #94a3b8; }
        .mine-upgrade-cost { color: #fbbf24; font-weight: 700; display: block; margin-top: 3px; font-size: 0.65rem; }
        .mine-stats-row { display: flex; justify-content: space-around; margin-bottom: 14px; position: relative; z-index: 1; }
        .mine-stat { text-align: center; padding: 8px 12px; background: rgba(10,10,26,0.6); border-radius: 10px; border: 1px solid #1e293b; flex: 1; margin: 0 3px; }
        .mine-stat-val { color: #fbbf24; font-size: 0.85rem; font-weight: 800; }
        .mine-stat-label { color: #64748b; font-size: 0.45rem; margin-top: 2px; }

        /* ===========================
           بخش جناح‌ها - طراحی جدید
        =========================== */
        .fac-page-header {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1028 50%, #0a1420 100%);
            border: 1px solid #f59e0b33;
            border-radius: 1.4rem;
            padding: 20px 16px 16px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .fac-page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(245,158,11,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .fac-page-title {
            font-size: 1.05rem; font-weight: 900;
            color: #fbbf24; letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(245,158,11,0.4);
            position: relative; z-index: 1;
        }
        .fac-page-sub {
            font-size: 0.5rem; color: #64748b; margin-top: 4px;
            position: relative; z-index: 1; letter-spacing: 1px;
        }
        .fac-my-badge {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 10px; padding: 6px 16px;
            background: rgba(16,185,129,0.12);
            border: 1px solid #10b98144;
            border-radius: 30px; font-size: 0.58rem;
            color: #4ade80; font-weight: 700;
            position: relative; z-index: 1;
        }
        .fac-my-badge.no-fac {
            background: rgba(239,68,68,0.1);
            border-color: #ef444433;
            color: #fca5a5;
        }
        .fac-my-icon { font-size: 1.5rem; display: block; margin-bottom: 6px; position: relative; z-index: 1; }

        .fac-grid { display: flex; flex-direction: column; gap: 10px; }

        .fac-card-v2 {
            background: linear-gradient(160deg, #111827 0%, #0f1521 100%);
            border: 1px solid #1e293b;
            border-radius: 1.3rem;
            padding: 0;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
        }
        .fac-card-v2:hover {
            border-color: #f59e0b44;
            box-shadow: 0 6px 30px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }
        .fac-card-v2.mine {
            border-color: #f59e0b;
            background: linear-gradient(160deg, #1a1508 0%, #111208 40%, #0f1521 100%);
            box-shadow: 0 0 30px rgba(245,158,11,0.1), inset 0 0 40px rgba(245,158,11,0.03);
        }
        .fac-card-v2.mine::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(245,158,11,0.05), transparent);
            animation: facSweep2 5s linear infinite;
            pointer-events: none;
        }
        @keyframes facSweep2 { 0%{transform:translateX(-50%)} 100%{transform:translateX(50%)} }

        .fac-rank-strip {
            height: 4px;
            width: 100%;
            position: relative;
        }
        .fac-rank-strip.r1 { background: linear-gradient(90deg, #92400e, #f59e0b, #fbbf24, #f59e0b, #92400e); }
        .fac-rank-strip.r2 { background: linear-gradient(90deg, #374151, #9ca3af, #d1d5db, #9ca3af, #374151); }
        .fac-rank-strip.r3 { background: linear-gradient(90deg, #78350f, #b45309, #d97706, #b45309, #78350f); }
        .fac-rank-strip.rn { background: linear-gradient(90deg, #1e3a5f, #2563eb, #3b82f6, #2563eb, #1e3a5f); }

        .fac-inner { padding: 14px; }

        .fac-top-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 12px;
        }
        .fac-icon-box {
            min-width: 48px; height: 48px;
            background: rgba(10,10,26,0.7);
            border-radius: 14px;
            border: 1px solid #1e293b;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }
        .fac-info-col { flex: 1; }
        .fac-card-name { font-size: 0.88rem; font-weight: 900; color: #e2e8f0; }
        .fac-card-name .mine-tag { color: #fbbf24; font-size: 0.45rem; margin-right: 4px; vertical-align: middle; }
        .fac-rank-label {
            display: inline-flex; align-items: center; gap: 4px;
            margin-top: 3px; padding: 2px 10px;
            border-radius: 20px; font-size: 0.48rem; font-weight: 700;
        }
        .fac-rank-label.r1 { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid #f59e0b33; }
        .fac-rank-label.r2 { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid #94a3b833; }
        .fac-rank-label.r3 { background: rgba(217,119,6,0.1); color: #d97706; border: 1px solid #d9770633; }
        .fac-rank-label.rn { background: rgba(37,99,235,0.1); color: #60a5fa; border: 1px solid #2563eb33; }

        .fac-stats-3 {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 6px; margin-bottom: 12px;
        }
        .fac-stat-cell {
            background: rgba(10,10,26,0.6);
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
        }
        .fac-stat-num { font-size: 0.9rem; font-weight: 800; color: #fbbf24; }
        .fac-stat-lbl { font-size: 0.4rem; color: #64748b; margin-top: 2px; }

        .fac-pts-track {
            height: 6px; background: #0a0a1a;
            border-radius: 6px; overflow: hidden;
            margin-bottom: 12px; border: 1px solid #1e293b;
        }
        .fac-pts-bar {
            height: 100%; border-radius: 6px;
            position: relative; overflow: hidden;
            transition: width 0.7s ease;
        }
        .fac-pts-bar::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 300%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: barShimmer 3s linear infinite;
        }
        .fac-pts-bar.r1 { background: linear-gradient(90deg, #92400e, #f59e0b, #fbbf24); }
        .fac-pts-bar.r2 { background: linear-gradient(90deg, #374151, #6b7280, #9ca3af); }
        .fac-pts-bar.r3 { background: linear-gradient(90deg, #78350f, #b45309, #d97706); }

            if (secs >= 60) return Math.floor(secs / 60) + 'د ' + (secs % 60) + 'ث';
            return secs + ' ثانیه';
        }

                i: p.id, n: p.name, p: p.password,

        function decompressPlayer(c) {
            return {
                id: c.i, name: c.n, password: c.p,
                gold: c.g || 0, oil: c.o || 0, metal: c.m || 0, xp: c.x || 0,
                faction: c.fac || null, lastMineCollect: c.t || ts(), mineLevel: c.l || 1,

        function packData() {

        async function saveAll(force = false) {
            if (!isConnected) return false;
            if (saving) return false;
            saving = true;
            syncPlayerToAllPlayers();
            try {
                const { error } = await db.from('game_state').upsert({ id: 'main_game', data: packData() }, { onConflict: 'id' });
                if (error) throw error;
                updateSyncUI("✅ ذخیره شد", "online");
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                updateSyncUI("❌ خطا در ذخیره", "error");
                return false;
            } finally {
                saving = false;
            }
        }

        async function loadAll() {
            if (!isConnected) if (!await initSupabase()) return false;
            try {
                const { data, error } = await db.from('game_state').select('data').eq('id', 'main_game').single();
                if (error && error.code !== 'PGRST116') throw error;
                if (data && data.data) {
                    const j = data.data;
                    if (j.k === DATA_KEY) {
                        allPlayers = (j.p || []).map(decompressPlayer);
                        marketOffers = j.m || [];
                        battleLogs = j.l || [];
                        chatMessages = j.c || [];
                        globalBanner = j.b || "";
                        chatLocked = j.cl || false;
                        if (player) {
                            const me = allPlayers.find(p => p.id === player.id);
                            if (me) player = me;
                        }
                    }
                }
                return true;
            } catch (e) {
                console.error("Load Error:", e);
                return false;
            }
        }

        function createPlayer(name, pass) {
            return {
                id: name + "_" + ts().toString(36), name, password: pass,
                gold: 1000, oil: 300, metal: 300, xp: 0,
                faction: null, lastMineCollect: ts(), mineLevel: 1,
                research: { military: 0, economy: 0, aviation: 0 },
                fighters: {}, defenses: [], shieldExpiry: 0
            };
        }

        function calcMine(p) {
            const elapsed = Math.min((ts() - (p.lastMineCollect || ts())) / 1000, 300);
            const cap = p.mineLevel * 300;
            const rate = p.mineLevel * 0.5;
            return {
                gold: Math.min(cap, Math.floor(rate * 2 * elapsed)),
                oil: Math.min(cap, Math.floor(rate * elapsed)),
                metal: Math.min(cap, Math.floor(rate * 1.5 * elapsed)),
                cap: cap, goldRate: rate * 2, oilRate: rate, metalRate: rate * 1.5
            };
        }

        function calcAttackPower(p) {
            if (!p || !p.fighters) return 0;
            let power = 0;
            for (const [n, d] of Object.entries(p.fighters)) {
                if (F_DB[n] && d.count > 0) power += F_DB[n].p * d.count;
            }
            return Math.floor(power);
        }

        function calcDefensePower(p) {
            if (!p) return 0;
            let power = calcAttackPower(p) * 0.5;
            if (p.defenses) {
                p.defenses.forEach(def => {
                    if (D_DB[def.type] && def.hp > 0) power += D_DB[def.type].def * (def.hp / def.maxHp);
                });
            }
            return Math.floor(power);
        }

        function getFactionStats() {
            const stats = {};
            for (const id in FACTIONS_DB) {
                stats[id] = { id, name: FACTIONS_DB[id].n, icon: FACTIONS_DB[id].i, members: 0, points: 0, memberList: [] };
            }
            allPlayers.forEach(p => {
                if (p.faction && stats[p.faction]) {
                    stats[p.faction].members++;
                    stats[p.faction].points += (p.xp || 0);
                    stats[p.faction].memberList.push(p);
                }
            });
            return Object.values(stats).sort((a, b) => b.points - a.points);
        }

        window.launchAttack = async function (targetId) {
            if (isAttacking) return;
            isAttacking = true;
            try {
                const target = allPlayers.find(p => p.id === targetId);
                if (!target) return toast("هدف یافت نشد", true);
                const myAtt = calcAttackPower(player);
                if (myAtt <= 0) return toast("برای حمله باید جنگنده بسازید!", true, "war");
                if (target.shieldExpiry && ts() < target.shieldExpiry) {
                    const rm = target.shieldExpiry - ts();
                    return toast(`🛡️ سپر فعال (${Math.floor(rm / 3600000)}س ${Math.floor((rm % 3600000) / 60000)}د)`, true);
                }
                if (player.shieldExpiry && ts() < player.shieldExpiry) {
                    player.shieldExpiry = 0;
                    const apIdx = allPlayers.findIndex(p => p.id === player.id);
                    if (apIdx >= 0) allPlayers[apIdx].shieldExpiry = 0;
                    updateUI(); await saveAll(true);
                    toast("🛡️ سپر شما به دلیل حمله از بین رفت!", false, "war");
                }
                const enemyDef = calcDefensePower(target);
                let resultMsg = "", resultStr = "", isWin = false;
                if (myAtt > enemyDef) {
                    isWin = true;
                    const ratio = enemyDef / myAtt;
                    const loot = { g: Math.floor(target.gold * 0.3), o: Math.floor(target.oil * 0.3), m: Math.floor(target.metal * 0.3) };
                    target.gold -= loot.g; target.oil -= loot.o; target.metal -= loot.m;
                    player.gold += loot.g; player.oil += loot.o; player.metal += loot.m;
                    player.xp += 15; target.xp += 3;
                    target.shieldExpiry = ts() + SHIELD_DURATION;
                    for (const [k, f] of Object.entries(player.fighters)) { const lost = Math.ceil(f.count * ratio * 0.5); f.count = Math.max(0, f.count - lost); }
                    for (const [k, f] of Object.entries(target.fighters)) { f.count = Math.max(0, f.count - Math.ceil(f.count * 0.8)); }
                    if (target.defenses) target.defenses.forEach(def => { def.hp = 0; });
                    target.defenses = target.defenses ? target.defenses.filter(def => def.hp > 0) : [];
                    resultMsg = `🔥 <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد و پیروز شد! <span class="loot">${loot.g} طلا، ${loot.o} نفت، ${loot.m} فلز</span> غارت شد.`;
                    resultStr = `🏆 پیروزی!<br>غارت: ${loot.g} طلا | ${loot.o} نفت | ${loot.m} فلز`;
                } else {
                    isWin = false;
                    const ratio = myAtt / enemyDef;
                    player.xp += 2; target.xp += 15;
                    for (const [k, f] of Object.entries(player.fighters)) { f.count = Math.max(0, f.count - Math.ceil(f.count * 0.9)); }
                    for (const [k, f] of Object.entries(target.fighters)) { f.count = Math.max(0, f.count - Math.ceil(f.count * ratio * 0.4)); }
                    if (target.defenses) { target.defenses.forEach(def => { def.hp -= 40; if (def.hp < 0) def.hp = 0; }); target.defenses = target.defenses.filter(def => def.hp > 0); }
                    resultMsg = `🛡️ <span class="attacker">${getFormattedName(player)}</span> به <span class="defender">${getFormattedName(target)}</span> حمله کرد اما دفاع شد!`;
                    resultStr = `💥 شکست سنگین!`;
                }
                player.shieldExpiry = 0;
                const preSaveIdx = allPlayers.findIndex(p => p.id === player.id);
                if (preSaveIdx >= 0) allPlayers[preSaveIdx].shieldExpiry = 0;
                battleLogs.push({ ts: ts(), text: resultMsg });
                await saveAll(true);
                document.getElementById('app').classList.add('screen-shake');
                const overlay = document.getElementById('battleOverlay');
                const statusText = document.getElementById('battleStatusText');
                const resultText = document.getElementById('battleResultText');
                const expIcon = document.getElementById('explosionIcon');
                overlay.classList.add('active');
                statusText.innerText = `هدف قفل شد: ${target.name}`;
                statusText.style.color = "#fbbf24";
                resultText.innerText = "";
                expIcon.innerText = "🚀";
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = "برخورد!";
                expIcon.innerText = "💥";
                document.getElementById('app').classList.add('screen-shake');
                await new Promise(r => setTimeout(r, 1500));
                document.getElementById('app').classList.remove('screen-shake');
                statusText.innerText = isWin ? "پیروزی!" : "شکست!";
                statusText.style.color = isWin ? "#4ade80" : "#fca5a5";
                resultText.innerHTML = resultStr;
                await new Promise(r => setTimeout(r, 2500));
                overlay.classList.remove('active');
                updateUI(); renderWar(); renderBattlelog();
            } finally { isAttacking = false; }
        };

        function updateMineVisuals() {
            if (!player) return;
            const m = calcMine(player);
            const cap = m.cap;
            const gBar = document.getElementById('mineBarGold');
            const oBar = document.getElementById('mineBarOil');
            const mBar = document.getElementById('mineBarMetal');
            const gVal = document.getElementById('mineValGold');
            const oVal = document.getElementById('mineValOil');
            const mVal = document.getElementById('mineValMetal');
            const gPctEl = document.getElementById('minePctGold');
            const oPctEl = document.getElementById('minePctOil');
            const mPctEl = document.getElementById('minePctMetal');
            const timeEl = document.getElementById('mineTimeRow');
            if (gBar) { const p = Math.min(100,(m.gold/cap)*100); gBar.style.width = p+'%'; if(p>=95) gBar.classList.add('full'); else gBar.classList.remove('full'); }
            if (oBar) { const p = Math.min(100,(m.oil/cap)*100); oBar.style.width = p+'%'; if(p>=95) oBar.classList.add('full'); else oBar.classList.remove('full'); }
            if (mBar) { const p = Math.min(100,(m.metal/cap)*100); mBar.style.width = p+'%'; if(p>=95) mBar.classList.add('full'); else mBar.classList.remove('full'); }
            if (gVal) gVal.textContent = m.gold.toLocaleString('fa-IR');
            if (oVal) oVal.textContent = m.oil.toLocaleString('fa-IR');

            let h = '';

            /* هدر صفحه */
            h += `<div class="fac-page-header">`;
            if (myFacData) {
                h += `<div class="fac-my-icon">${myFacData.i}</div>

                <div style="margin-top:8px;"><span class="fac-my-badge no-fac">⚠️ به یک جناح بپیوندید</span></div>`;
            }
            h += `</div>`;

            h += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <div style="color:#fbbf24;font-size:0.68rem;font-weight:800;">🛡️ جناح‌های نظامی</div>
                <div style="font-size:0.45rem;color:#475569;">${stats.length} جناح</div>
            </div>`;

            h += `<div class="fac-grid">`;

            stats.forEach((fac, idx) => {
                const isMine = player.faction === fac.id;
                const rank = idx + 1;
                const pct = Math.max(2, (fac.points / maxPts) * 100);
                let rc = 'rn', rl = `رتبه ${rank}`;

                let facPwr = 0;

                /* آواتارهای اعضا */

                        avHtml += `<div class="fac-av2 ${isMe?'me':''}" title="${escapeHtml(mem.name)}">${mem.name.charAt(0).toUpperCase()}</div>`;
                    }
                    if (fac.memberList.length > 7) avHtml += `<div class="fac-av2-extra">+${fac.memberList.length-7}</div>`;
                } else {
                    avHtml = `<div class="fac-no-mem-tag">بدون عضو</div>`;

                h += `<div class="fac-card-v2 ${isMine?'mine':''}">
                    <div class="fac-rank-strip ${rc}"></div>

                                ${isMine?'❌ خروج':'✅ پیوستن'}
                            </button>
                        </div>
                    </div>
                </div>`;
            });

            h += `</div>`;
            document.getElementById('factionsContent').innerHTML = h;
        }

                    <div class="podium-col">
                        <div class="podium-av p1">${p1.name.charAt(0).toUpperCase()}</div>
                        <div class="podium-name">${escapeHtml(p1.name)}</div>
                        <div class="podium-xp">⭐ ${p1.xp.toLocaleString('fa-IR')}</div>
                        <div class="podium-block p1">🥇</div>
                    </div>
                    <div class="podium-col">
                        <div class="podium-av p3">${p3.name.charAt(0).toUpperCase()}</div>
                        <div class="podium-name">${escapeHtml(p3.name)}</div>
                        <div class="podium-xp">⭐ ${p3.xp.toLocaleString('fa-IR')}</div>
                        <div class="podium-block p3">🥉</div>
                    </div>
                </div>`;
            }

            h += `<div class="rank-list">`;
            sorted.forEach((p, i) => {
                const isMe = p.id === player.id;
                const rank = i + 1;
                let numClass = '';
                let numText = rank.toLocaleString('fa-IR');
                let rowClass = '';
                if (rank===1){numClass='n1';numText='🥇';rowClass='top1';}
                else if(rank===2){numClass='n2';numText='🥈';rowClass='top2';}
                else if(rank===3){numClass='n3';numText='🥉';rowClass='top3';}
                if(isMe) rowClass='me';

                const fac = p.faction ? FACTIONS_DB[p.faction] : null;
                const att = calcAttackPower(p);
                const def = calcDefensePower(p);

                h += `<div class="rank-row ${rowClass}">
                    <div class="rank-num ${numClass}">${numText}</div>
                    <div class="rank-av ${isMe?'me':''}">${p.name.charAt(0).toUpperCase()}</div>
                    <div class="rank-info">
                        <div class="rank-name">${escapeHtml(p.name)}${isMe?' <span style="color:#fbbf24;font-size:0.4rem;">(شما)</span>':''}</div>
                        <div class="rank-meta">
                            ${fac?`<span class="rank-chip">${fac.i} ${fac.n}</span>`:''}
                            <span class="rank-chip">⚔️ ${att.toLocaleString('fa-IR')}</span>
                            <span class="rank-chip">🛡️ ${def.toLocaleString('fa-IR')}</span>
                            <span class="rank-chip">💰 ${Math.floor(p.gold).toLocaleString('fa-IR')}</span>
                        </div>
                    </div>
                    <div class="rank-xp">
                        ${p.xp.toLocaleString('fa-IR')}
                        <div class="rank-xp-sub">⭐ XP</div>
                    </div>
                </div>`;
            });
            h += `</div>`;

            if (!sorted.length) h += `<div class="empty">هنوز بازیکنی ثبت‌نام نکرده</div>`;

            document.getElementById('rankContent').innerHTML = h;
        }

        function renderBattlelog() {
            let h=`<div class="section-title">📜 گزارش نبردها</div>`;
            if(!battleLogs.length) h+=`<div class="empty">هنوز نبردی نبوده</div>`;
            else{h+=`<div class="battle-log">`;[...battleLogs].reverse().forEach(l=>{h+=`<div class="log-entry" style="padding:6px 0;border-bottom:1px solid #1a1a2e;"><div style="font-size:0.55rem;color:#64748b;margin-bottom:2px;">${new Date(l.ts).toLocaleString('fa-IR')}</div><div>${l.text}</div></div>`;});h+=`</div>`;}
            document.getElementById('battlelogContent').innerHTML=h;
        }

        function renderResearch() {
            const br=[{k:'military',n:'⚔️ نظامی',d:'ارتقای قدرت جنگی',i:'⚔️'},{k:'economy',n:'💰 اقتصادی',d:'بهبود تولید منابع',i:'📈'},{k:'aviation',n:'✈️ هوایی',d:'باز کردن قفل جنگنده‌ها',i:'🛩️'}];
            let h=`<div class="info-bar">⭐ XP: ${player.xp.toLocaleString('fa-IR')}</div>`;
            br.forEach(b=>{const l=player.research[b.k],c=(l+1)*15,ca=player.xp>=c;let det='';if(b.k==='aviation'){const ul=Object.entries(F_DB).filter(([k,f])=>f.r<=l).map(([k,f])=>f.n);const nl=Object.entries(F_DB).filter(([k,f])=>f.r===l+1).map(([k,f])=>f.n);det=`<div style="font-size:0.45rem;color:#94a3b8;margin-top:4px;">قفل‌شده: ${ul.join('، ')||'هیچ'}</div>`;if(nl.length)det+=`<div style="font-size:0.45rem;color:#4ade80;">بعدی: ${nl.join('، ')}</div>`;}
            h+=`<div class="card" style="text-align:right;"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:0.8rem;font-weight:700;color:#fbbf24;">${b.n} - سطح ${l}</div><div style="font-size:0.5rem;color:#94a3b8;">${b.d}</div>${det}</div><div style="text-align:center;"><div style="font-size:1.5rem;">${b.i}</div><button class="btn btn-purple btn-sm" ${!ca?'disabled':''} onclick="upgradeResearch('${b.k}')">⬆️ (${c} XP)</button></div></div></div>`;});
            document.getElementById('researchContent').innerHTML=h;
        }

        function renderAdmin() {
            if(!isAdmin()) return;
            let po=`<option value="">انتخاب...</option>`; allPlayers.forEach(p=>{po+=`<option value="${p.id}">${escapeHtml(p.name)} (💰${Math.floor(p.gold).toLocaleString('fa-IR')} | ⭐${p.xp})</option>`;});
            document.getElementById('adminContent').innerHTML=`
            <div class="info-bar" style="border-color:#ef4444;color:#fca5a5;">⚠️ پنل مدیریت | بازیکنان: ${allPlayers.length}</div>
            <div class="admin-panel-box"><h3>📢 اطلاعیه سراسری</h3><div style="display:flex;gap:5px;margin-bottom:8px;"><input type="text" id="admBannerText" placeholder="متن اطلاعیه..." maxlength="150" style="flex:1;margin:0;"><button class="btn btn-blue btn-sm" onclick="adminSetBanner()">اعلان</button><button class="btn btn-danger btn-sm" onclick="adminRemoveBanner()">حذف</button></div><div style="display:flex;gap:5px;"><button class="btn btn-sm" style="width:100%;justify-content:center;${chatLocked?'background:#10b981;color:#fff;':'background:#dc2626;color:#fff;'}" onclick="adminToggleChat()">${chatLocked?'🔓 باز کردن چت':'🔒 قفل چت'}</button></div></div>
            <div class="admin-panel-box"><h3>🎁 اعطای منابع</h3><select id="admSel">${po}</select><div style="display:flex;gap:5px;margin-top:5px;"><select id="admRes" style="width:35%;margin:0;"><option value="gold">💰 طلا</option><option value="oil">🛢️ نفت</option><option value="metal">⛏️ فلز</option><option value="xp">⭐ XP</option></select><input type="number" id="admAmt" placeholder="مقدار" style="width:35%;margin:0;" min="1"><button class="btn btn-gold btn-sm" style="width:30%;margin:0;" onclick="adminGiveRes()">اعطا</button></div></div>
            <div class="admin-panel-box"><h3>🛠️ عملیات</h3><div style="display:flex;flex-wrap:wrap;gap:5px;"><button class="btn btn-blue btn-sm" onclick="adminToggleShield()">🛡️ سپر</button><button class="btn btn-red btn-sm" onclick="adminResetPlayer()">⚠️ ریست</button><button class="btn btn-danger btn-sm" onclick="adminDeletePlayer()">🗑️ حذف</button></div></div>
            <div class="admin-panel-box"><h3>📢 پیام سراسری چت</h3><div style="display:flex;gap:5px;"><input type="text" id="admBroad" placeholder="متن..." maxlength="150" style="flex:1;margin:0;"><button class="btn btn-gold btn-sm" onclick="adminBroadcast()">ارسال</button><button class="btn btn-danger btn-sm" onclick="adminClearChat()">🧹 پاک</button></div></div>
            <div class="admin-panel-box" style="border-color:#dc2626;"><h3 style="color:#fca5a5;">☢️ منطقه خطر</h3><button class="btn btn-danger" style="width:100%;justify-content:center;" onclick="adminNuke()">☢️ نابودی سرور</button></div>`;
        }

        const renderMap = { mine:renderMine, military:renderMilitary, war:renderWar, chat:renderChat, factions:renderFactions, market:renderMarket, research:renderResearch, rank:renderRank, battlelog:renderBattlelog, admin:renderAdmin };
        function renderActiveTab() { const fn=renderMap[activeTab]; if(fn) fn(); }
        function switchTab(t) {
            activeTab=t;
            document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${t}"]`)?.classList.add('active');
            document.getElementById('panel'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.add('active');
            renderActiveTab();
        }
        document.querySelectorAll('.tab').forEach(t=>{ t.addEventListener('click', ()=>switchTab(t.dataset.tab)); });

        async function gameLoop() { await loadAll(); if(player){const me=allPlayers.find(p=>p.id===player.id);if(me) player=me; updateUI(); if(activeTab==="mine") updateMineVisuals(); else renderActiveTab();} }
        async function init() {
            const ok=await initSupabase();
            if(ok){ await loadAll(); document.getElementById("loginBox").style.display='flex'; setInterval(gameLoop, SYNC_INTERVAL); }
            else{ document.getElementById("syncText").innerText="❌ اتصال برقرار نشد. رفرش کنید."; }
        }
        init();
    </script>
</body>
</html>
