<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Iron sky | آسمان آهنین</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* ===== LOADING OVERLAY ===== */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0f0f2a 0%, #05050f 100%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            overflow: hidden;
        }
        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-ring {
            position: relative;
            width: 140px;
            height: 140px;
        }
        .loader-ring .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            animation: spinRing 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .loader-ring .ring:nth-child(1) {
            border-top-color: #f59e0b;
            animation-delay: 0s;
        }
        .loader-ring .ring:nth-child(2) {
            border-right-color: #ef4444;
            animation-delay: 0.4s;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
        }
        .loader-ring .ring:nth-child(3) {
            border-bottom-color: #3b82f6;
            animation-delay: 0.8s;
            width: 55%;
            height: 55%;
            top: 22.5%;
            left: 22.5%;
        }
        .loader-ring .ring:nth-child(4) {
            border-left-color: #10b981;
            animation-delay: 1.2s;
            width: 30%;
            height: 30%;
            top: 35%;
            left: 35%;
        }
        @keyframes spinRing {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .loader-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            animation: pulseIcon 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.4));
        }
        @keyframes pulseIcon {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0.8;
            }
        }
        .loader-title {
            margin-top: 30px;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
            animation: glowTitle 2s ease-in-out infinite alternate;
            position: relative;
        }
        .loader-title::after {
            content: '⚡';
            position: absolute;
            top: -10px;
            right: -40px;
            font-size: 1.2rem;
            -webkit-text-fill-color: initial;
            color: #fbbf24;
            animation: sparkle 1.4s ease-in-out infinite;
        }
        @keyframes glowTitle {
            0% {
                filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.2));
            }
            100% {
                filter: drop-shadow(0 0 30px rgba(245, 158, 11, 0.5));
            }
        }
        @keyframes sparkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.9) rotate(-10deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.3) rotate(10deg);
            }
        }
        .loader-sub {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 4px;
            letter-spacing: 6px;
            font-weight: 300;
        }
        .loader-bar-track {
            margin-top: 28px;
            width: 220px;
            height: 4px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        .loader-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f59e0b, #ef4444, #8b5cf6);
            border-radius: 4px;
            animation: loadProgress 2.6s ease-in-out forwards;
            position: relative;
        }
        .loader-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            animation: barShimmer 1.8s linear infinite;
        }
        @keyframes loadProgress {
            0% {
                width: 0%;
            }
            20% {
                width: 18%;
            }
            40% {
                width: 42%;
            }
            60% {
                width: 68%;
            }
            80% {
                width: 85%;
            }
            100% {
                width: 100%;
            }
        }
        @keyframes barShimmer {
            0% {
                transform: translateX(-33.33%);
            }
            100% {
                transform: translateX(0%);
            }
        }
        .loader-dots {
            margin-top: 18px;
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .loader-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) {
            animation-delay: 0.2s;
            background: #ef4444;
        }
        .loader-dots span:nth-child(3) {
            animation-delay: 0.4s;
            background: #3b82f6;
        }
        .loader-dots span:nth-child(4) {
            animation-delay: 0.6s;
            background: #10b981;
        }
        .loader-dots span:nth-child(5) {
            animation-delay: 0.8s;
            background: #8b5cf6;
        }
        @keyframes dotBounce {
            0%,
            80%,
            100% {
                transform: scale(0.4);
                opacity: 0.3;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
        .loader-version {
            position: absolute;
            bottom: 30px;
            color: #334155;
            font-size: 0.5rem;
            letter-spacing: 2px;
        }

        /* ===== استایل‌های اصلی ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            padding: 10px;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.92);
            border-radius: 2rem;
            overflow: hidden;
            border: 2px solid #f59e0b;
            box-shadow: 0 0 60px rgba(245, 158, 11, 0.15);
            backdrop-filter: blur(4px);
        }
        .header {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f23 100%);
            padding: 1.2rem 1rem;
            text-align: center;
        }
        .header h1 {
            color: #fbbf24;
            text-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
            font-size: 1.6rem;
        }
        .header .sub {
            font-size: 0.65rem;
            color: #f59e0b;
            letter-spacing: 4px;
            opacity: 0.8;
        }
        .sync-status {
            background: #0a0a1a;
            padding: 8px;
            text-align: center;
            font-size: 0.6rem;
            color: #fbbf24;
            border-bottom: 1px solid #f59e0b33;
            display: flex;
            justify-content: center;
            gap: 8px;
            align-items: center;
        }
        .login-box {
            padding: 18px;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login-box input {
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #f59e0b44;
            text-align: center;
            font-size: 1rem;
            background: #1a1a2e;
            color: white;
            outline: 2px solid transparent;
        }
        .login-box input:focus {
            outline-color: #f59e0b;
        }
        .login-box button {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            color: #0f172a;
            font-size: 1.05rem;
        }
        .res-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: #0a0a1a;
            flex-wrap: wrap;
            border-bottom: 1px solid #f59e0b44;
        }
        .res-item {
            background: #1a1a2e;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.65rem;
            border: 1px solid #f59e0b22;
        }
        .res-item span {
            color: #fbbf24;
            font-weight: 700;
        }
        .online-bar {
            background: #0a1a0a;
            padding: 4px;
            text-align: center;
            font-size: 0.55rem;
            color: #4ade80;
        }
        .online-bar.offline {
            background: #1a0a0a;
            color: #fca5a5;
        }
        .online-bar.warn {
            background: #1a1a0a;
            color: #fbbf24;
        }
        .shield-bar {
            background: #0a1a2e;
            padding: 8px;
            text-align: center;
            font-size: 0.65rem;
            color: #93c5fd;
            border-bottom: 1px solid #3b82f633;
            display: none;
            font-weight: 600;
        }
        .global-banner {
            background: linear-gradient(90deg, #7f1d1d 0%, #991b1b 50%, #7f1d1d 100%);
            padding: 12px 16px;
            text-align: center;
            font-size: 0.78rem;
            color: #fca5a5;
            border-bottom: 2px solid #ef4444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: bannerIn .6s ease;
            position: relative;
            overflow: hidden;
        }
        .global-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.15), transparent);
            animation: bannerSweep 3s linear infinite;
        }
        @keyframes bannerIn {
            from {
                transform: translateY(-100%);
                opacity: 0
            }
            to {
                transform: translateY(0);
                opacity: 1
            }
        }
        @keyframes bannerSweep {
            0% {
                transform: translateX(-33%)
            }
            100% {
                transform: translateX(33%)
            }
        }
        .tabs {
            display: flex;
            background: #0a0a1a;
            border-bottom: 1px solid #f59e0b44;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.6rem;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            text-align: center;
            transition: 0.25s;
        }
        .tab:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.03);
        }
        .tab.active {
            color: #fbbf24;
            background: #1a1a2e;
            border-bottom-color: #f59e0b;
        }
        .tab.admin-tab {
            color: #fca5a5;
            border-color: #7f1d1d33;
        }
        .tab.admin-tab.active {
            color: #fca5a5;
            background: #450a0a;
            border-bottom-color: #ef4444;
        }
        .panel {
            display: none;
            padding: 12px;
            min-height: 440px;
            background: rgba(10, 10, 26, 0.85);
        }
        .panel.active {
            display: block;
        }
        .grid2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 1.2rem;
            padding: 12px;
            text-align: center;
            border: 1px solid #f59e0b44;
            margin-bottom: 8px;
        }
        .card .icon {
            font-size: 1.8rem;
        }
        .card .cost {
            font-size: 0.55rem;
            color: #fbbf24;
            margin-top: 4px;
        }
        .player-row {
            background: #0a0a1a;
            border-radius: 1.2rem;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid #f59e0b44;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .btn {
            transition: 0.2s;
            cursor: pointer;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.6rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 2px;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-attack {
            background: #ef4444;
            color: #fff;
        }
        .btn-gold {
            background: #f59e0b;
            color: #0f172a;
        }
        .btn-green {
            background: #10b981;
            color: #fff;
        }
        .btn-purple {
            background: #8b5cf6;
            color: #fff;
        }
        .btn-blue {
            background: #3b82f6;
            color: #fff;
        }
        .btn-red {
            background: #dc2626;
            color: #fff;
        }
        .btn-danger {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 0.5rem;
        }
        .btn-max {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a2e;
            color: #fbbf24;
            padding: 12px 18px;
            border-radius: 40px;
            border-right: 4px solid #f59e0b;
            z-index: 9999;
            animation: fadeOut 4.5s forwards;
            max-width: 92%;
            font-size: 0.8rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        .toast.error {
            border-right-color: #ef4444;
            color: #fca5a5;
        }
        .toast.war {
            background: #1a0a0a;
            border-right-color: #ef4444;
            color: #fca5a5;
        }
        .toast.peace {
            background: #0a1a0a;
            border-right-color: #10b981;
            color: #4ade80;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0)
            }
            70% {
                opacity: 1;
                transform: translateY(0)
            }
            100% {
                opacity: 0;
                transform: translateY(20px);
                visibility: hidden
            }
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .empty {
            text-align: center;
            padding: 24px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .section-title {
            color: #fbbf24;
            margin: 10px 0 6px;
            font-size: 0.7rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 4px;
        }
        .info-bar {
            background: #1a1a2e;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 0.6rem;
            text-align: center;
            color: #fbbf24;
            border: 1px solid #f59e0b44;
        }
        input,
        select {
            background: #1a1a2e;
            border: 1px solid #334155;
            color: white;
            padding: 6px 10px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            margin: 3px 0;
            font-size: 0.6rem;
        }
        .battle-log {
            background: #0a0a1a;
            border: 1px solid #f59e0b44;
            border-radius: 1rem;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.6rem;
        }
        .battle-log .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .attacker {
            color: #fca5a5;
        }
        .defender {
            color: #7dd3fc;
        }
        .loot {
            color: #4ade80;
        }
        .battle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }
        .battle-overlay.active {
            display: flex;
            animation: fadeIn .3s;
        }
        .explosion {
            font-size: 8rem;
            animation: boom .8s infinite alternate;
            filter: drop-shadow(0 0 20px #ef4444);
        }
        @keyframes boom {
            0% {
                transform: scale(1);
                opacity: 1
            }
            100% {
                transform: scale(1.4);
                opacity: 0.7
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0
            }
            to {
                opacity: 1
            }
        }
        .battle-text {
            color: #fbbf24;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 10px #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1)
            }
            50% {
                transform: scale(1.05)
            }
            100% {
                transform: scale(1)
            }
        }
        .result-text {
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 10px;
            max-width: 90%;
        }
        .screen-shake {
            animation: shake .5s cubic-bezier(.36, .07, .19, .97) both;
        }
        @keyframes shake {
            10%,
            90% {
                transform: translate3d(-1px, 0, 0)
            }
            20%,
            80% {
                transform: translate3d(2px, 0, 0)
            }
            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0)
            }
            40%,
            60% {
                transform: translate3d(4px, 0, 0)
            }
        }
        .storage-bar {
            height: 10px;
            background: #334155;
            border-radius: 10px;
            margin: 6px 0;
            overflow: hidden;
        }
        .storage-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            transition: width 0.3s;
        }
        .hp-fill {
            background: linear-gradient(90deg, #10b981, #ef4444);
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
            background: #0a0a1a;
            border-radius: 1rem;
            border: 1px solid #f59e0b44;
            overflow: hidden;
        }
        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.65rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg {
            background: #1a1a2e;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .chat-msg.me {
            border-color: #f59e0b66;
            background: #1e293b;
        }
        .chat-msg.system-msg {
            border-color: #ef4444;
            background: rgba(127, 29, 29, 0.3);
        }
        .chat-msg .sender {
            color: #fbbf24;
            font-weight: bold;
            font-size: 0.6rem;
        }
        .chat-msg .sender.admin-s {
            color: #3b82f6;
        }
        .chat-msg .time {
            color: #64748b;
            font-size: 0.4rem;
            float: left;
            margin-top: 2px;
        }
        .chat-input-area {
            padding: 10px;
            background: #1a1a2e;
            border-top: 1px solid #f59e0b44;
            display: flex;
            gap: 5px;
        }
        .chat-input-area input {
            margin: 0;
            flex: 1;
        }
        .admin-panel-box {
            background: #0f0f0f;
            border: 1px solid #7f1d1d;
            border-radius: 1rem;
            padding: 12px;
            margin-bottom: 12px;
            min-height: 80px;
        }
        .admin-panel-box h3 {
            color: #fca5a5;
            font-size: 0.75rem;
            margin-bottom: 8px;
            border-bottom: 1px solid #7f1d1d;
            padding-bottom: 4px;
        }
        .is-hidden {
            display: none !important;
        }

        /* ===== استایل‌های معدن، جناح، بازار، رتبه و ... ===== */
        .mine-card {
            background: linear-gradient(160deg, #1a1a2e 0%, #0f1729 50%, #1a1025 100%);
            border: 1px solid #f59e0b55;
            border-radius: 1.4rem;
            padding: 18px;
            position: relative;
            overflow: hidden;
        }
        .mine-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(245, 158, 11, 0.04) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        .mine-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }
        .mine-icon-wrap {
            font-size: 2.8rem;
            animation: mineSwing 2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.4));
        }
        @keyframes mineSwing {
            0%,
            100% {
                transform: rotate(-12deg) scale(1)
            }
            50% {

    <script>
        // ===== تنظیمات اولیه =====
        const SUPABASE_URL = 'https://rxugexswtpvuotijdlzn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gsgiccX5kQMLrXnSqbAPwQ_ZoRRsYT3';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_NAME = "Admin",
            ADMIN_PASS = "admin1313",
            DATA_KEY = "EMPIRE_DATA_V60_NOJUMP",
            SYNC_INTERVAL = 3000,
            SHIELD_DURATION = 12 * 60 * 60 * 1000;
        const OFFER_EXPIRY = 60 * 60 * 1000;
        const MAX_MINE_LEVEL = 25;
        const MAX_PLAYERS = 1000;

        const F_DB = { "A-4": { n: "Qaher-313", i: "🇮🇷", p: 15, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "F-5E": { n: "F-5E Tiger", i: "🇺🇸", p: 20, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "MiG-21": { n: "MiG-21", i: "🇷🇺", p: 25, c: { g: 1000, o: 1000, m: 1000 }, r: 0 },
            "F-16": { n: "F-16", i: "🇺🇸", p: 130, c: { g: 5500, o: 1600, m: 900 }, r: 3 },
            "MiG-29": { n: "MiG-29", i: "🇷🇺", p: 180, c: { g: 8000, o: 2200, m: 1300 }, r: 4 },
            "F-35": { n: "F-35", i: "🇺🇸", p: 300, c: { g: 16000, o: 4500, m: 2800 }, r: 5 },
            "Su-57": { n: "Su-57", i: "🇷🇺", p: 400, c: { g: 22000, o: 6000, m: 4500 }, r: 6 },
            "F-22": { n: "F-22", i: "🇺🇸", p: 500, c: { g: 38000, o: 11000, m: 8500 }, r: 8 }
        };
        const D_DB = { "Patriot": { n: "Patriot", i: "🇺🇸", c: { g: 20000, o: 6000, m: 4000 }, def: 120, hp: 180 },
            "S-400": { n: "S-400", i: "🇷🇺", c: { g: 25000, o: 8000, m: 6000 }, def: 150, hp: 200 },
            "Khordad": { n: "خرداد-۱۵", i: "🇮🇷", c: { g: 8000, o: 2000, m: 1500 }, def: 60, hp: 100 },
            "Bavar": { n: "باور-۳۷۳", i: "🇮🇷", c: { g: 15000, o: 4500, m: 3000 }, def: 100, hp: 150 }
        };
        const FACTIONS_DB = { "sky_knights": { name: "شوالیه‌های آسمان", icon: "🛡️" }, "red_baron": { name: "بارون‌های سرخ",
                icon: "🌹" }, "iron_cross": { name: "صلیب‌های آهنین", icon: "✠" }, "grey_wolves": { name: "گرگ‌های خاکستری",
                icon: "🐺" }, "desert_falcons": { name: "شاهین‌های صحرا", icon: "🦅" },
            "sky_phantoms": { name: "شبح‌های آسمان", icon: "👻" } };
        const RES_META = { gold: { name: "طلا", icon: "💰", theme: "gold-theme" }, oil: { name: "نفت", icon: "🛢️",
                theme: "oil-theme" }, metal: { name: "فلز", icon: "⛏️", theme: "metal-theme" } };

        // ===== متغیرهای سراسری =====
        let player = null,
            allPlayers = [],
            marketOffers = [],
            battleLogs = [],
            chatMessages = [];
        let isConnected = false,
            saving = false,
            isAttacking = false;
        let globalBanner = "",
            chatLocked = false,
            mineTimer = null,
            activeTab = "mine";
        let lastHash = '',
            syncLoopRunning = false;
        let adminSavedInputs = null;
        let displayedChatCount = 0;
        let adminPlayerHash = '';
        let skyZoom = 1;
        const SKY_MIN_ZOOM = 0.5,
            SKY_MAX_ZOOM = 2.5;
        let skyPos = { x: 0, y: 0 };
        let skyPlayerPositions = {};

        // ===== توابع کمکی =====
        function saveInputs(containerId) {
            const c = document.getElementById(containerId);
            if (!c) return { v: {}, fid: null, fp: 0 };
            const v = {};
            let fid = null,
                fp = 0;
            c.querySelectorAll('input,select,textarea').forEach(el => {
                if (el.id) {
                    v[el.id] = el.value;
                    if (document.activeElement === el) { fid = el.id;
                        fp = el.selectionStart || 0; }
                }
            });
            return { v, fid, fp };
        }

        function restoreInputs(s) {
            if (!s) return;
            for (const id in s.v) {
                const el = document.getElementById(id);
                if (!el) continue;
                el.value = s.v[id];
                if (el.tagName === 'SELECT') {
                    for (let i = 0; i < el.options.length; i++) {
                        if (el.options[i].value === s.v[id]) { el.selectedIndex = i; break; }
                    }
                }
            }
            if (s.fid) {
                const el = document.getElementById(s.fid);
                if (el) { el.focus({ preventScroll: true });
                    try { el.setSelectionRange(s.fp, s.fp); } catch (e) {} }
            }
        }

        function toast(m, e = false, type = "") {
            const t = document.createElement("div");
            t.className = "toast" + (e ? " error" : "") + (type ? " " + type : "");
            t.innerHTML = m;
            document.body.appendChild(t);
            setTimeout(() => { if (t.parentNode) t.remove(); }, 4500);
        }

        function ts() { return Date.now(); }

        function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function isAdmin() { return player && player.name === ADMIN_NAME && player.password === ADMIN_PASS; }

        function isAdm(n) { return n === ADMIN_NAME; }

        function getFN(fId) { if (!fId) return ''; const f = FACTIONS_DB[fId]; return f ? f.name : fId; }

        function getFI(fId) { if (!fId) return ''; const f = FACTIONS_DB[fId]; return f ? f.icon : '🏴'; }

        function fmtName(p) {
            const fn = getFN(p.faction);
            const ft = fn ? ` <span style="color:#ef4444;font-size:0.75em;">[${escapeHtml(fn)}]</span>` : '';
            if (isAdm(p.name)) return `<span style="color:#3b82f6;font-weight:bold;">🚬 ${escapeHtml(p.name)}</span>${ft}`;
            return `${escapeHtml(p.name)}${ft}`;
        }

        function styledName(n) {
            return isAdm(n) ? `<span style="color:#3b82f6;font-weight:bold;">🚬 ${escapeHtml(n)}</span>` : escapeHtml(n);
        }

        function timeToFull(c, r, cap) {
            if (r <= 0) return '∞';
            const rem = cap - c;
            if (rem <= 0) return '✅ پر';
            const s = Math.ceil(rem / r);
            if (s >= 3600) return Math.floor(s / 3600) + 'س ' + Math.floor((s % 3600) / 60) + 'د';
            if (s >= 60) return Math.floor(s / 60) + 'د ' + (s % 60) + 'ث';
            return s + ' ثانیه';
        }

        function syncP() {
            if (!player) return;
            const i = allPlayers.findIndex(p => p.id === player.id);
            if (i >= 0) allPlayers[i] = { ...player };
        }

        // ===== Supabase =====
        async function initSupabase() {
            updateSyncUI("🔌 اتصال...", "warn");
            try {
                const { error } = await db.from('game_state').select('id').eq('id', 'main_game').maybeSingle();
                if (error) throw error;
                isConnected = true;
                updateSyncUI("✅ متصل", "online");
                return true;
            } catch (e) {
                console.error(e);
                updateSyncUI("❌ خطا", "error");
                return false;
            }
        }

        function updateSyncUI(t, s) {
            document.getElementById("syncText").innerText = t;
            const o = document.getElementById("onlineBar");
            o.classList.remove("offline", "warn");
            if (s === "error") o.classList.add("offline");
            else if (s === "warn") o.classList.add("warn");
            document.getElementById("onlineText").innerText = t;
        }

        function compP(p) {
            return { i: p.id, n: p.name, p: p.password, g: p.gold, o: p.oil, m: p.metal, x: p.xp, fac: p.faction,
                t: p.lastMineCollect, l: p.mineLevel, r: [p.research.military, p.research.economy, p.research.aviation],
                f: p.fighters, d: p.defenses, sh: p.shieldExpiry };
        }

        function decompP(c) {
            return { id: c.i, name: c.n || '', password: c.p, gold: c.g || 0, oil: c.o || 0, metal: c.m || 0,
                xp: c.x || 0, faction: c.fac || null, lastMineCollect: c.t || ts(), mineLevel: c.l || 1,
                research: { military: c.r ?.[0] || 0, economy: c.r ?.[1] || 0, aviation: c.r ?.[2] || 0 },
                fighters: c.f || {}, defenses: c.d || [], shieldExpiry: c.sh || 0 };
        }

        function packData() {
            return { k: DATA_KEY, p: allPlayers.map(compP), m: marketOffers, l: battleLogs.slice(-15),
                c: chatMessages.slice(-10), b: globalBanner, cl: chatLocked };
        }

        async function saveAll(force = false) {
            if (!isConnected || saving) return false;
            saving = true;
            syncP();
            try {
                const { error } = await db.from('game_state').upsert({ id: 'main_game', data: packData() }, { onConflict: 'id' });
                if (error) throw error;
                updateSyncUI("✅ ذخیره", "online");
                return true;
            } catch (e) {
                console.error(e);
                updateSyncUI("❌ خطا", "error");
                return false;
            } finally { saving = false; }
        }

        async function loadAll() {
            if (!isConnected) if (!await initSupabase()) return false;
            try {
                const { data, error } = await db.from('game_state').select('data').eq('id', 'main_game').single();
                if (error && error.code !== 'PGRST116') throw error;
                if (data?.data?.k === DATA_KEY) {
                    const j = data.data;
                    allPlayers = (j.p || []).map(decompP);
                    marketOffers = j.m || [];
                    battleLogs = j.l || [];
                    chatMessages = j.c || [];
                    globalBanner = j.b || "";
                    chatLocked = j.cl || false;
                    if (player) {
                        const me = allPlayers.find(p => p.id === player.id);
                        if (me) player = me;
                    }
                }
                return true;
            } catch (e) { console.error(e); return false; }
        }

        function createPlayer(n, pw) {
            return { id: n + "_" + ts().toString(36), name: n, password: pw, gold: 1000, oil: 300, metal: 300, xp: 0,
                faction: null, lastMineCollect: ts(), mineLevel: 1, research: { military: 0, economy: 0,
                    aviation: 0 }, fighters: {}, defenses: [], shieldExpiry: 0 };
        }

        // ===== توابع اصلی بازی =====
        function calcMine(p) {
            const el = Math.min((ts() - (p.lastMineCollect || ts())) / 1000, 600);
            const cap = 300 + (p.mineLevel - 1) * 250;
            const rate = 1.0;
            return { gold: Math.min(cap, Math.floor(rate * 2.0 * el)), oil: Math.min(cap, Math.floor(rate * 1.5 * el)),
                metal: Math.min(cap, Math.floor(rate * 1.0 * el)), cap, goldRate: rate * 2.0, oilRate: rate * 1.5,
                metalRate: rate * 1.0 };
        }

        function calcAtt(p) {
            if (!p?.fighters) return 0;
            let pw = 0;
            for (const [n, d] of Object.entries(p.fighters)) {
                if (F_DB[n] && d.count > 0) pw += F_DB[n].p * d.count;
            }
            return Math.floor(pw);
        }

        function calcDef(p) {
            if (!p) return 0;
            let pw = calcAtt(p) * 0.5;
            if (p.defenses) p.defenses.forEach(d => {
                if (D_DB[d.type] && d.hp > 0) pw += D_DB[d.type].def * (d.hp / d.maxHp);
            });
            return Math.floor(pw);
        }

        function getFacStats() {
            const s = {};
            for (const id in FACTIONS_DB) s[id] = { id, name: FACTIONS_DB[id].name, icon: FACTIONS_DB[id].icon,
                members: 0, points: 0, memberList: [] };
            allPlayers.forEach(p => {
                if (p.faction && s[p.faction]) { s[p.faction].members++;
                    s[p.faction].points += (p.xp || 0);
                    s[p.faction].memberList.push(p); }
            });
            return Object.values(s).sort((a, b) => b.points - a.points);
        }

        function dataHash() {
            return allPlayers.map(p => p.id + ':' + p.xp + ':' + p.gold + ':' + p.oil + ':' + p.metal).join('|') + '|' +
                marketOffers.length + '|' + chatMessages.length + '|' + battleLogs.length + '|' + globalBanner + '|' +
                chatLocked;
        }

        // ===== انقضای آگهی‌های بازار =====
        function expireMarketOffers() {
            const now = ts();
            let expired = [];
            marketOffers = marketOffers.filter(o => {
                if (now - o.ts > OFFER_EXPIRY) {
                    expired.push(o);
                    return false;
                }
                return true;
            });
            expired.forEach(o => {
                const seller = allPlayers.find(p => p.id === o.sid);
                if (seller) {
                    seller[o.give] += o.ga;
                    toast(`⏳ آگهی ${o.seller} منقضی شد و ${o.ga} ${RES_META[o.give]?.name || o.give} برگشت`, false, "peace");
                }
            });
            if (expired.length > 0) saveAll(true);
        }

        // ===== توابع ورود و ثبت =====
        window.loginRegister = async function() {
            const n = document.getElementById("playerName").value.trim(),
                pw = document.getElementById("playerPassword").value.trim();
            if (n.length < 3 || pw.length < 4) return toast("نام و رمز نامعتبر", true);
            const ex = allPlayers.find(p => p.name.toLowerCase() === n.toLowerCase());
            if (ex) {
                if (ex.password !== pw) return toast("رمز اشتباه", true);
                player = ex;
            } else {
                if (allPlayers.length >= MAX_PLAYERS) return toast("سرور پر است (حداکثر " + MAX_PLAYERS + " بازیکن)", true);
                player = createPlayer(n, pw);
                allPlayers.push(player);
                await saveAll(true);
            }
            document.getElementById("loginBox").style.display = 'none';
            document.getElementById("gameUI").style.display = 'block';
            if (isAdmin()) {
                document.querySelectorAll('.admin-el').forEach(e => e.classList.remove('is-hidden'));
                adminPlayerHash = '';
            }
            displayedChatCount = chatMessages.length;
            startMineTimer();
            updateUI();
            renderActiveTab();
            toast("ورود موفق", false, "peace");
        };

        // ===== معدن =====
        window.collectMine = async function() {
            const m = calcMine(player);
            const t = m.gold + m.oil + m.metal;
            if (t <= 0) return toast("معدن خالی", true);
            player.gold += m.gold;
            player.oil += m.oil;
            player.metal += m.metal;
            player.lastMineCollect = ts();
            await saveAll();
            updateUI();
            renderMine();
            toast(`💎 +${m.gold} طلا | +${m.oil} نفت | +${m.metal} فلز`, false, "peace");
        };

        window.upgradeMine = async function() {
            if (player.mineLevel >= MAX_MINE_LEVEL) {
                toast(`🔒 معدن در بالاترین سطح (${MAX_MINE_LEVEL}) است!`, true);
                return;
            }
            const c = player.mineLevel * 10000;
            if (player.gold < c) return toast("طلا کم", true);
            player.gold -= c;
            player.mineLevel++;
            await saveAll();
            updateUI();
            renderMine();
            toast(`⛏️ ارتقا به سطح ${player.mineLevel}`, false, "peace");
        };

        // ===== نظامی =====
        window.buildFighter = async function(k) {
            const f = F_DB[k];
            if (player.gold < f.c.g || player.oil < f.c.o || player.metal < f.c.m) return toast("منابع کم", true);
            if ((player.research?.aviation || 0) < f.r) return toast("هوانوردی سطح " + f.r, true);
            player.gold -= f.c.g;
            player.oil -= f.c.o;
            player.metal -= f.c.m;
            if (!player.fighters[k]) player.fighters[k] = { count: 0 };
            player.fighters[k].count++;
            await saveAll();
            updateUI();
            renderMilitary();
            toast(`✈️ ${f.n} ساخته`, false, "peace");
        };

        window.buildDefense = async function(k) {
            const d = D_DB[k];
            if (player.gold < d.c.g || player.oil < d.c.o || player.metal < d.c.m) return toast("منابع کم", true);
            player.gold -= d.c.g;
            player.oil -= d.c.o;
            player.metal -= d.c.m;
            if (!player.defenses) player.defenses = [];
            player.defenses.push({ id: ts().toString(36), type: k, hp: d.hp, maxHp: d.hp });
            await saveAll();
            updateUI();
            renderMilitary();
            toast(`🛡️ ${d.n} ساخته`, false, "peace");
        };

        window.repairDefense = async function(dId) {
            const d = player.defenses.find(x => x.id === dId);
            if (!d) return;
            const dmg = d.maxHp - d.hp,
                cost = dmg * 10;
            if (player.gold < cost) return toast("طلا کم", true);
            player.gold -= cost;
            d.hp = d.maxHp;
            await saveAll();
            updateUI();
            renderMilitary();
        };

        // ===== جناح =====
        window.joinFaction = async function(fId) {
            if (player.faction) return toast("🔒 جناح قابل ترک نیست", true);
            player.faction = fId;
            toast(`به ${getFN(fId)} پیوستید!`, false, "peace");
            await saveAll(true);
            updateUI();
            renderFactions();
            renderRank();
        };

        // ===== جنگ (نقشه آسمان) =====
        function getPlayerPosition(pId) {
            if (skyPlayerPositions[pId]) return skyPlayerPositions[pId];
            let hash = 0;
            for (let i = 0; i < pId.length; i++) {
                hash = (hash << 5) - hash + pId.charCodeAt(i);
                hash |= 0;
            }
            const x = ((Math.abs(hash) % 85) + 5) / 100;
            const y = ((Math.abs(hash >> 8) % 85) + 5) / 100;
            const pos = { x, y };
            skyPlayerPositions[pId] = pos;
            return pos;
        }

        function renderSkyMap() {
            const container = document.getElementById('warContent');
            if (!container) return;

            // همه بازیکنان به جز خودمان (ادمین هم نمایش داده شود)
            const targets = allPlayers.filter(p => p.id !== player.id);
            const allTargets = [player, ...targets];

            let h = '';
            h += `<div class="info-bar" style="margin-bottom:8px;">⚔️ قدرت شما: <b>${calcAtt(player)}</b> | 🛡️ دفاع شما: <b>${calcDef(player)}</b> | بازیکنان: ${allTargets.length}</div>`;

            h += `<div class="sky-map-container" id="skyMapContainer">
                <div class="sky-stars"></div>
                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
                <div class="cloud cloud3"></div>
                <div class="sky-map-inner" id="skyMapInner" style="transform: translate(${skyPos.x}px, ${skyPos.y}px) scale(${skyZoom});">`;

            allTargets.forEach(p => {
                const pos = getPlayerPosition(p.id);
                const isMe = p.id === player.id;
                const hasShield = p.shieldExpiry && ts() < p.shieldExpiry;
                const isAdmP = isAdm(p.name);
                const att = calcAtt(p);
                const def = calcDef(p);

                // آواتار بر اساس جناح
                let planeIcon = '🛩️';
                if (p.faction) {
                    const fi = getFI(p.faction);
                    if (fi === '🛡️') planeIcon = '🛡️';
                    else if (fi === '🌹') planeIcon = '🌹';
                    else if (fi === '✠') planeIcon = '✠';
                    else if (fi === '🐺') planeIcon = '🐺';
                    else if (fi === '🦅') planeIcon = '🦅';
                    else if (fi === '👻') planeIcon = '👻';    
                    else planeIcon = '🛩️';
                } else {
                    planeIcon = isAdmP ? '🛸' : '✈️';
                }

                const label = isAdmP ? '🚬 ' + p.name : p.name;
                const isMeClass = isMe ? 'me' : '';
                const shieldHtml = hasShield ? `<div class="shield-ring"></div>` : '';
                const px = pos.x * 100;
                const py = pos.y * 100;

                h += `<div class="sky-player ${isMeClass}" style="left:${px}%;top:${py}%;" data-player-id="${p.id}">
                    ${shieldHtml}
                    <div class="plane-icon">${planeIcon}</div>
                    <div class="player-label">${escapeHtml(label)}</div>
                    <div class="player-tooltip">
                        <div class="tp-name">${isAdmP?'🚬 ':''}${escapeHtml(p.name)}</div>
                        ${isMe ? `<div class="tp-detail">⚔️ ${att} | 🛡️ ${def} | XP: ${p.xp}</div>` : `<div class="tp-detail">XP: ${p.xp}</div>`}
                        <div class="tp-detail">${p.faction?getFI(p.faction)+' '+escapeHtml(getFN(p.faction)):'بدون جناح'}</div>
                        ${hasShield?'<div class="tp-detail" style="color:#93c5fd;">🛡️ سپر فعال</div>':''}
                        ${!isMe ? `<button class="tp-attack" onclick="launchAttack('${p.id}')" ${hasShield||isAttacking?'disabled':''}>🔥 حمله</button>` : `<div style="font-size:0.5rem;color:#fbbf24;">👈 شما</div>`}
                    </div>
                </div>`;
            });

            h += `</div>
                <div class="sky-map-zoom-controls">
                    <button onclick="skyZoomIn()">+</button>
                    <button onclick="skyZoomOut()">−</button>
                </div>
                <div class="sky-map-zoom-level">🔍 ${Math.round(skyZoom*100)}%</div>
                <div class="sky-map-legend">
                    <span><span class="dot me-dot"></span> شما</span>
                    <span><span class="dot other-dot"></span> سایر بازیکنان</span>
                    <span><span class="dot shield-dot"></span> سپر فعال</span>
                </div>
            </div>`;

            container.innerHTML = h;
            setupSkyMapDrag();
            applySkyTransform();
        }

        window.skyZoomIn = function() {
            skyZoom = Math.min(SKY_MAX_ZOOM, skyZoom + 0.15);
            applySkyTransform();
        };
        window.skyZoomOut = function() {
            skyZoom = Math.max(SKY_MIN_ZOOM, skyZoom - 0.15);
            applySkyTransform();
        };

        function applySkyTransform() {
            const inner = document.getElementById('skyMapInner');
            if (inner) {
                inner.style.transform = `translate(${skyPos.x}px, ${skyPos.y}px) scale(${skyZoom})`;
            }
            const level = document.querySelector('.sky-map-zoom-level');
            if (level) {
                level.textContent = `🔍 ${Math.round(skyZoom*100)}%`;
            }
        }

        function setupSkyMapDrag() {
            const container = document.getElementById('skyMapContainer');
            if (!container) return;
            const newContainer = container.cloneNode(true);
            container.parentNode.replaceChild(newContainer, container);
            const freshContainer = document.getElementById('skyMapContainer');
            if (!freshContainer) return;

            let isDraggingLocal = false,
                startX, startY, origX, origY;

            const onStart = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                isDraggingLocal = true;
                startX = ev.clientX;
                startY = ev.clientY;
                origX = skyPos.x;
                origY = skyPos.y;
                freshContainer.style.cursor = 'grabbing';
            };

            const onMove = (e) => {
                if (!isDraggingLocal) return;
                e.preventDefault();
                const ev = e.touches ? e.touches[0] : e;
                const dx = ev.clientX - startX;
                const dy = ev.clientY - startY;
                skyPos.x = origX + dx;
                skyPos.y = origY + dy;
                applySkyTransform();
            };

            const onEnd = () => {
                isDraggingLocal = false;
                freshContainer.style.cursor = 'grab';
            };

            freshContainer.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            freshContainer.addEventListener('touchstart', onStart, { passive: false });
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        // ===== جنگ (تابع حمله) =====
        window.launchAttack = async function(tId) {
            if (isAttacking) return;
            isAttacking = true;
            try {
                const target = allPlayers.find(p => p.id === tId);
                if (!target) return toast("هدف یافت نشد", true);
                const myA = calcAtt(player);
                if (myA <= 0) return toast("جنگنده بسازید!", true, "war");
                if (target.shieldExpiry && ts() < target.shieldExpiry) {
                    const rm = target.shieldExpiry - ts();
                    return toast(`🛡️ سپر (${Math.floor(rm/3600000)}س ${Math.floor((rm%3600000)/60000)}د)`, true);
                }
                if (player.shieldExpiry && ts() < player.shieldExpiry) {
                    player.shieldExpiry = 0;
                    const ai = allPlayers.findIndex(p => p.id === player.id);
                    if (ai >= 0) allPlayers[ai].shieldExpiry = 0;
                    updateUI();
                    await saveAll(true);
                }
                const eD = calcDef(target);
                let rM = "",
                    rS = "",
                    isW = false;
                if (myA > eD) {
                    isW = true;
                    const ratio = eD / myA;
                    const loot = { g: Math.floor(target.gold * 0.3), o: Math.floor(target.oil * 0.3), m: Math.floor(
                            target.metal * 0.3) };
                    target.gold -= loot.g;
                    target.oil -= loot.o;
                    target.metal -= loot.m;
                    player.gold += loot.g;
                    player.oil += loot.o;
                    player.metal += loot.m;
                    player.xp += 15;
                    target.xp += 3;
                    target.shieldExpiry = ts() + SHIELD_DURATION;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * ratio * 0.5));
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * 0.8));
                    }
                    if (target.defenses) target.defenses.forEach(d => { d.hp = 0; });
                    target.defenses = target.defenses?.filter(d => d.hp > 0) || [];
                    rM =
                        `🔥 <span class="attacker">${fmtName(player)}</span> به <span class="defender">${fmtName(target)}</span> حمله و پیروز شد! <span class="loot">${loot.g} طلا، ${loot.o} نفت، ${loot.m} فلز</span>`;
                    rS = `🏆 پیروزی!<br>${loot.g} طلا | ${loot.o} نفت | ${loot.m} فلز`;
                } else {
                    isW = false;
                    const ratio = myA / eD;
                    player.xp += 2;
                    target.xp += 15;
                    for (const [k, f] of Object.entries(player.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * 0.9));
                    }
                    for (const [k, f] of Object.entries(target.fighters)) {
                        f.count = Math.max(0, f.count - Math.ceil(f.count * ratio * 0.4));
                    }
                    if (target.defenses) {
                        target.defenses.forEach(d => { d.hp -= 40; if (d.hp < 0) d.hp = 0; });
                        target.defenses = target.defenses.filter(d => d.hp > 0);
                    }
                    rM =
                        `🛡️ <span class="attacker">${fmtName(player)}</span> به <span class="defender">${fmtName(target)}</span> حمله کرد اما دفاع شد!`;
                    rS = `💥 شکست سنگین!`;
                }
                player.shieldExpiry = 0;
                const pi = allPlayers.findIndex(p => p.id === player.id);
                if (pi >= 0) allPlayers[pi].shieldExpiry = 0;
                battleLogs.push({ ts: ts(), text: rM });
                await saveAll(true);
                document.getElementById('app').classList.add('screen-shake');
                const ov = document.getElementById('battleOverlay'),
                    st = document.getElementById('battleStatusText'),
                    rt = document.getElementById('battleResultText'),
                    ei = document.getElementById('explosionIcon');
                ov.classList.add('active');
                st.innerText = `هدف: ${target.name}`;
                st.style.color = "#fbbf24";
                rt.innerText = "";
                ei.innerText = "🚀";
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('app').classList.remove('screen-shake');
                st.innerText = "برخورد!";
                ei.innerText = "💥";
                document.getElementById('app').classList.add('screen-shake');
                await new Promise(r => setTimeout(r, 1500));
                document.getElementById('app').classList.remove('screen-shake');
                st.innerText = isW ? "پیروزی!" : "شکست!";
                st.style.color = isW ? "#4ade80" : "#fca5a5";
                rt.innerHTML = rS;
                await new Promise(r => setTimeout(r, 2500));
                ov.classList.remove('active');
                updateUI();
                if (activeTab === 'war') renderSkyMap();
                renderBattlelog();
            } finally { isAttacking = false; }
        };

        // ===== سینک هوشمند =====
        async function syncLoop() {
            if (syncLoopRunning) return;
            syncLoopRunning = true;
            try {
                const savedChat = saveInputs('panelChat');
                const savedMkt = saveInputs('panelMarket');
                const savedAdmin = saveInputs('adminContent');
                const savedRes = saveInputs('panelResearch');

                await loadAll();
                expireMarketOffers();
                updateUI();

                const newHash = dataHash();
                const changed = newHash !== lastHash;
                lastHash = newHash;

                if (activeTab === 'mine') updateMineVisuals();

                if (activeTab === 'chat' && chatMessages.length > displayedChatCount) {
                    const box = document.getElementById('chatBox');
                    if (box) {
                        for (let i = displayedChatCount; i < chatMessages.length; i++) {
                            const msg = chatMessages[i];
                            const time = new Date(msg.ts).toLocaleTimeString('fa-IR', { hour: '2-digit',
                                minute: '2-digit' });
                            const isSys = msg.sys;
                            const div = document.createElement('div');
                            div.className = 'chat-msg' + (isSys ? ' system-msg' : '');
                            const sCls = isAdm(msg.n) ? 'sender admin-s' : 'sender';
                            div.innerHTML =
                                `<div class="${sCls}">${isSys?'📢 سیستم':styledName(msg.n)} <span class="time">${time}</span></div><div>${msg.t}</div>`;
                            box.appendChild(div);
                        }
                        box.scrollTop = box.scrollHeight;
                    }
                    displayedChatCount = chatMessages.length;
                }

                const prevMktLen = savedMkt._prevMktLen || 0;
                if (activeTab === 'market' && marketOffers.length !== prevMktLen) {
                    renderMarket();
                    restoreInputs(savedMkt);
                }

                if (changed) {
                    if (activeTab === 'factions') renderFactions();
                    if (activeTab === 'rank') renderRank();
                    if (activeTab === 'battlelog') renderBattlelog();
                    if (activeTab === 'war') renderWar();
                }

                if (changed) {
                    if (activeTab === 'military') { renderMilitary();
                        restoreInputs(savedRes); }
                    if (activeTab === 'research') { renderResearch();
                        restoreInputs(savedRes); }
                }

                if (activeTab === 'admin' && isAdmin()) {
                    adminSavedInputs = savedAdmin;
                    renderAdmin();
                }

                savedChat._prevChatLen = chatMessages.length;
                savedMkt._prevMktLen = marketOffers.length;

            } catch (e) { console.error('syncLoop error:', e); } finally { syncLoopRunning = false; }
        }

        // ===== راه‌اندازی اولیه =====
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const t = this.dataset.tab;
                if (t === 'admin' && !isAdmin()) return;
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
                activeTab = t;
                renderActiveTab();
                setTimeout(syncLoop, 100);
            });
        });

        (async function() {
            await initSupabase();
            await loadAll();
            lastHash = dataHash();
            displayedChatCount = chatMessages.length;
            expireMarketOffers();

            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    setTimeout(() => { overlay.style.display = 'none'; }, 800);
                }, 500);
            }

            document.getElementById('loginBox').style.display = 'flex';
            updateSyncUI("✅ آماده", "online");
            setInterval(syncLoop, SYNC_INTERVAL);
            setTimeout(syncLoop, 300);
        })();
    </script>
</body>
</html>
